---
# - name: Install libssl # Required for merod
#   apt:
#     deb: "{{ libssl_deb_url }}"
- name: Download merod binary from GitHub releases
  unarchive:
    src: https://github.com/calimero-network/core/releases/download/{{ merod_version }}/merod_{{ cpu_platform }}-unknown-linux-gnu.tar.gz
    dest: /usr/local/bin
    mode: "0755"
    remote_src: yes
  register: merod_download
  retries: 5
  delay: 10
  until: merod_download is succeeded
- name: Download meroctl binary from GitHub releases
  unarchive:
    src: https://github.com/calimero-network/core/releases/download/{{ meroctl_version }}/meroctl_{{ cpu_platform }}-unknown-linux-gnu.tar.gz
    dest: /usr/local/bin
    mode: "0755"
    remote_src: yes
  register: meroctl_download
  retries: 5
  delay: 10
  until: meroctl_download is succeeded
