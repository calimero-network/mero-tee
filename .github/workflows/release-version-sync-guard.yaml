name: Release version sync guard

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "mero-kms/Cargo.toml"
      - "Cargo.lock"
      - "mero-tee/versions.json"
      - "scripts/policy/check_release_version_sync.sh"
      - ".github/workflows/release-version-sync-guard.yaml"
  push:
    branches:
      - master
    paths:
      - "Cargo.toml"
      - "mero-kms/Cargo.toml"
      - "Cargo.lock"
      - "mero-tee/versions.json"
      - "scripts/policy/check_release_version_sync.sh"
      - ".github/workflows/release-version-sync-guard.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-sync:
    name: Ensure KMS and merod versions stay in sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate sync script syntax
        id: syntax_check
        run: bash -n scripts/policy/check_release_version_sync.sh

      - name: Run release version sync guard
        id: sync_guard
        run: scripts/policy/check_release_version_sync.sh

      - name: Summarize sync guard outcomes
        if: ${{ always() }}
        run: |
          set -euo pipefail
          source scripts/ci/logging.sh
          result_line="$(ci_result "release-version-sync-guard" "${{ job.status }}" "VERSION_SYNC" "ref=${GITHUB_REF_NAME}" "run_id=${GITHUB_RUN_ID}")"
          ci_info "${result_line}"
          python3 scripts/ci/summary/write_workflow_summary.py \
            --output "${GITHUB_STEP_SUMMARY}" \
            --inputs-line "- Ref: ${GITHUB_REF_NAME}" \
            --checks-line "- Syntax check: ${{ steps.syntax_check.outcome }}" \
            --checks-line "- Sync guard: ${{ steps.sync_guard.outcome }}" \
            --result-line "- Job status: ${{ job.status }}" \
            --result-line "- ${result_line}" \
            --artifacts-line "- n/a" \
            --next-line "- Align Cargo, versions.json, and policy files when this guard fails."
