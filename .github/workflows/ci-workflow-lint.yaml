name: CI workflow and shell lint

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "scripts/release/**"
      - "scripts/policy/**"
      - "scripts/attestation/**"
      - "scripts/ci/**"
      - "mero-tee/**"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/**"
      - "scripts/release/**"
      - "scripts/policy/**"
      - "scripts/attestation/**"
      - "scripts/ci/**"
      - "mero-tee/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-workflow-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: actionlint + shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run actionlint
        id: actionlint
        uses: docker://rhysd/actionlint:latest
        with:
          args: -shellcheck=

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        id: shellcheck
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          shell_files=(scripts/release/**/*.sh scripts/policy/**/*.sh scripts/ci/**/*.sh mero-tee/**/*.sh .github/workflows/deps/**/*.sh)
          if [[ "${#shell_files[@]}" -eq 0 ]]; then
            echo "No shell files matched lint paths."
            exit 0
          fi

          shellcheck "${shell_files[@]}"

      - name: Summarize lint outcomes
        if: ${{ always() }}
        run: |
          set -euo pipefail
          source scripts/ci/logging.sh
          result_line="$(ci_result "ci-workflow-lint" "${{ job.status }}" "ACTIONLINT_SHELLCHECK" "ref=${GITHUB_REF_NAME}" "run_id=${GITHUB_RUN_ID}")"
          ci_info "${result_line}"
          {
            echo "## Workflow Summary"
            echo ""
            echo "### Inputs / Targets"
            echo ""
            echo "- Ref: ${GITHUB_REF_NAME}"
            echo ""
            echo "### Check Outcomes"
            echo ""
            echo "- actionlint: ${{ steps.actionlint.outcome }}"
            echo "- shellcheck: ${{ steps.shellcheck.outcome }}"
            echo ""
            echo "### Result"
            echo ""
            echo "- Job status: ${{ job.status }}"
            echo "- ${result_line}"
            echo ""
            echo "### Artifacts"
            echo ""
            echo "- n/a"
            echo ""
            echo "### Next"
            echo ""
            echo "- Fix first failing lint stage and rerun."
          } >> "${GITHUB_STEP_SUMMARY}"
