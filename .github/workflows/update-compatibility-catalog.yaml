name: Update compatibility catalog

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: update-compatibility-catalog-master
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: master

      - name: Fetch releases and build catalog
        id: catalog
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repo="${GITHUB_REPOSITORY}"
          versions="$(gh api "repos/${repo}/releases" \
            --paginate \
            --jq '.[] | select(.draft == false and (.tag_name | test("^mero-kms-v[0-9]+\\.[0-9]+\\.[0-9]+$"))) | (.tag_name | sub("^mero-kms-v"; ""))' \
            | sort -V -u)"
          catalog="[]"
          for v in ${versions}; do
            kms_tag="mero-kms-v${v}"
            node_tag="mero-tee-v${v}"
            kms_url="https://github.com/${repo}/releases/download/${kms_tag}/kms-phala-attestation-policy.json"
            node_url="https://github.com/${repo}/releases/download/${node_tag}/published-mrtds.json"
            entry="$(jq -n \
              --arg v "${v}" \
              --arg kt "${kms_tag}" \
              --arg nt "${node_tag}" \
              --arg ku "${kms_url}" \
              --arg nu "${node_url}" \
              '{version: $v, kms_tag: $kt, node_image_tag: $nt, kms_policy_url: $ku, node_policy_url: $nu}')"
            catalog="$(echo "${catalog}" | jq --argjson e "${entry}" '. + [$e]')"
          done
          echo "${catalog}" | jq '{schema_version: 1, releases: .}' > compatibility-catalog.json
          echo "catalog_count=$(echo "${catalog}" | jq 'length')" >> "${GITHUB_OUTPUT}"

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet compatibility-catalog.json 2>/dev/null; then
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Commit and push
        id: commit_push
        if: steps.diff.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add compatibility-catalog.json
          git commit -m "chore: update compatibility catalog (${{ steps.catalog.outputs.catalog_count }} releases)"
          # Release-triggered checkouts can be detached; always push explicitly to master.
          git push origin HEAD:master

      - name: Summarize compatibility catalog update
        if: ${{ always() }}
        run: |
          changed="${{ steps.diff.outputs.changed }}"
          if [[ "${changed}" == "true" ]]; then
            commit_result="${{ steps.commit_push.outcome }}"
          else
            commit_result="skipped"
          fi
          {
            echo "## Compatibility catalog update"
            echo ""
            echo "- Repository: ${GITHUB_REPOSITORY}"
            echo "- Catalog entries generated: ${{ steps.catalog.outputs.catalog_count }}"
            echo "- compatibility-catalog.json changed: ${changed}"
            echo "- Commit/push step: ${commit_result}"
          } >> "${GITHUB_STEP_SUMMARY}"
