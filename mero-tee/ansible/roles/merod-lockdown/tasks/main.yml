---
# Locked-down Merod image: R1–R5 per specs/confidential-computing/locked-down-merod-os-image.md

# --- R1: No SSH ---
- name: Remove openssh-server and openssh-client
  apt:
    name:
      - openssh-server
      - openssh-client
    state: absent
    purge: true

- name: Remove /etc/ssh directory
  file:
    path: /etc/ssh
    state: absent

# --- R2: No serial console ---
- name: Mask getty and console-getty services
  systemd:
    name: "{{ item }}"
    masked: true
    daemon_reload: true
  loop:
    - getty@tty1.service
    - getty@tty2.service
    - getty@tty3.service
    - getty@tty4.service
    - getty@tty5.service
    - getty@tty6.service
    - serial-getty@ttyS0.service
    - console-getty.service
    - getty.target

- name: Strip console= from GRUB_CMDLINE_LINUX_DEFAULT
  replace:
    path: /etc/default/grub
    regexp: 'console=[^ "]*\s*'
    replace: ''
  register: grub_console_stripped

- name: Update GRUB (after console removal)
  command: update-grub
  when: grub_console_stripped.changed | default(false)
  changed_when: true

# --- R3: No recovery/emergency shell ---
- name: Mask emergency, rescue, debug-shell
  systemd:
    name: "{{ item }}"
    masked: true
    daemon_reload: true
  loop:
    - emergency.service
    - rescue.service
    - debug-shell.service

- name: Create systemd override dir for emergency.service
  file:
    path: /etc/systemd/system/emergency.service.d
    state: directory
    mode: "0755"

- name: Override emergency.service to reboot
  copy:
    content: |
      [Service]
      ExecStart=
      ExecStart=-/usr/sbin/reboot -f
    dest: /etc/systemd/system/emergency.service.d/override.conf
    mode: "0644"

- name: Create systemd override dir for rescue.service
  file:
    path: /etc/systemd/system/rescue.service.d
    state: directory
    mode: "0755"

- name: Override rescue.service to reboot
  copy:
    content: |
      [Service]
      ExecStart=
      ExecStart=-/usr/sbin/reboot -f
    dest: /etc/systemd/system/rescue.service.d/override.conf
    mode: "0644"

- name: Reload systemd after overrides
  systemd:
    daemon_reload: true

# --- R4: No user account access ---
- name: Lock root account
  user:
    name: root
    password_lock: true

- name: Empty /etc/securetty
  copy:
    content: ""
    dest: /etc/securetty
    force: true
    mode: "0600"

# --- R5: No GCP metadata script execution ---
- name: Mask google-startup-scripts and cloud-init services
  systemd:
    name: "{{ item }}"
    masked: true
    daemon_reload: true
  loop:
    - google-startup-scripts.service
    - cloud-init.service
    - cloud-init-local.service
    - cloud-config.service
    - cloud-final.service
