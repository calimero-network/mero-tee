          locked_ro_rtmr0_preview="$(jq -r '.profiles["locked-read-only"].allowed_rtmr0[0] // "n/a"' "${node_policy_file}")"
          locked_ro_rtmr2_preview="$(jq -r '.profiles["locked-read-only"].allowed_rtmr2[0] // "n/a"' "${node_policy_file}")"

          kms_debug_mrtd="$(format_allowlist_md "${profile_policy_debug_file}" "kms_allowed_mrtd")"
          kms_debug_rtmr0="$(format_allowlist_md "${profile_policy_debug_file}" "kms_allowed_rtmr0")"
