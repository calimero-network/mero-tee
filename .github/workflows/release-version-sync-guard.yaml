name: Release version sync guard

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "mero-kms/Cargo.toml"
      - "Cargo.lock"
      - "mero-tee/versions.json"
      - "scripts/policy/check_release_version_sync.sh"
      - ".github/workflows/release-version-sync-guard.yaml"
  push:
    branches:
      - master
    paths:
      - "Cargo.toml"
      - "mero-kms/Cargo.toml"
      - "Cargo.lock"
      - "mero-tee/versions.json"
      - "scripts/policy/check_release_version_sync.sh"
      - ".github/workflows/release-version-sync-guard.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-sync:
    name: Ensure KMS and merod versions stay in sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate sync script syntax
        id: syntax_check
        run: bash -n scripts/policy/check_release_version_sync.sh

      - name: Run release version sync guard
        id: sync_guard
        run: scripts/policy/check_release_version_sync.sh

      - name: Summarize sync guard outcomes
        if: ${{ always() }}
        run: |
          {
            echo "## Release version sync guard"
            echo ""
            echo "- Syntax check: ${{ steps.syntax_check.outcome }}"
            echo "- Sync guard: ${{ steps.sync_guard.outcome }}"
          } >> "${GITHUB_STEP_SUMMARY}"
