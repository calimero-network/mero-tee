name: Release mero-kms-phala

on:
  push:
    branches:
      - master
    paths:
      - Cargo.toml
      - Cargo.lock
      - "crates/**"
      - "policies/mero-kms-phala/**"
      - "scripts/read_mero_kms_policy_registry.sh"
      - ".github/workflows/release-mero-kms-phala.yaml"
      - ".github/workflows/deps/**"
  pull_request:
    paths:
      - Cargo.toml
      - Cargo.lock
      - "crates/**"
      - "policies/mero-kms-phala/**"
      - "scripts/read_mero_kms_policy_registry.sh"
      - ".github/workflows/release-mero-kms-phala.yaml"
      - ".github/workflows/deps/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  BINARY: mero-kms-phala
  DOCKER_PLATFORMS: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
  INCLUDE_AARCH64: ${{ github.event_name == 'pull_request' && 'false' || 'true' }}

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version_info.outputs.version }}
      binary_release: ${{ steps.version_info.outputs.binary_release }}
      docker_release: ${{ steps.version_info.outputs.docker_release }}
      docker_push: ${{ github.event_name != 'pull_request' || (github.actor != 'dependabot[bot]' && !github.event.pull_request.head.repo.fork) }}
      prerelease: ${{ steps.version_info.outputs.prerelease }}
      target_commit: ${{ steps.version_info.outputs.target_commit }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Validate release helper scripts
        run: |
          bash -n scripts/verify_locked_image_release_assets.sh
          bash -n scripts/verify_mero_kms_release_assets.sh
          bash -n scripts/read_mero_kms_policy_registry.sh
          bash -n scripts/generate_merod_kms_attestation_config.sh
          bash -n scripts/apply_merod_kms_attestation_config.sh

      - name: Get version info
        id: version_info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "target_commit=${{ github.sha }}" >> $GITHUB_OUTPUT
          version=$(cargo metadata --format-version 1 --no-deps 2>/dev/null | jq -r '.packages[] | select(.name=="mero-kms-phala") | .version' || echo "0.1.0")
          if [[ -z "$version" || "$version" == "null" ]]; then
            version="0.1.0"
          fi

          prerelease=false
          binary_release=false
          docker_release=false

          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            if [[ "$version" =~ -[a-z]+(\.[0-9]+)?$ ]]; then
              prerelease=true
            fi
            if ! gh release view "$version" --repo ${{ github.repository }} >/dev/null 2>&1; then
              if scripts/read_mero_kms_policy_registry.sh "$version" >/dev/null 2>&1; then
                binary_release=true
                docker_release=true
              else
                echo "::warning::Policy registry entry for ${version} not found; skipping release publication until policy PR is merged."
              fi
            fi
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            docker_release=true
          fi

          echo "version=$version" >> $GITHUB_OUTPUT
          echo "prerelease=$prerelease" >> $GITHUB_OUTPUT
          echo "binary_release=$binary_release" >> $GITHUB_OUTPUT
          echo "docker_release=$docker_release" >> $GITHUB_OUTPUT

  build-binaries:
    name: Build Binaries (${{ matrix.name }})
    needs: prepare
    strategy:
      matrix:
        include: ${{ fromJSON(github.event_name == 'pull_request' && '[{"name":"x86_64-linux","runner":"ubuntu-latest","target":"x86_64-unknown-linux-gnu"}]' || '[{"name":"x86_64-linux","runner":"ubuntu-latest","target":"x86_64-unknown-linux-gnu"},{"name":"aarch64-linux","runner":"ubuntu-24.04-arm","target":"aarch64-unknown-linux-gnu"}]') }}
      fail-fast: false
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-mero-kms-phala

      - name: Build binary
        run: |
          cargo build -p mero-kms-phala --release --target ${{ matrix.target }}

      - name: Compress artifact
        run: |
          mkdir -p artifacts
          tar -czf artifacts/${BINARY}_${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release mero-kms-phala

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.target }}
          path: artifacts/*
          retention-days: 2

  release-binaries:
    name: Release Binaries
    if: needs.prepare.outputs.binary_release == 'true'
    runs-on: ubuntu-latest
    needs: [prepare, build-binaries]
    concurrency:
      group: ${{ github.workflow }}-${{ github.job }}-${{ github.ref }}-${{ needs.prepare.outputs.version }}
      cancel-in-progress: true
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: artifacts/*
          file_glob: true
          tag: ${{ needs.prepare.outputs.version }}
          release_name: ${{ needs.prepare.outputs.version }}
          prerelease: ${{ needs.prepare.outputs.prerelease }}
          target_commit: ${{ needs.prepare.outputs.target_commit }}

  release-container:
    name: Release mero-kms-phala container
    needs: [prepare, build-binaries]
    outputs:
      image_digest: ${{ steps.build_and_push.outputs.digest }}
      image_tags: ${{ steps.metadata.outputs.tags }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.job }}-${{ github.ref }}-mero-kms-phala-${{ needs.prepare.outputs.version }}
      cancel-in-progress: true
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Download x86_64 binaries
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-x86_64-unknown-linux-gnu
          path: binaries/
          merge-multiple: true

      - name: Download aarch64 binaries
        uses: actions/download-artifact@v4
        if: ${{ env.INCLUDE_AARCH64 == 'true' }}
        with:
          pattern: artifacts-aarch64-unknown-linux-gnu
          path: binaries/
          merge-multiple: true

      - name: Extract binaries
        run: |
          mkdir -p ./bin/amd64
          if [ "${{ env.INCLUDE_AARCH64 }}" = "true" ]; then
            mkdir -p ./bin/arm64
          fi
          tar -xzf binaries/mero-kms-phala_x86_64-unknown-linux-gnu.tar.gz -C ./bin/amd64 --no-same-owner
          if [ "${{ env.INCLUDE_AARCH64 }}" = "true" ]; then
            tar -xzf binaries/mero-kms-phala_aarch64-unknown-linux-gnu.tar.gz -C ./bin/arm64 --no-same-owner
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GITHUB_TOKEN often lacks packages write in orgs. Add GHCR_PUSH_TOKEN (PAT with write:packages) if push fails.
      - name: Log in to GitHub Container Registry
        if: ${{ needs.prepare.outputs.docker_push == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mero-kms-phala
          tags: |
            type=edge
            type=ref,prefix=pr-,event=pr
            type=sha,prefix=,format=short
            type=raw,value=${{ needs.prepare.outputs.version }},enable=${{ github.ref == 'refs/heads/master' && needs.prepare.outputs.docker_release == 'true' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' && needs.prepare.outputs.docker_release == 'true' && needs.prepare.outputs.prerelease == 'false' }}
            type=raw,value=prerelease,enable=${{ github.ref == 'refs/heads/master' && needs.prepare.outputs.docker_release == 'true' && needs.prepare.outputs.prerelease == 'true' }}

      - name: Build and push image
        id: build_and_push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .github/workflows/deps/prebuilt.mero-kms-phala.Dockerfile
          push: ${{ needs.prepare.outputs.docker_push }}
          platforms: ${{ env.DOCKER_PLATFORMS }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          provenance: false
          sbom: false

  release-metadata:
    name: Release Metadata
    if: needs.prepare.outputs.binary_release == 'true'
    runs-on: ubuntu-latest
    needs: [prepare, build-binaries, release-binaries, release-container]
    concurrency:
      group: ${{ github.workflow }}-${{ github.job }}-${{ github.ref }}-${{ needs.prepare.outputs.version }}
      cancel-in-progress: true
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate release checksums, manifest, and attestation policy
        run: |
          set -euo pipefail
          mkdir -p release-assets

          sha256sum artifacts/*.tar.gz | sort | sed 's#  artifacts/#  #' > release-assets/mero-kms-phala-checksums.txt

          image_name="ghcr.io/${{ github.repository_owner }}/mero-kms-phala"
          image_digest="${{ needs.release-container.outputs.image_digest }}"
          if [[ -z "${image_digest}" ]]; then
            echo "::error::Container image digest is empty"
            exit 1
          fi

          cat > /tmp/mero-kms-tags.txt <<'EOF'
          ${{ needs.release-container.outputs.image_tags }}
          EOF
          tags_json="$(sed '/^[[:space:]]*$/d' /tmp/mero-kms-tags.txt | jq -R . | jq -s .)"

          binaries_json="$(
            while read -r checksum filepath; do
              file="${filepath#artifacts/}"
              jq -nc --arg file "$file" --arg checksum "$checksum" '{file: $file, sha256: $checksum}'
            done < release-assets/mero-kms-phala-checksums.txt | jq -s '.'
          )"

          policy_registry_json="$(
            scripts/read_mero_kms_policy_registry.sh "${{ needs.prepare.outputs.version }}"
          )"
          policy_registry_source_path="$(jq -r '.source_policy_path' <<< "${policy_registry_json}")"
          allowed_tcb_statuses_json="$(jq -c '.policy.allowed_tcb_statuses' <<< "${policy_registry_json}")"
          allowed_mrtd_json="$(jq -c '.policy.allowed_mrtd' <<< "${policy_registry_json}")"
          allowed_rtmr0_json="$(jq -c '.policy.allowed_rtmr0' <<< "${policy_registry_json}")"
          allowed_rtmr1_json="$(jq -c '.policy.allowed_rtmr1' <<< "${policy_registry_json}")"
          allowed_rtmr2_json="$(jq -c '.policy.allowed_rtmr2' <<< "${policy_registry_json}")"
          allowed_rtmr3_json="$(jq -c '.policy.allowed_rtmr3' <<< "${policy_registry_json}")"

          for json_var in \
            allowed_tcb_statuses_json \
            allowed_mrtd_json \
            allowed_rtmr0_json \
            allowed_rtmr1_json \
            allowed_rtmr2_json \
            allowed_rtmr3_json; do
            if ! jq -e 'type == "array"' <<< "${!json_var}" >/dev/null 2>&1; then
              echo "::error::${json_var} must be a JSON array. Got: ${!json_var}"
              exit 1
            fi
          done

          read -r default_binding_hex default_binding_b64 < <(
            python3 - <<'PY'
          import base64
          import hashlib

          digest = hashlib.sha256(b"mero-kms-phala-attest-v1").digest()
          print(digest.hex(), base64.b64encode(digest).decode())
          PY
          )

          jq -n \
            --arg tag "${{ needs.prepare.outputs.version }}" \
            --arg commit "${{ needs.prepare.outputs.target_commit }}" \
            --arg run_id "${{ github.run_id }}" \
            --arg run_attempt "${{ github.run_attempt }}" \
            --arg image "${image_name}" \
            --arg digest "${image_digest}" \
            --arg policy_registry_source_path "${policy_registry_source_path}" \
            --argjson tags "${tags_json}" \
            --argjson binaries "${binaries_json}" \
            '{
              tag: $tag,
              commit_sha: $commit,
              workflow_run_id: $run_id,
              workflow_run_attempt: $run_attempt,
              generated_at: (now | todate),
              binaries: $binaries,
              container: {
                image: $image,
                digest: $digest,
                tags: $tags
              },
              verification: {
                kms_attest_endpoint: "/attest",
                report_data_layout: {
                  bytes_0_31: "nonce",
                  bytes_32_63: "binding_or_default_domain_separator"
                },
                policy_registry_entry_path: $policy_registry_source_path,
                attestation_policy_asset: "mero-kms-phala-attestation-policy.json"
              }
            }' > release-assets/mero-kms-phala-release-manifest.json

          jq -n \
            --arg tag "${{ needs.prepare.outputs.version }}" \
            --arg commit "${{ needs.prepare.outputs.target_commit }}" \
            --arg run_id "${{ github.run_id }}" \
            --arg run_attempt "${{ github.run_attempt }}" \
            --arg repository "${{ github.repository }}" \
            --arg workflow "${{ github.workflow }}" \
            --arg ref "${{ github.ref }}" \
            --arg policy_registry_source_path "${policy_registry_source_path}" \
            --arg default_binding_hex "${default_binding_hex}" \
            --arg default_binding_b64 "${default_binding_b64}" \
            --argjson allowed_tcb_statuses "${allowed_tcb_statuses_json}" \
            --argjson allowed_mrtd "${allowed_mrtd_json}" \
            --argjson allowed_rtmr0 "${allowed_rtmr0_json}" \
            --argjson allowed_rtmr1 "${allowed_rtmr1_json}" \
            --argjson allowed_rtmr2 "${allowed_rtmr2_json}" \
            --argjson allowed_rtmr3 "${allowed_rtmr3_json}" \
            '{
              schema_version: 1,
              tag: $tag,
              commit_sha: $commit,
              workflow_run_id: $run_id,
              workflow_run_attempt: $run_attempt,
              generated_at: (now | todate),
              source: {
                repository: $repository,
                workflow: $workflow,
                ref: $ref
              },
              policy_registry_entry_path: $policy_registry_source_path,
              kms: {
                provider: "mero-kms-phala",
                attest_endpoint: "/attest",
                report_data_layout: {
                  bytes_0_31: "nonce",
                  bytes_32_63: "binding_or_default_domain_separator"
                },
                default_binding_hex: $default_binding_hex,
                default_binding_b64: $default_binding_b64
              },
              policy: {
                allowed_tcb_statuses: $allowed_tcb_statuses,
                allowed_mrtd: $allowed_mrtd,
                allowed_rtmr0: $allowed_rtmr0,
                allowed_rtmr1: $allowed_rtmr1,
                allowed_rtmr2: $allowed_rtmr2,
                allowed_rtmr3: $allowed_rtmr3
              },
              merod_config_path: "tee.kms.phala.attestation"
            }' > release-assets/mero-kms-phala-attestation-policy.json

      - name: Install cosign for keyless signing
        uses: sigstore/cosign-installer@v3

      - name: Sign release metadata and binary archives with Sigstore keyless
        env:
          COSIGN_YES: "true"
        run: |
          set -euo pipefail

          signed_assets=(
            artifacts/*.tar.gz
            release-assets/mero-kms-phala-checksums.txt
            release-assets/mero-kms-phala-release-manifest.json
            release-assets/mero-kms-phala-attestation-policy.json
          )

          for asset in "${signed_assets[@]}"; do
            base_name="$(basename "${asset}")"
            cosign sign-blob \
              --yes \
              --output-signature "release-assets/${base_name}.sig" \
              --output-certificate "release-assets/${base_name}.pem" \
              "${asset}"
          done

      - name: Verify generated signatures (sanity check)
        env:
          COSIGN_CERTIFICATE_OIDC_ISSUER: https://token.actions.githubusercontent.com
        run: |
          set -euo pipefail

          cert_identity_regex="^https://github.com/${{ github.repository }}/.github/workflows/release-mero-kms-phala.yaml@refs/heads/master$"
          signed_assets=(
            artifacts/*.tar.gz
            release-assets/mero-kms-phala-checksums.txt
            release-assets/mero-kms-phala-release-manifest.json
            release-assets/mero-kms-phala-attestation-policy.json
          )

          for asset in "${signed_assets[@]}"; do
            base_name="$(basename "${asset}")"
            cosign verify-blob \
              --certificate "release-assets/${base_name}.pem" \
              --signature "release-assets/${base_name}.sig" \
              --certificate-identity-regexp "${cert_identity_regex}" \
              --certificate-oidc-issuer "${COSIGN_CERTIFICATE_OIDC_ISSUER}" \
              "${asset}" >/dev/null
          done

      - name: Upload release metadata assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN || secrets.GHCR_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          tag_name: ${{ needs.prepare.outputs.version }}
          fail_on_unmatched_files: true
          files: |
            release-assets/*.tar.gz.sig
            release-assets/*.tar.gz.pem
            release-assets/mero-kms-phala-checksums.txt
            release-assets/mero-kms-phala-checksums.txt.sig
            release-assets/mero-kms-phala-checksums.txt.pem
            release-assets/mero-kms-phala-release-manifest.json
            release-assets/mero-kms-phala-release-manifest.json.sig
            release-assets/mero-kms-phala-release-manifest.json.pem
            release-assets/mero-kms-phala-attestation-policy.json
            release-assets/mero-kms-phala-attestation-policy.json.sig
            release-assets/mero-kms-phala-attestation-policy.json.pem

      - name: Smoke test published mero-kms release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          scripts/verify_mero_kms_release_assets.sh "${{ needs.prepare.outputs.version }}"
