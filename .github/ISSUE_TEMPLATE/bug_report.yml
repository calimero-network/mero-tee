name: Bug report
description: Report a reproducible defect in mero-tee
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
        Please provide enough detail for maintainers to reproduce quickly.
  - type: input
    id: component
    attributes:
      label: Component
      description: Which area is affected? (for example `mero-kms-phala`, `gcp_locked_image_build`, `scripts`)
      placeholder: crates/mero-kms-phala
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Runtime/OS/cloud details relevant to reproduction
      placeholder: |
        OS:
        Workflow run URL:
        Release tag:
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs/output
      description: Paste relevant logs (redact sensitive material)
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I redacted secrets, tokens, and private data from logs.
          required: true
