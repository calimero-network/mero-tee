name: Post-release KMS-node compatibility e2e

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/post-release-kms-node-e2e.yaml"
      - ".github/workflows/release-node-image-gcp.yaml"
      - ".github/workflows/kms-phala-staging-probe.yaml"
      - ".github/workflows/node-image-gcp-staging-probe.yaml"
      - "scripts/release/e2e-verify-kms-node-compatibility.sh"
      - "mero-kms/Cargo.toml"
      - "mero-tee/versions.json"
      - "Cargo.lock"
  pull_request:
    paths:
      - ".github/workflows/post-release-kms-node-e2e.yaml"
      - ".github/workflows/release-node-image-gcp.yaml"
      - ".github/workflows/kms-phala-staging-probe.yaml"
      - ".github/workflows/node-image-gcp-staging-probe.yaml"
      - "scripts/release/e2e-verify-kms-node-compatibility.sh"
      - "mero-kms/Cargo.toml"
      - "mero-tee/versions.json"
      - "Cargo.lock"
  workflow_run:
    workflows:
      - Release mero-tee
    types:
      - completed
  workflow_dispatch:
    inputs:
      release_version:
        description: "Released mero-tee version to validate (example: 2.1.39)"
        required: true
        type: string
      kms_tag:
        description: "Optional KMS release tag override (example: mero-kms-v2.1.39)"
        required: false
        type: string
        default: ""

permissions:
  contents: read
  actions: write

concurrency:
  group: post-release-kms-node-e2e-${{ github.event_name }}-${{ github.event.workflow_run.id || github.run_id }}
  cancel-in-progress: false

jobs:
  smoke_workflow_wiring:
    name: Smoke post-release e2e wiring
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate helper script syntax
        run: |
          bash -n scripts/release/e2e-verify-kms-node-compatibility.sh

      - name: Validate version manifest shape
        run: |
          jq -e '
            (.imageVersion | type == "string" and length > 0) and
            (.merodVersion | type == "string" and length > 0)
          ' mero-tee/versions.json >/dev/null

  verify_released_compatibility:
    name: Verify released KMS-node compatibility
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master') || (github.event_name == 'push' && github.ref == 'refs/heads/master') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve release tags
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name || '' }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha || '' }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch || '' }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_RELEASE_VERSION: ${{ github.event.inputs.release_version || '' }}
          INPUT_KMS_TAG: ${{ github.event.inputs.kms_tag || '' }}
        run: |
          set -euo pipefail

          release_exists() {
            local tag="$1"
            gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1
          }

          wait_for_release_tag() {
            local tag="$1"
            local attempts="${2:-24}"
            local delay_secs="${3:-10}"
            for attempt in $(seq 1 "${attempts}"); do
              if release_exists "${tag}"; then
                return 0
              fi
              sleep "${delay_secs}"
            done
            return 1
          }

          kms_release_has_required_assets() {
            local tag="$1"
            gh release view "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --json assets \
              --jq '([.assets[].name]
                | index("kms-phala-compatibility-map.json") != null
                  and index("kms-phala-attestation-policy.debug.json") != null
                  and index("kms-phala-attestation-policy.debug-read-only.json") != null
                  and index("kms-phala-attestation-policy.locked-read-only.json") != null)'
          }

          tee_tag=""
          version=""
          should_run="true"
          skip_reason=""
          strict_release_mode="false"
          probe_workflow_ref=""
          probe_expected_sha=""
          if [[ "${EVENT_NAME}" == "workflow_run" ]]; then
            if [[ "${WORKFLOW_NAME}" != "Release mero-tee" ]]; then
              echo "::error::Expected workflow_run from 'Release mero-tee', got '${WORKFLOW_NAME}'."
              exit 1
            fi
            if [[ "${WORKFLOW_RUN_HEAD_BRANCH}" != "master" ]]; then
              echo "::error::Expected master workflow_run, got branch '${WORKFLOW_RUN_HEAD_BRANCH}'."
              exit 1
            fi

            # Use the checked-out file at workflow_run.head_sha directly (more reliable than contents API with SHA ref).
            version="$(jq -r '.imageVersion // empty' "mero-tee/versions.json")"
            if [[ -z "${version}" ]]; then
              echo "::error::Could not resolve imageVersion from checked-out mero-tee/versions.json."
              exit 1
            fi
            tee_tag="mero-tee-v${version}"
            strict_release_mode="true"
            probe_workflow_ref="${WORKFLOW_RUN_HEAD_BRANCH}"
            probe_expected_sha="${WORKFLOW_RUN_HEAD_SHA}"
            if [[ -z "${probe_workflow_ref}" || -z "${probe_expected_sha}" ]]; then
              echo "::error::workflow_run must provide head branch and head SHA."
              exit 1
            fi
          elif [[ "${EVENT_NAME}" == "push" ]]; then
            if [[ "${REF_NAME}" != "master" ]]; then
              echo "::error::Expected push on master, got ref '${REF_NAME}'."
              exit 1
            fi
            version="$(jq -r '.imageVersion // empty' "mero-tee/versions.json")"
            if [[ -z "${version}" ]]; then
              echo "::error::Could not resolve imageVersion from checked-out mero-tee/versions.json."
              exit 1
            fi
            tee_tag="mero-tee-v${version}"
            probe_workflow_ref="${REF_NAME}"
            probe_expected_sha="${GITHUB_SHA}"
          else
            version="${INPUT_RELEASE_VERSION}"
            if [[ -z "${version}" ]]; then
              echo "::error::workflow_dispatch requires release_version."
              exit 1
            fi
            tee_tag="mero-tee-v${version}"
            strict_release_mode="true"
            probe_workflow_ref="${REF_NAME}"
            probe_expected_sha="${GITHUB_SHA}"
          fi

          if ! wait_for_release_tag "${tee_tag}" 30 10; then
            if [[ "${strict_release_mode}" == "true" ]]; then
              echo "::error::Node release tag '${tee_tag}' not found in ${GITHUB_REPOSITORY}."
              exit 1
            fi
            should_run="false"
            skip_reason="Node release tag '${tee_tag}' is not published yet."
          fi

          kms_tag=""
          kms_tag_source=""
          if [[ "${should_run}" == "true" && -n "${INPUT_KMS_TAG}" ]]; then
            kms_tag_source="input"
            kms_tag="${INPUT_KMS_TAG}"
            if ! release_exists "${kms_tag}"; then
              echo "::error::Input KMS release tag '${kms_tag}' not found in ${GITHUB_REPOSITORY}."
              exit 1
            fi
            if [[ "$(kms_release_has_required_assets "${kms_tag}")" != "true" ]]; then
              echo "::error::Input KMS release tag '${kms_tag}' is missing required e2e assets (compatibility map and profile policies)."
              exit 1
            fi
          elif [[ "${should_run}" == "true" ]]; then
            default_kms_tag="mero-kms-v${version}"
            if wait_for_release_tag "${default_kms_tag}" 12 10 && [[ "$(kms_release_has_required_assets "${default_kms_tag}")" == "true" ]]; then
              kms_tag="${default_kms_tag}"
              kms_tag_source="default-for-version"
            else
              if [[ "${strict_release_mode}" == "true" ]]; then
                echo "::error::Required KMS release '${default_kms_tag}' is missing or lacks required e2e assets (compatibility map and profile policies)."
                echo "::error::Release validation requires same-version node/KMS tags unless explicit kms_tag override is provided."
                exit 1
              fi
              should_run="false"
              skip_reason="KMS release '${default_kms_tag}' is not published with required e2e assets yet."
            fi
          fi

          if [[ "${should_run}" == "true" && ( -z "${kms_tag}" || -z "${kms_tag_source}" ) ]]; then
            if [[ "${strict_release_mode}" == "true" ]]; then
              echo "::error::Could not resolve KMS tag selection."
              exit 1
            fi
            should_run="false"
            skip_reason="Could not resolve KMS tag selection for this release yet."
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tee_tag=${tee_tag}" >> "${GITHUB_OUTPUT}"
          echo "kms_tag=${kms_tag}" >> "${GITHUB_OUTPUT}"
          echo "kms_tag_source=${kms_tag_source}" >> "${GITHUB_OUTPUT}"
          echo "should_run=${should_run}" >> "${GITHUB_OUTPUT}"
          echo "skip_reason=${skip_reason}" >> "${GITHUB_OUTPUT}"
          echo "strict_release_mode=${strict_release_mode}" >> "${GITHUB_OUTPUT}"
          echo "probe_workflow_ref=${probe_workflow_ref}" >> "${GITHUB_OUTPUT}"
          echo "probe_expected_sha=${probe_expected_sha}" >> "${GITHUB_OUTPUT}"

      - name: Skip e2e until compatible releases are available
        if: ${{ steps.resolve.outputs.should_run != 'true' }}
        run: |
          {
            echo "## Post-release e2e compatibility matrix"
            echo ""
            echo "- Status: skipped"
            echo "- Reason: ${{ steps.resolve.outputs.skip_reason }}"
            echo "- Node release tag: ${{ steps.resolve.outputs.tee_tag || 'unknown' }}"
            echo "- KMS release tag: ${{ steps.resolve.outputs.kms_tag || 'unresolved' }}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Download release assets
        if: ${{ steps.resolve.outputs.should_run == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TEE_TAG: ${{ steps.resolve.outputs.tee_tag }}
          KMS_TAG: ${{ steps.resolve.outputs.kms_tag }}
        run: |
          set -euo pipefail

          mkdir -p e2e/node e2e/kms-release e2e/kms-probe

          gh release download "${TEE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "published-mrtds.json" \
            --dir e2e/node
          gh release download "${TEE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "release-provenance.json" \
            --dir e2e/node

          for asset in \
            "kms-phala-compatibility-map.json" \
            "kms-phala-release-manifest.json" \
            "kms-phala-attestation-policy.debug.json" \
            "kms-phala-attestation-policy.debug-read-only.json" \
            "kms-phala-attestation-policy.locked-read-only.json"; do
            gh release download "${KMS_TAG}" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern "${asset}" \
              --dir e2e/kms-release
          done

      - name: Probe released KMS and verify strict profile matrix
        if: ${{ steps.resolve.outputs.should_run == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          KMS_TAG: ${{ steps.resolve.outputs.kms_tag }}
          TEE_TAG: ${{ steps.resolve.outputs.tee_tag }}
          RELEASE_VERSION: ${{ steps.resolve.outputs.version }}
          STRICT_RELEASE_MODE: ${{ steps.resolve.outputs.strict_release_mode }}
          PROBE_WORKFLOW_REF: ${{ steps.resolve.outputs.probe_workflow_ref }}
          PROBE_EXPECTED_SHA: ${{ steps.resolve.outputs.probe_expected_sha }}
        run: |
          set -euo pipefail

          if [[ -z "${PROBE_WORKFLOW_REF}" ]]; then
            echo "::error::Missing probe workflow ref."
            exit 1
          fi
          if [[ -z "${PROBE_EXPECTED_SHA}" ]]; then
            echo "::error::Missing probe expected SHA."
            exit 1
          fi

          compatibility_map="e2e/kms-release/kms-phala-compatibility-map.json"
          if [[ ! -f "${compatibility_map}" ]]; then
            echo "::error::Missing compatibility map asset: ${compatibility_map}"
            exit 1
          fi

          has_immutable_profile_digests="false"
          if jq -e '
            (.compatibility.profiles.debug.kms_image_digest | type == "string" and test("^sha256:[A-Fa-f0-9]{64}$")) and
            (.compatibility.profiles["debug-read-only"].kms_image_digest | type == "string" and test("^sha256:[A-Fa-f0-9]{64}$")) and
            (.compatibility.profiles["locked-read-only"].kms_image_digest | type == "string" and test("^sha256:[A-Fa-f0-9]{64}$"))
          ' "${compatibility_map}" >/dev/null 2>&1; then
            has_immutable_profile_digests="true"
          fi

          if [[ "${has_immutable_profile_digests}" != "true" ]]; then
            reason="Selected KMS release '${KMS_TAG}' lacks immutable per-profile image digests in kms-phala-compatibility-map.json."
            if [[ "${EVENT_NAME}" == "workflow_dispatch" || "${STRICT_RELEASE_MODE}" == "true" ]]; then
              echo "::error::${reason}"
              echo "::error::Run with a newer KMS tag that includes kms_image_digest for all profiles."
              exit 1
            fi

            echo "::warning::${reason} Skipping strict per-profile probe until a newer KMS release is published."
            {
              echo "## Post-release e2e compatibility matrix"
              echo ""
              echo "- Status: skipped"
              echo "- Reason: ${reason}"
              echo "- Node release tag: ${{ steps.resolve.outputs.tee_tag }}"
              echo "- KMS release tag: ${KMS_TAG}"
              echo "- KMS tag source: ${{ steps.resolve.outputs.kms_tag_source }}"
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          has_distinct_kms_profile_measurements="$(
            python3 - "e2e/kms-release" <<'PY'
          import json
          import pathlib
          import sys

          release_dir = pathlib.Path(sys.argv[1])
          profiles = ["debug", "debug-read-only", "locked-read-only"]
          keys = ["kms_allowed_mrtd", "kms_allowed_rtmr0", "kms_allowed_rtmr1", "kms_allowed_rtmr2", "kms_allowed_rtmr3"]

          def norm(values):
              normalized = []
              for value in values or []:
                  if isinstance(value, str):
                      candidate = value.strip().lower().removeprefix("0x")
                      if candidate:
                          normalized.append(candidate)
              return sorted(set(normalized))

          snapshots = {}
          for profile in profiles:
              policy_path = release_dir / f"kms-phala-attestation-policy.{profile}.json"
              payload = json.loads(policy_path.read_text(encoding="utf-8"))
              policy = payload.get("policy", {})
              snapshots[profile] = tuple(tuple(norm(policy.get(key, []))) for key in keys)

          pairs = [
              ("debug", "debug-read-only"),
              ("debug", "locked-read-only"),
              ("debug-read-only", "locked-read-only"),
          ]
          identical = [f"{left} vs {right}" for left, right in pairs if snapshots[left] == snapshots[right]]
          if identical:
              print("false:" + ", ".join(identical))
          else:
              print("true")
          PY
          )"

          if [[ "${has_distinct_kms_profile_measurements}" != "true" ]]; then
            collapsed_pairs="${has_distinct_kms_profile_measurements#false:}"
            reason="Selected KMS release '${KMS_TAG}' has identical KMS measurement allowlists across profiles (${collapsed_pairs})."
            if [[ "${EVENT_NAME}" == "workflow_dispatch" || "${STRICT_RELEASE_MODE}" == "true" ]]; then
              echo "::error::${reason}"
              echo "::error::Run with a newer KMS tag where debug/debug-read-only/locked-read-only KMS measurements differ."
              exit 1
            fi

            echo "::warning::${reason} Skipping strict per-profile probe until a newer KMS release is published."
            {
              echo "## Post-release e2e compatibility matrix"
              echo ""
              echo "- Status: skipped"
              echo "- Reason: ${reason}"
              echo "- Node release tag: ${{ steps.resolve.outputs.tee_tag }}"
              echo "- KMS release tag: ${KMS_TAG}"
              echo "- KMS tag source: ${{ steps.resolve.outputs.kms_tag_source }}"
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          probe_run_urls=()
          locked_probe_candidates_file=""
          cross_profile_locked_kms_base_url=""
          cross_profile_kms_run_url=""
          cross_profile_kms_run_id=""
          version_slug="${RELEASE_VERSION//./-}"
          release_manifest="e2e/kms-release/kms-phala-release-manifest.json"
          release_probe_run_id="$(jq -r '.workflow_run_id // empty' "${release_manifest}" 2>/dev/null || true)"
          release_probe_run_attempt="$(jq -r '.workflow_run_attempt // empty' "${release_manifest}" 2>/dev/null || true)"

          for profile in debug debug-read-only locked-read-only; do
            profile_digest="$(jq -r --arg profile "${profile}" '.compatibility.profiles[$profile].kms_image_digest // empty' "${compatibility_map}")"
            profile_tag="$(jq -r --arg profile "${profile}" '.compatibility.profiles[$profile].kms_image_tag // empty' "${compatibility_map}")"
            if [[ -n "${profile_digest}" ]]; then
              image_ref="ghcr.io/${GITHUB_REPOSITORY_OWNER}/mero-kms-phala@${profile_digest}"
            elif [[ -n "${profile_tag}" ]]; then
              image_ref="ghcr.io/${GITHUB_REPOSITORY_OWNER}/mero-kms-phala:${profile_tag}"
            else
              echo "::error::Could not resolve KMS image reference for profile '${profile}' from compatibility map."
              exit 1
            fi

            deployment_name_candidates=("kms-profile-${version_slug}-${profile}")
            if [[ -n "${release_probe_run_id}" && -n "${release_probe_run_attempt}" ]]; then
              legacy_deployment_name="kms-profile-${version_slug}-${profile}-${release_probe_run_id}-${release_probe_run_attempt}"
              if [[ "${legacy_deployment_name}" != "${deployment_name_candidates[0]}" ]]; then
                deployment_name_candidates+=("${legacy_deployment_name}")
              fi
            fi

            probe_validated="false"
            last_probe_validation_error=""
            selected_probe_candidates_file=""

            candidate_index=0
            for deployment_name in "${deployment_name_candidates[@]}"; do
              candidate_index=$((candidate_index + 1))
              probe_label="post-release-e2e-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${profile}-dn${candidate_index}"
              expected_display_title="KMS staging probe (${probe_label})"
              dispatch_started_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
              gh workflow run "kms-phala-staging-probe.yaml" \
                --repo "${GITHUB_REPOSITORY}" \
                --ref "${PROBE_WORKFLOW_REF}" \
                -f kms_image="${image_ref}" \
                -f kms_tag="pinned" \
                -f probe_label="${probe_label}" \
                -f deployment_name="${deployment_name}"

              probe_run_id=""
              for attempt in $(seq 1 90); do
                probe_run_id="$(gh run list \
                  --repo "${GITHUB_REPOSITORY}" \
                  --workflow "kms-phala-staging-probe.yaml" \
                  --event workflow_dispatch \
                  --limit 10 \
                  --json databaseId,createdAt,displayTitle \
                  --jq '[.[] | select(.createdAt >= "'"${dispatch_started_at}"'" and .displayTitle == "'"${expected_display_title}"'")] | sort_by(.createdAt) | reverse | .[0].databaseId // empty' 2>/dev/null || true)"
                if [[ -z "${probe_run_id}" ]]; then
                  probe_run_id="$(gh run list \
                    --repo "${GITHUB_REPOSITORY}" \
                    --workflow "kms-phala-staging-probe.yaml" \
                    --event workflow_dispatch \
                    --limit 10 \
                    --json databaseId,createdAt \
                    --jq '[.[] | select(.createdAt >= "'"${dispatch_started_at}"'")] | sort_by(.createdAt) | reverse | .[0].databaseId // empty' 2>/dev/null || true)"
                fi
                if [[ -n "${probe_run_id}" ]]; then
                  break
                fi
                sleep 10
              done

              if [[ -z "${probe_run_id}" ]]; then
                echo "::error::Could not resolve kms-phala-staging-probe workflow run ID for profile '${profile}'"
                exit 1
              fi
              probe_run_head_sha="$(gh run view "${probe_run_id}" --repo "${GITHUB_REPOSITORY}" --json headSha --jq '.headSha // empty')"
              if [[ -z "${probe_run_head_sha}" ]]; then
                echo "::error::Could not read head SHA for probe run ${probe_run_id}"
                exit 1
              fi
              if [[ "${probe_run_head_sha}" != "${PROBE_EXPECTED_SHA}" ]]; then
                echo "::error::Probe run ${probe_run_id} used unexpected head SHA ${probe_run_head_sha}; expected ${PROBE_EXPECTED_SHA}."
                echo "::error::Refusing to validate release with probe artifacts from a different revision."
                exit 1
              fi

              if ! timeout 2700s gh run watch "${probe_run_id}" --repo "${GITHUB_REPOSITORY}" --interval 20 --exit-status; then
                echo "::error::Timed out or failed while waiting for probe run ${probe_run_id}"
                exit 1
              fi
              probe_run_urls+=("https://github.com/${GITHUB_REPOSITORY}/actions/runs/${probe_run_id}")

              probe_artifact_name="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${probe_run_id}/artifacts" \
                --jq '.artifacts | map(select(.expired == false and (.name | startswith("kms-staging-probe-")))) | sort_by(.created_at) | reverse | .[0].name // ""')"
              if [[ -z "${probe_artifact_name}" ]]; then
                echo "::error::No non-expired kms-staging-probe artifact found for run ${probe_run_id}"
                exit 1
              fi

              profile_probe_dir="e2e/kms-probe/${profile}/dn${candidate_index}"
              mkdir -p "${profile_probe_dir}"
              gh run download "${probe_run_id}" \
                --repo "${GITHUB_REPOSITORY}" \
                --name "${probe_artifact_name}" \
                --dir "${profile_probe_dir}"

              kms_probe_candidates_file="$(python3 - "${profile_probe_dir}" <<'PY'
          import pathlib
          import sys
          base = pathlib.Path(sys.argv[1])
          matches = sorted(base.rglob("kms-policy-candidates.json"))
          print(matches[0] if matches else "")
          PY
              )"
              if [[ -z "${kms_probe_candidates_file}" ]]; then
                echo "::error::Could not locate kms-policy-candidates.json for profile '${profile}'"
                exit 1
              fi

              if probe_validation_output="$(python3 - "${profile}" "${kms_probe_candidates_file}" "e2e/kms-release" <<'PY'
          import json
          import pathlib
          import sys

          profile = sys.argv[1]
          probe_file = pathlib.Path(sys.argv[2])
          release_dir = pathlib.Path(sys.argv[3])
          policy_file = release_dir / f"kms-phala-attestation-policy.{profile}.json"

          def normalize(values):
              out = []
              for value in values:
                  if isinstance(value, str):
                      candidate = value.strip().lower().removeprefix("0x")
                      if candidate:
                          out.append(candidate)
              return out

          probe_payload = json.loads(probe_file.read_text(encoding="utf-8"))
          probe_policy = probe_payload.get("policy", {})
          release_payload = json.loads(policy_file.read_text(encoding="utf-8"))
          release_policy = release_payload.get("policy", {})

          keys = [
              "allowed_tcb_statuses",
              "allowed_mrtd",
              "allowed_rtmr0",
              "allowed_rtmr1",
              "allowed_rtmr2",
              "allowed_rtmr3",
          ]
          for key in keys:
              probe_values = normalize(probe_policy.get(key, []))
              release_values = normalize(release_policy.get(f"kms_{key}", release_policy.get(key, [])))
              if not probe_values:
                  raise SystemExit(f"[post-release-e2e] ERROR: missing probe values for {profile}.{key}")
              if not release_values:
                  raise SystemExit(f"[post-release-e2e] ERROR: missing release policy values for {profile}.{key}")
              if not set(probe_values).issubset(set(release_values)):
                  raise SystemExit(
                      "[post-release-e2e] ERROR: probe values are not covered by release policy "
                      f"for profile={profile} key={key}"
                  )
          print(f"[post-release-e2e] OK: probed KMS measurements match release policy for profile={profile}")
          PY
              )"; then
                echo "${probe_validation_output}"
                probe_validated="true"
                selected_probe_candidates_file="${kms_probe_candidates_file}"
                break
              fi

              last_probe_validation_error="${probe_validation_output}"
              echo "::warning::Probe validation failed for profile '${profile}' with deployment '${deployment_name}'."
              echo "::warning::${probe_validation_output}"
            done

            if [[ "${probe_validated}" != "true" ]]; then
              reason="Selected KMS release '${KMS_TAG}' produced probe measurements outside published profile policy for '${profile}' after ${#deployment_name_candidates[@]} deployment name attempt(s)."
              if [[ "${EVENT_NAME}" == "workflow_dispatch" || "${STRICT_RELEASE_MODE}" == "true" ]]; then
                echo "::error::${reason}"
                if [[ -n "${last_probe_validation_error}" ]]; then
                  echo "::error::${last_probe_validation_error}"
                fi
                exit 1
              fi

              echo "::warning::${reason} Skipping strict per-profile probe until a newer KMS release is published."
              if [[ -n "${last_probe_validation_error}" ]]; then
                echo "::warning::${last_probe_validation_error}"
              fi
              {
                echo "## Post-release e2e compatibility matrix"
                echo ""
                echo "- Status: skipped"
                echo "- Reason: ${reason}"
                echo "- Node release tag: ${{ steps.resolve.outputs.tee_tag }}"
                echo "- KMS release tag: ${KMS_TAG}"
                echo "- KMS tag source: ${{ steps.resolve.outputs.kms_tag_source }}"
              } >> "${GITHUB_STEP_SUMMARY}"
              exit 0
            fi

            if [[ "${profile}" == "locked-read-only" ]]; then
              locked_probe_candidates_file="${selected_probe_candidates_file}"
            fi
          done

          if [[ -z "${locked_probe_candidates_file}" ]]; then
            echo "::error::Did not capture locked-read-only probe candidates."
            exit 1
          fi

          locked_profile_digest="$(jq -r '.compatibility.profiles["locked-read-only"].kms_image_digest // empty' "${compatibility_map}")"
          locked_profile_tag="$(jq -r '.compatibility.profiles["locked-read-only"].kms_image_tag // empty' "${compatibility_map}")"
          if [[ -n "${locked_profile_digest}" ]]; then
            cross_profile_locked_image_ref="ghcr.io/${GITHUB_REPOSITORY_OWNER}/mero-kms-phala@${locked_profile_digest}"
          elif [[ -n "${locked_profile_tag}" ]]; then
            cross_profile_locked_image_ref="ghcr.io/${GITHUB_REPOSITORY_OWNER}/mero-kms-phala:${locked_profile_tag}"
          else
            echo "::error::Could not resolve locked-read-only KMS image reference for cross-profile runtime check."
            exit 1
          fi

          cross_profile_probe_label="post-release-cross-profile-kms-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cross_profile_expected_title="KMS staging probe (${cross_profile_probe_label})"
          cross_profile_deployment_name="kms-cross-profile-${version_slug}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cross_profile_dispatch_started_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          gh workflow run "kms-phala-staging-probe.yaml" \
            --repo "${GITHUB_REPOSITORY}" \
            --ref "${PROBE_WORKFLOW_REF}" \
            -f kms_image="${cross_profile_locked_image_ref}" \
            -f kms_tag="pinned" \
            -f probe_label="${cross_profile_probe_label}" \
            -f deployment_name="${cross_profile_deployment_name}" \
            -f hold_after_upload_seconds="2400"

          for attempt in $(seq 1 90); do
            cross_profile_kms_run_id="$(gh run list \
              --repo "${GITHUB_REPOSITORY}" \
              --workflow "kms-phala-staging-probe.yaml" \
              --event workflow_dispatch \
              --limit 10 \
              --json databaseId,createdAt,displayTitle \
              --jq '[.[] | select(.createdAt >= "'"${cross_profile_dispatch_started_at}"'" and .displayTitle == "'"${cross_profile_expected_title}"'")] | sort_by(.createdAt) | reverse | .[0].databaseId // empty' 2>/dev/null || true)"
            if [[ -z "${cross_profile_kms_run_id}" ]]; then
              cross_profile_kms_run_id="$(gh run list \
                --repo "${GITHUB_REPOSITORY}" \
                --workflow "kms-phala-staging-probe.yaml" \
                --event workflow_dispatch \
                --limit 10 \
                --json databaseId,createdAt \
                --jq '[.[] | select(.createdAt >= "'"${cross_profile_dispatch_started_at}"'")] | sort_by(.createdAt) | reverse | .[0].databaseId // empty' 2>/dev/null || true)"
            fi
            if [[ -n "${cross_profile_kms_run_id}" ]]; then
              break
            fi
            sleep 10
          done
          if [[ -z "${cross_profile_kms_run_id}" ]]; then
            echo "::error::Could not resolve cross-profile live locked KMS probe run ID."
            exit 1
          fi
          cross_profile_kms_head_sha="$(gh run view "${cross_profile_kms_run_id}" --repo "${GITHUB_REPOSITORY}" --json headSha --jq '.headSha // empty')"
          if [[ -z "${cross_profile_kms_head_sha}" ]]; then
            echo "::error::Could not read head SHA for cross-profile KMS probe run ${cross_profile_kms_run_id}"
            exit 1
          fi
          if [[ "${cross_profile_kms_head_sha}" != "${PROBE_EXPECTED_SHA}" ]]; then
            echo "::error::Cross-profile KMS probe run ${cross_profile_kms_run_id} used unexpected head SHA ${cross_profile_kms_head_sha}; expected ${PROBE_EXPECTED_SHA}."
            echo "::error::Refusing to validate release with probe artifacts from a different revision."
            exit 1
          fi
          cross_profile_kms_run_url="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${cross_profile_kms_run_id}"

          cross_profile_probe_dir="e2e/kms-probe/locked-read-only/cross-profile-live"
          mkdir -p "${cross_profile_probe_dir}"
          cross_profile_artifact_name=""
          cross_profile_artifact_downloaded="false"
          artifact_poll_deadline=$(( $(date +%s) + 3600 ))
          while [[ "$(date +%s)" -lt "${artifact_poll_deadline}" ]]; do
            cross_profile_artifact_name="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${cross_profile_kms_run_id}/artifacts" \
              --jq '.artifacts | map(select(.expired == false and (.name | startswith("kms-staging-probe-")))) | sort_by(.created_at) | reverse | .[0].name // ""' 2>/dev/null || true)"
            if [[ -n "${cross_profile_artifact_name}" ]]; then
              if gh run download "${cross_profile_kms_run_id}" \
                --repo "${GITHUB_REPOSITORY}" \
                --name "${cross_profile_artifact_name}" \
                --dir "${cross_profile_probe_dir}" >/dev/null 2>&1; then
                cross_profile_artifact_downloaded="true"
                break
              fi
            fi

            run_state="$(gh run view "${cross_profile_kms_run_id}" \
              --repo "${GITHUB_REPOSITORY}" \
              --json status,conclusion \
              --jq '.status + ":" + (.conclusion // "")' 2>/dev/null || true)"
            run_status="${run_state%%:*}"
            run_conclusion="${run_state#*:}"
            if [[ "${run_status}" == "completed" ]]; then
              if [[ -z "${run_conclusion}" ]]; then
                run_conclusion="unknown"
              fi
              echo "::error::Cross-profile locked KMS probe run ${cross_profile_kms_run_id} completed (conclusion=${run_conclusion}) before probe artifacts became available."
              echo "::error::Run URL: ${cross_profile_kms_run_url}"
              exit 1
            fi
            sleep 10
          done
          if [[ "${cross_profile_artifact_downloaded}" != "true" ]]; then
            echo "::error::Timed out waiting (60m) for cross-profile locked KMS probe artifacts from run ${cross_profile_kms_run_id}."
            echo "::error::Run URL: ${cross_profile_kms_run_url}"
            exit 1
          fi

          cross_profile_kms_context_file="$(python3 - "${cross_profile_probe_dir}" <<'PY'
          import pathlib
          import sys
          base = pathlib.Path(sys.argv[1])
          matches = sorted(base.rglob("attestation-context.json"))
          print(matches[0] if matches else "")
          PY
          )"
          if [[ -z "${cross_profile_kms_context_file}" ]]; then
            echo "::error::Could not locate attestation-context.json for cross-profile locked KMS probe."
            exit 1
          fi
          cross_profile_locked_kms_base_url="$(jq -r '.base_url // empty' "${cross_profile_kms_context_file}")"
          if [[ -z "${cross_profile_locked_kms_base_url}" ]]; then
            echo "::error::Cross-profile locked KMS probe context is missing base_url."
            exit 1
          fi

          node_release_provenance="e2e/node/release-provenance.json"
          node_published_policy="e2e/node/published-mrtds.json"
          if [[ ! -f "${node_release_provenance}" ]]; then
            echo "::error::Missing node release provenance asset: ${node_release_provenance}"
            exit 1
          fi
          if [[ ! -f "${node_published_policy}" ]]; then
            echo "::error::Missing node policy asset: ${node_published_policy}"
            exit 1
          fi

          node_probe_run_urls=()
          for profile in debug debug-read-only locked-read-only; do
            node_image_name="$(jq -r --arg profile "${profile}" '.profiles[$profile].image.name // empty' "${node_release_provenance}")"
            node_image_project="$(jq -r --arg profile "${profile}" '.profiles[$profile].image.project // empty' "${node_release_provenance}")"
            node_zone="$(jq -r --arg profile "${profile}" '.profiles[$profile].attestation_context.zone // empty' "${node_release_provenance}")"
            node_admin_port="$(python3 - "${node_release_provenance}" "${profile}" <<'PY'
          import json
          import pathlib
          import sys
          import urllib.parse

          payload = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8"))
          profile = sys.argv[2]
          base_url = (
              payload.get("profiles", {})
              .get(profile, {})
              .get("attestation_context", {})
              .get("base_url", "")
          )
          if not base_url:
              print("80")
              raise SystemExit(0)
          parsed = urllib.parse.urlparse(base_url)
          if parsed.port:
              print(str(parsed.port))
          elif parsed.scheme == "https":
              print("443")
          else:
              print("80")
          PY
            )"

            if [[ -z "${node_image_name}" || -z "${node_image_project}" || -z "${node_zone}" ]]; then
              echo "::error::Node release provenance missing image metadata for profile '${profile}'"
              exit 1
            fi

            node_probe_label="post-release-node-e2e-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${profile}"
            expected_node_title="Node GCP staging probe (${node_probe_label})"
            node_deployment_name="tdx-e2e-${version_slug}-${profile}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
            node_dispatch_started_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

            node_dispatch_args=(
              -f probe_label="${node_probe_label}"
              -f deployment_name="${node_deployment_name}"
              -f profile="${profile}"
              -f image_name="${node_image_name}"
              -f image_project="${node_image_project}"
              -f vm_project="${node_image_project}"
              -f vm_zone="${node_zone}"
              -f admin_api_port="${node_admin_port}"
            )
            if [[ "${profile}" == "debug" ]]; then
              node_dispatch_args+=(
                -f kms_probe_url="${cross_profile_locked_kms_base_url}"
                -f kms_probe_expected_outcome="failure"
                -f kms_probe_expected_codes="KMS_PROFILE_POLICY_REJECTED,KMS_GET_KEY_REJECTED"
              )
            fi

            gh workflow run "node-image-gcp-staging-probe.yaml" \
              --repo "${GITHUB_REPOSITORY}" \
              --ref "${PROBE_WORKFLOW_REF}" \
              "${node_dispatch_args[@]}"

            node_probe_run_id=""
            for attempt in $(seq 1 90); do
              node_probe_run_id="$(gh run list \
                --repo "${GITHUB_REPOSITORY}" \
                --workflow "node-image-gcp-staging-probe.yaml" \
                --event workflow_dispatch \
                --limit 10 \
                --json databaseId,createdAt,displayTitle \
                --jq '[.[] | select(.createdAt >= "'"${node_dispatch_started_at}"'" and .displayTitle == "'"${expected_node_title}"'")] | sort_by(.createdAt) | reverse | .[0].databaseId // empty' 2>/dev/null || true)"
              if [[ -z "${node_probe_run_id}" ]]; then
                node_probe_run_id="$(gh run list \
                  --repo "${GITHUB_REPOSITORY}" \
                  --workflow "node-image-gcp-staging-probe.yaml" \
                  --event workflow_dispatch \
                  --limit 10 \
                  --json databaseId,createdAt \
                  --jq '[.[] | select(.createdAt >= "'"${node_dispatch_started_at}"'")] | sort_by(.createdAt) | reverse | .[0].databaseId // empty' 2>/dev/null || true)"
              fi
              if [[ -n "${node_probe_run_id}" ]]; then
                break
              fi
              sleep 10
            done

            if [[ -z "${node_probe_run_id}" ]]; then
              echo "::error::Could not resolve node-image-gcp-staging-probe workflow run ID for profile '${profile}'"
              exit 1
            fi
            node_probe_run_head_sha="$(gh run view "${node_probe_run_id}" --repo "${GITHUB_REPOSITORY}" --json headSha --jq '.headSha // empty')"
            if [[ -z "${node_probe_run_head_sha}" ]]; then
              echo "::error::Could not read head SHA for node probe run ${node_probe_run_id}"
              exit 1
            fi
            if [[ "${node_probe_run_head_sha}" != "${PROBE_EXPECTED_SHA}" ]]; then
              echo "::error::Node probe run ${node_probe_run_id} used unexpected head SHA ${node_probe_run_head_sha}; expected ${PROBE_EXPECTED_SHA}."
              echo "::error::Refusing to validate release with probe artifacts from a different revision."
              exit 1
            fi

            if ! timeout 2700s gh run watch "${node_probe_run_id}" --repo "${GITHUB_REPOSITORY}" --interval 20 --exit-status; then
              echo "::error::Timed out or failed while waiting for node probe run ${node_probe_run_id}"
              exit 1
            fi
            node_probe_run_urls+=("https://github.com/${GITHUB_REPOSITORY}/actions/runs/${node_probe_run_id}")

            node_artifact_name="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${node_probe_run_id}/artifacts" \
              --jq '.artifacts | map(select(.expired == false and (.name | startswith("node-gcp-staging-probe-")))) | sort_by(.created_at) | reverse | .[0].name // ""')"
            if [[ -z "${node_artifact_name}" ]]; then
              echo "::error::No non-expired node probe artifact found for run ${node_probe_run_id}"
              exit 1
            fi

            node_probe_dir="e2e/node-probe/${profile}"
            mkdir -p "${node_probe_dir}"
            gh run download "${node_probe_run_id}" \
              --repo "${GITHUB_REPOSITORY}" \
              --name "${node_artifact_name}" \
              --dir "${node_probe_dir}"

            node_probe_candidates_file="$(python3 - "${node_probe_dir}" <<'PY'
          import pathlib
          import sys
          base = pathlib.Path(sys.argv[1])
          matches = sorted(base.rglob("measurement-policy-candidates.json"))
          print(matches[0] if matches else "")
          PY
            )"
            if [[ -z "${node_probe_candidates_file}" ]]; then
              echo "::error::Could not locate measurement-policy-candidates.json for node profile '${profile}'"
              exit 1
            fi

            cp "${node_probe_candidates_file}" "e2e/node/measurement-policy-candidates-${profile}.json"

            node_client_verification_file="$(python3 - "${node_probe_dir}" <<'PY'
          import pathlib
          import sys
          base = pathlib.Path(sys.argv[1])
          matches = sorted(base.rglob("node-client-verification.json"))
          print(matches[0] if matches else "")
          PY
            )"
            if [[ -z "${node_client_verification_file}" ]]; then
              echo "::error::Could not locate node-client-verification.json for node profile '${profile}'"
              exit 1
            fi
            cp "${node_client_verification_file}" "e2e/node/node-client-verification-${profile}.json"

            python3 - "${profile}" "${node_probe_candidates_file}" "${node_published_policy}" <<'PY'
          import json
          import pathlib
          import sys

          profile = sys.argv[1]
          probe_file = pathlib.Path(sys.argv[2])
          published_file = pathlib.Path(sys.argv[3])

          def normalize(values):
              out = []
              for value in values:
                  if isinstance(value, str):
                      candidate = value.strip().lower().removeprefix("0x")
                      if candidate:
                          out.append(candidate)
              return out

          probe_payload = json.loads(probe_file.read_text(encoding="utf-8"))
          probe_policy = probe_payload.get("policy", {})
          published_payload = json.loads(published_file.read_text(encoding="utf-8"))
          published_profile = published_payload.get("profiles", {}).get(profile, {})

          keys = [
              "allowed_tcb_statuses",
              "allowed_mrtd",
              "allowed_rtmr0",
              "allowed_rtmr1",
              "allowed_rtmr2",
              "allowed_rtmr3",
          ]
          for key in keys:
              probe_values = normalize(probe_policy.get(key, []))
              published_values = normalize(published_profile.get(key, []))
              if not probe_values:
                  raise SystemExit(f"[post-release-e2e] ERROR: missing node probe values for {profile}.{key}")
              if not published_values:
                  raise SystemExit(f"[post-release-e2e] ERROR: missing published node policy values for {profile}.{key}")
              if not set(probe_values).issubset(set(published_values)):
                  raise SystemExit(
                      "[post-release-e2e] ERROR: node probe values are not covered by published policy "
                      f"for profile={profile} key={key}"
                  )
          print(f"[post-release-e2e] OK: probed node measurements match published policy for profile={profile}")
          PY

            python3 - "${profile}" "${node_client_verification_file}" <<'PY'
          import json
          import pathlib
          import sys

          profile = sys.argv[1]
          verification_file = pathlib.Path(sys.argv[2])
          payload = json.loads(verification_file.read_text(encoding="utf-8"))
          checks = payload.get("checks", {})

          def assert_true(path: str, value):
              if value is not True:
                  raise SystemExit(
                      f"[post-release-e2e] ERROR: node client verification check failed for profile={profile}: {path} expected true, got {value!r}"
                  )

          assert_true("checks.positive.passed", checks.get("positive", {}).get("passed"))
          assert_true("checks.wrong_nonce.rejected", checks.get("wrong_nonce", {}).get("rejected"))
          assert_true("checks.tampered_quote.rejected", checks.get("tampered_quote", {}).get("rejected"))
          assert_true(
              "checks.wrong_expected_application_hash.rejected",
              checks.get("wrong_expected_application_hash", {}).get("rejected"),
          )
          print(
              "[post-release-e2e] OK: node client-side anti-fake verification checks passed "
              f"for profile={profile}"
          )
          PY

            if [[ "${profile}" == "debug" ]]; then
              node_kms_probe_result_file="$(python3 - "${node_probe_dir}" <<'PY'
          import pathlib
          import sys
          base = pathlib.Path(sys.argv[1])
          matches = sorted(base.rglob("node-kms-probe-result.json"))
          print(matches[0] if matches else "")
          PY
              )"
              if [[ -z "${node_kms_probe_result_file}" ]]; then
                echo "::error::Could not locate node-kms-probe-result.json for debug profile"
                exit 1
              fi
              cp "${node_kms_probe_result_file}" "e2e/node/node-kms-probe-debug-to-locked.json"

              python3 - "${node_kms_probe_result_file}" <<'PY'
          import json
          import pathlib
          import sys

          probe_file = pathlib.Path(sys.argv[1])
          payload = json.loads(probe_file.read_text(encoding="utf-8"))
          expected_outcome = payload.get("expected_outcome")
          probe = payload.get("probe", {})
          checks = payload.get("checks", {})
          expected_codes = payload.get("expected_codes") or []
          code = probe.get("code")
          ok = probe.get("ok")

          if expected_outcome != "failure":
              raise SystemExit(
                  f"[post-release-e2e] ERROR: expected_outcome must be 'failure' for debug->locked probe, got {expected_outcome!r}"
              )
          if ok is not False:
              raise SystemExit(
                  f"[post-release-e2e] ERROR: debug node unexpectedly succeeded against locked KMS (probe.ok={ok!r})"
              )
          if checks.get("outcome_matches") is not True:
              raise SystemExit(
                  "[post-release-e2e] ERROR: debug->locked probe outcome did not match expected failure"
              )
          if checks.get("expected_code_matches") is not True:
              raise SystemExit(
                  f"[post-release-e2e] ERROR: debug->locked probe code {code!r} not in expected set {expected_codes!r}"
              )
          print(
              "[post-release-e2e] OK: debug node->locked KMS runtime probe failed as expected "
              f"(code={code})"
          )
          PY
            fi
          done

          if [[ -n "${cross_profile_kms_run_id}" ]]; then
            if ! timeout 3600s gh run watch "${cross_profile_kms_run_id}" --repo "${GITHUB_REPOSITORY}" --interval 20 --exit-status; then
              echo "::error::Timed out or failed while waiting for cross-profile KMS probe run ${cross_profile_kms_run_id}"
              exit 1
            fi
          fi

          bash scripts/release/e2e-verify-kms-node-compatibility.sh \
            e2e/node \
            e2e/kms-release \
            "${locked_probe_candidates_file}"

          probe_urls_json="$(printf '%s\n' "${probe_run_urls[@]}" | jq -R . | jq -s .)"
          probe_urls_markdown="$(jq -r '.[] | "- \(.)"' <<< "${probe_urls_json}")"
          node_probe_urls_json="$(printf '%s\n' "${node_probe_run_urls[@]}" | jq -R . | jq -s .)"
          node_probe_urls_markdown="$(jq -r '.[] | "- \(.)"' <<< "${node_probe_urls_json}")"

          {
            echo "## Post-release e2e compatibility matrix"
            echo ""
            echo "- Node release tag: ${{ steps.resolve.outputs.tee_tag }}"
            echo "- KMS release tag: ${KMS_TAG}"
            echo "- KMS tag source: ${{ steps.resolve.outputs.kms_tag_source }}"
            echo "- KMS profile probe runs:"
            echo "${probe_urls_markdown}"
            echo "- Cross-profile locked KMS run (held alive for debug-node runtime probe):"
            echo "- ${cross_profile_kms_run_url}"
            echo "- Node profile probe runs:"
            echo "${node_probe_urls_markdown}"
            echo "- Node client-side anti-fake checks: passed (quote verification + nonce/hash/tamper rejection)."
            echo "- Cross-profile runtime check: debug node -> locked-read-only KMS rejected as expected."
            echo "- Result: strict profile allow/deny matrix verified."
          } >> "${GITHUB_STEP_SUMMARY}"
