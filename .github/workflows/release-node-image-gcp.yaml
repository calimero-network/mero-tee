              allowed_rtmr2,
              allowed_rtmr3
            }' artifacts/published-mrtds.json
            echo "\`\`\`"
            echo ""
            echo "#### Profile: debug-read-only"
            echo "\`\`\`json"
            jq '.profiles["debug-read-only"] | {
              mrtd,
              allowed_tcb_statuses,
              allowed_mrtd,
              allowed_rtmr0,
              allowed_rtmr1,
              allowed_rtmr2,
              allowed_rtmr3
            }' artifacts/published-mrtds.json
            echo "\`\`\`"
            echo ""
            echo "#### Profile: locked-read-only"
            echo "\`\`\`json"
            jq '.profiles["locked-read-only"] | {
              mrtd,
              allowed_tcb_statuses,
              allowed_mrtd,
              allowed_rtmr0,
              allowed_rtmr1,
              allowed_rtmr2,
              allowed_rtmr3
            }' artifacts/published-mrtds.json
            echo "\`\`\`"
            echo ""
            echo "### Verification commands"
            echo ""
            echo "**Quick verify (operator):**"
            echo "\`\`\`bash"
            echo "scripts/release/verify-node-image-gcp-release-assets.sh mero-tee-v${{ needs.preflight.outputs.image_version }}"
            echo "\`\`\`"
            echo ""
            echo "**Full audit (all release classes):**"
            echo "\`\`\`bash"
            echo "scripts/release/verify-release-assets.sh ${{ needs.preflight.outputs.image_version }}"
            echo "\`\`\`"
            echo ""
            echo "### Trust assets (detailed)"
            echo ""
            echo "| Asset | What it contains | Why operators need it |"
            echo "|---|---|---|"
            echo "| \`published-mrtds.json\` | Profile measurement policy (MRTD/RTMR allowlists) | Runtime quote measurement validation baseline |"
            echo "| \`release-provenance.json\` | Build/attestation metadata, compatibility references, and profile verification records | Audit and release-governance evidence |"
            echo "| \`node-image-gcp-release-sbom.spdx.json\` | SBOM for release trust artifacts | Supply-chain and compliance review |"
            echo "| \`node-image-gcp-checksums.txt\` | SHA-256 for release trust artifacts | Integrity verification before policy usage |"
            echo "| \`*.sig / *.pem\` | Sigstore keyless signatures/certificates | Verifiable provenance and authenticity checks |"
            echo ""
            echo "KMS-side profile policies for the matching release are linked via:"
            echo "- \`${kms_policy_url}\` (default/locked policy alias)"
            echo "- Profile-specific URLs in \`kms-phala-compatibility-map.json\` under \`.compatibility.profiles.*.kms_policy_url\`"
          } > artifacts/release-notes.md

          {
            echo "## Published MRTDs"
            echo ""
            echo "- Tag: ${{ needs.preflight.outputs.image_version }}"
            echo "- Debug MRTD: ${debug_mrtd_preview}"
            echo "- Debug read-only MRTD: ${debug_ro_mrtd_preview}"
            echo "- Locked read-only MRTD: ${locked_ro_mrtd_preview}"
            echo ""
            echo "### RTMRs"
            echo "| Profile | RTMR0 | RTMR1 | RTMR2 | RTMR3 |"
            echo "|---|---|---|---|---|"
            echo "| debug | ${debug_rtmr0_preview} | ${debug_rtmr1_preview} | ${debug_rtmr2_preview} | ${debug_rtmr3_preview} |"
            echo "| debug-read-only | ${debug_ro_rtmr0_preview} | ${debug_ro_rtmr1_preview} | ${debug_ro_rtmr2_preview} | ${debug_ro_rtmr3_preview} |"
            echo "| locked-read-only | ${locked_ro_rtmr0_preview} | ${locked_ro_rtmr1_preview} | ${locked_ro_rtmr2_preview} | ${locked_ro_rtmr3_preview} |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Install cosign for keyless signing
        uses: sigstore/cosign-installer@v3

      - name: Sign release assets with Sigstore keyless
        env:
          COSIGN_YES: "true"
        run: |
          assets=(
            "artifacts/published-mrtds.json"
            "artifacts/release-provenance.json"
            "artifacts/node-image-gcp-release-sbom.spdx.json"
            "artifacts/node-image-gcp-checksums.txt"
          )

          for asset in "${assets[@]}"; do
            if [[ ! -f "${asset}" ]]; then
              echo "Missing asset to sign: ${asset}"
              exit 1
            fi
            cosign sign-blob \
              --yes \
              --output-signature "${asset}.sig" \
              --output-certificate "${asset}.pem" \
              "${asset}"
          done

      - name: Verify generated signatures
        run: |
          assets=(
            "artifacts/published-mrtds.json"
            "artifacts/release-provenance.json"
            "artifacts/node-image-gcp-release-sbom.spdx.json"
            "artifacts/node-image-gcp-checksums.txt"
          )

          cert_identity_regex="^https://github.com/${GITHUB_REPOSITORY}/.github/workflows/release-node-image-gcp.yaml@refs/heads/master$"
          cert_oidc_issuer="https://token.actions.githubusercontent.com"

          for asset in "${assets[@]}"; do
            cosign verify-blob \
              --certificate "${asset}.pem" \
              --signature "${asset}.sig" \
              --certificate-identity-regexp "${cert_identity_regex}" \
              --certificate-oidc-issuer "${cert_oidc_issuer}" \
              "${asset}"
          done

      # If 403: add RELEASE_TOKEN or GHCR_PUSH_TOKEN (PAT with repo scope). If 404 "discussion category mismatch":
      # disable "Create a discussion for each release" in repo Settings → General → Releases.
      - name: Upload MRTD release assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN || secrets.GHCR_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          tag_name: mero-tee-v${{ needs.preflight.outputs.image_version }}
          make_latest: false
          body_path: artifacts/release-notes.md
          fail_on_unmatched_files: true
          files: |
            artifacts/published-mrtds.json
            artifacts/published-mrtds.json.sig
            artifacts/published-mrtds.json.pem
            artifacts/release-provenance.json
            artifacts/release-provenance.json.sig
            artifacts/release-provenance.json.pem
            artifacts/node-image-gcp-release-sbom.spdx.json
            artifacts/node-image-gcp-release-sbom.spdx.json.sig
            artifacts/node-image-gcp-release-sbom.spdx.json.pem
            artifacts/node-image-gcp-checksums.txt
            artifacts/node-image-gcp-checksums.txt.sig
            artifacts/node-image-gcp-checksums.txt.pem

      - name: Smoke test published release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          scripts/release/verify-node-image-gcp-release-assets.sh "mero-tee-v${{ needs.preflight.outputs.image_version }}"

      - name: Upsert umbrella version release links
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${{ needs.preflight.outputs.image_version }}"
          kms_tag="mero-kms-v${version}"
          tee_tag="mero-tee-v${version}"
          notes_file="$(mktemp)"
          {
            echo "## Consolidated release ${version}"
            echo
            echo "This is an index release that links to component releases:"
            echo
            echo "- mero-kms: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${kms_tag}"
            echo "- mero-tee: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${tee_tag}"
          } > "${notes_file}"

          if gh release view "${version}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${version}" --repo "${GITHUB_REPOSITORY}" --notes-file "${notes_file}" --title "${version}" --draft
          else
            gh release create "${version}" --repo "${GITHUB_REPOSITORY}" --title "${version}" --notes-file "${notes_file}" --target "${GITHUB_SHA}" --draft
          fi

