name: Release version sync guard

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "mero-kms/Cargo.toml"
      - "Cargo.lock"
      - "mero-tee/versions.json"
      - "scripts/policy/check_release_version_sync.sh"
      - ".github/workflows/release-version-sync-guard.yaml"
  push:
    branches:
      - master
    paths:
      - "Cargo.toml"
      - "mero-kms/Cargo.toml"
      - "Cargo.lock"
      - "mero-tee/versions.json"
      - "scripts/policy/check_release_version_sync.sh"
      - ".github/workflows/release-version-sync-guard.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-sync:
    name: Ensure KMS and merod versions stay in sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate sync script syntax
        id: syntax_check
        run: bash -n scripts/policy/check_release_version_sync.sh

      - name: Run release version sync guard
        id: sync_guard
        run: scripts/policy/check_release_version_sync.sh

      - name: Summarize sync guard outcomes
        if: ${{ always() }}
        run: |
          set -euo pipefail
          source scripts/ci/logging.sh
          result_line="$(ci_result "release-version-sync-guard" "${{ job.status }}" "VERSION_SYNC" "ref=${GITHUB_REF_NAME}" "run_id=${GITHUB_RUN_ID}")"
          ci_info "${result_line}"
          {
            echo "## Workflow Summary"
            echo ""
            echo "### Inputs / Targets"
            echo ""
            echo "- Ref: ${GITHUB_REF_NAME}"
            echo ""
            echo "### Check Outcomes"
            echo ""
            echo "- Syntax check: ${{ steps.syntax_check.outcome }}"
            echo "- Sync guard: ${{ steps.sync_guard.outcome }}"
            echo ""
            echo "### Result"
            echo ""
            echo "- Job status: ${{ job.status }}"
            echo "- ${result_line}"
            echo ""
            echo "### Artifacts"
            echo ""
            echo "- n/a"
            echo ""
            echo "### Next"
            echo ""
            echo "- Align Cargo, versions.json, and policy files when this guard fails."
          } >> "${GITHUB_STEP_SUMMARY}"
