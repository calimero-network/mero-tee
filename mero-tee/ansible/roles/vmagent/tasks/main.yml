---
- name: Create vmagent directories
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /etc/vmagent
    - /var/lib/vmagent

- name: Download vmagent archive from GitHub releases
  get_url:
    url: "https://github.com/VictoriaMetrics/VictoriaMetrics/releases/download/v{{ vmagent_version }}/vmutils-linux-{{ cpu_architecture }}-v{{ vmagent_version }}.tar.gz"
    dest: "/tmp/vmutils-linux-{{ cpu_architecture }}-v{{ vmagent_version }}.tar.gz"
    mode: "0644"
    timeout: 120
  register: vmagent_archive
  retries: 5
  delay: 10
  until: vmagent_archive is succeeded

- name: Extract vmagent binary
  unarchive:
    src: "/tmp/vmutils-linux-{{ cpu_architecture }}-v{{ vmagent_version }}.tar.gz"
    dest: /usr/local/bin
    mode: "0755"
    remote_src: yes
    include: vmagent-prod

- name: Remove vmagent archive
  file:
    path: "/tmp/vmutils-linux-{{ cpu_architecture }}-v{{ vmagent_version }}.tar.gz"
    state: absent

- name: Create symbolic link for vmagent binary
  file:
    src: /usr/local/bin/vmagent-prod
    dest: /usr/local/bin/vmagent
    state: link

- name: Copy configure script
  copy:
    src: configure_vmagent.sh
    dest: /etc/vmagent/configure_vmagent.sh
    owner: root
    group: root
    mode: "0755"

- name: Copy secret fetching script
  copy:
    src: fetch_secret.sh
    dest: /etc/vmagent/fetch_secret.sh
    owner: root
    group: root
    mode: "0755"
