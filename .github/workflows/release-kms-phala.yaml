          compatibility_kms_image_locked_digest="$(jq -r '.compatibility.profiles["locked-read-only"].kms_image_digest // empty' release-assets/kms-phala-compatibility-map.json)"
          compatibility_kms_compose_hash_debug="$(jq -r '.compatibility.profiles.debug.event_payload // ""' release-assets/kms-phala-compatibility-map.json)"
