name: Security audit

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - Cargo.toml
      - "mero-kms/Cargo.toml"
      - Cargo.lock
      - ".github/workflows/security-audit.yaml"

permissions:
  contents: read

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Setup rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: security-audit

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        id: cargo_audit
        run: cargo audit

      - name: Summarize security audit outcome
        if: ${{ always() }}
        run: |
          set -euo pipefail
          source scripts/ci/logging.sh
          result_line="$(ci_result "security-audit" "${{ job.status }}" "CARGO_AUDIT" "ref=${GITHUB_REF_NAME}" "run_id=${GITHUB_RUN_ID}")"
          ci_info "${result_line}"
          {
            echo "## Workflow Summary"
            echo ""
            echo "### Inputs / Targets"
            echo ""
            echo "- Ref: ${GITHUB_REF_NAME}"
            echo ""
            echo "### Check Outcomes"
            echo ""
            echo "- cargo-audit: ${{ steps.cargo_audit.outcome }}"
            echo ""
            echo "### Result"
            echo ""
            echo "- Job status: ${{ job.status }}"
            echo "- ${result_line}"
            echo ""
            echo "### Artifacts"
            echo ""
            echo "- n/a"
            echo ""
            echo "### Next"
            echo ""
            echo "- Review advisories and update dependencies."
          } >> "${GITHUB_STEP_SUMMARY}"
