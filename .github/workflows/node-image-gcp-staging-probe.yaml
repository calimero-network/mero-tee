name: Node image GCP staging probe
run-name: Node GCP staging probe (${{ inputs.probe_label != '' && inputs.probe_label || inputs.profile }})

on:
  workflow_dispatch:
    inputs:
      probe_label:
        description: "Optional unique label for dispatch/run correlation"
        required: false
        default: ""
      deployment_name:
        description: "Optional deterministic instance name override"
        required: false
        default: ""
      profile:
        description: "Node profile cohort"
        required: true
        type: choice
        options:
          - debug
          - debug-read-only
          - locked-read-only
      image_name:
        description: "GCP image name to boot"
        required: true
      image_project:
        description: "GCP project that hosts image_name"
        required: true
      vm_project:
        description: "Optional GCP project where the probe VM is created (defaults to image_project)"
        required: false
        default: ""
      vm_zone:
        description: "Optional probe VM zone override"
        required: false
        default: ""
      vm_subnetwork:
        description: "Optional probe VM subnet override"
        required: false
        default: ""
      vm_machine_type:
        description: "Optional probe VM machine type override"
        required: false
        default: ""
      admin_api_port:
        description: "Node admin API port"
        required: true
        default: "80"
      wait_timeout_minutes:
        description: "Health/attest readiness timeout"
        required: true
        default: "20"
      ita_appraisal_url:
        description: "Intel Trust Authority appraisal endpoint"
        required: true
        default: "https://api.trustauthority.intel.com/appraisal/v2/attest"
      ita_policy_ids:
        description: "Optional comma-separated ITA policy UUIDs"
        required: false
        default: ""
      ita_policy_must_match:
        description: "Require policy match when ITA policy IDs are supplied"
        required: true
        type: boolean
        default: true
      merod_version:
        description: "Optional merod version metadata value"
        required: false
        default: ""
      kms_probe_url:
        description: "Optional KMS URL for runtime node->KMS probe"
        required: false
        default: ""
      kms_probe_expected_outcome:
        description: "Runtime KMS probe expectation: skip|success|failure"
        required: false
        default: "skip"
      kms_probe_expected_codes:
        description: "Optional comma-separated acceptable probe result codes"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  probe:
    name: Deploy node image + attest
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      GCP_ATTESTATION_PROJECT_ID: ${{ vars.GCP_ATTESTATION_PROJECT_ID }}
      GCP_ATTESTATION_ZONE: ${{ vars.GCP_ATTESTATION_ZONE }}
      GCP_ATTESTATION_SUBNETWORK: ${{ vars.GCP_ATTESTATION_SUBNETWORK }}
      GCP_ATTESTATION_MACHINE_TYPE: ${{ vars.GCP_ATTESTATION_MACHINE_TYPE }}
      GCP_ATTESTATION_ALLOWED_CIDRS: ${{ vars.GCP_ATTESTATION_ALLOWED_CIDRS }}
      GCP_ATTESTATION_MEROD_VERSION: ${{ vars.GCP_ATTESTATION_MEROD_VERSION }}
      ITA_API_KEY: ${{ secrets.ITA_API_KEY }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate required secrets and scripts
        env:
          WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          WIF_SERVICE_ACCOUNT: ${{ secrets.GCP_PACKER_SERVICE_ACCOUNT_EMAIL }}
          SA_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/attestation/verify_tdx_quote_ita.py scripts/attestation/extract_tdx_policy_candidates.py
          if [[ -z "${ITA_API_KEY}" ]]; then
            echo "::error::ITA_API_KEY is required for release-grade node attestation verification."
            exit 1
          fi
          if [[ ( -z "${WIF_PROVIDER}" || -z "${WIF_SERVICE_ACCOUNT}" ) && -z "${SA_KEY}" ]]; then
            echo "::error::Missing GCP auth. Configure workload identity or service account key secrets."
            exit 1
          fi

      - name: Determine GCP auth mode
        id: auth_mode
        env:
          WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          WIF_SERVICE_ACCOUNT: ${{ secrets.GCP_PACKER_SERVICE_ACCOUNT_EMAIL }}
          SA_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          mode="key"
          if [[ -n "${WIF_PROVIDER}" && -n "${WIF_SERVICE_ACCOUNT}" ]]; then
            mode="wif"
          fi
          echo "mode=${mode}" >> "${GITHUB_OUTPUT}"

      - name: Authenticate to GCP via workload identity
        if: ${{ steps.auth_mode.outputs.mode == 'wif' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_PACKER_SERVICE_ACCOUNT_EMAIL }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Authenticate to GCP via service account key
        if: ${{ steps.auth_mode.outputs.mode != 'wif' }}
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Prepare probe parameters
        id: params
        env:
          PROFILE: ${{ inputs.profile }}
          IMAGE_NAME_INPUT: ${{ inputs.image_name }}
          IMAGE_PROJECT_INPUT: ${{ inputs.image_project }}
          VM_PROJECT_INPUT: ${{ inputs.vm_project }}
          VM_ZONE_INPUT: ${{ inputs.vm_zone }}
          VM_SUBNETWORK_INPUT: ${{ inputs.vm_subnetwork }}
          VM_MACHINE_TYPE_INPUT: ${{ inputs.vm_machine_type }}
          ADMIN_API_PORT_INPUT: ${{ inputs.admin_api_port }}
          MEROD_VERSION_INPUT: ${{ inputs.merod_version }}
          DEPLOYMENT_NAME_INPUT: ${{ inputs.deployment_name }}
        run: |
          set -euo pipefail

          image_name="${IMAGE_NAME_INPUT}"
          image_project="${IMAGE_PROJECT_INPUT}"
          if [[ -z "${image_name}" || -z "${image_project}" ]]; then
            echo "::error::image_name and image_project are required."
            exit 1
          fi

          vm_project="${VM_PROJECT_INPUT:-${GCP_ATTESTATION_PROJECT_ID:-${image_project}}}"
          vm_zone="${VM_ZONE_INPUT:-${GCP_ATTESTATION_ZONE:-}}"
          vm_machine_type="${VM_MACHINE_TYPE_INPUT:-${GCP_ATTESTATION_MACHINE_TYPE:-}}"
          admin_api_port="${ADMIN_API_PORT_INPUT:-80}"
          merod_version="${MEROD_VERSION_INPUT:-${GCP_ATTESTATION_MEROD_VERSION:-}}"
          vm_subnetwork="${VM_SUBNETWORK_INPUT:-${GCP_ATTESTATION_SUBNETWORK:-}}"

          if [[ -z "${vm_zone}" ]]; then
            echo "::error::vm_zone is required (input or GCP_ATTESTATION_ZONE variable)."
            exit 1
          fi
          if [[ -z "${vm_machine_type}" ]]; then
            echo "::error::vm_machine_type is required (input or GCP_ATTESTATION_MACHINE_TYPE variable)."
            exit 1
          fi
          if [[ ! "${admin_api_port}" =~ ^[0-9]+$ ]]; then
            echo "::error::admin_api_port must be numeric."
            exit 1
          fi

          vm_region="${vm_zone%-*}"
          if [[ -z "${vm_subnetwork}" ]]; then
            vm_subnetwork="$(gcloud compute networks subnets list \
              --project "${vm_project}" \
              --regions "${vm_region}" \
              --format="value(name)" \
              --limit=1)"
          fi
          if [[ -z "${vm_subnetwork}" ]]; then
            echo "::error::Could not resolve vm_subnetwork in project=${vm_project}, region=${vm_region}."
            exit 1
          fi

          vm_network="$(gcloud compute networks subnets describe "${vm_subnetwork}" \
            --project "${vm_project}" \
            --region "${vm_region}" \
            --format='value(network.basename())')"

          default_instance_name="tdx-e2e-${PROFILE}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          instance_name="${DEPLOYMENT_NAME_INPUT:-${default_instance_name}}"
          if [[ ! "${instance_name}" =~ ^[a-z]([-a-z0-9]{0,61}[a-z0-9])?$ ]]; then
            echo "::error::deployment_name must match GCP instance regex ^[a-z]([-a-z0-9]{0,61}[a-z0-9])?$"
            exit 1
          fi

          firewall_tag="tee-e2e-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          firewall_rule="tee-e2e-${PROFILE}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          source_ranges="${GCP_ATTESTATION_ALLOWED_CIDRS:-}"
          source_ranges="${source_ranges//[[:space:]]/}"
          if [[ -z "${source_ranges}" ]]; then
            runner_ipv4="$(curl -4fsS --retry 5 --retry-delay 2 https://checkip.amazonaws.com | tr -d '\r\n[:space:]')"
            if [[ ! "${runner_ipv4}" =~ ^([0-9]{1,3}\.){3}[0-9]{1,3}$ ]]; then
              echo "::error::Could not determine runner IPv4."
              exit 1
            fi
            source_ranges="${runner_ipv4}/32"
          fi

          artifacts_dir="${RUNNER_TEMP}/node-gcp-probe-${PROFILE}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p "${artifacts_dir}"

          {
            echo "profile=${PROFILE}"
            echo "instance_name=${instance_name}"
            echo "firewall_tag=${firewall_tag}"
            echo "firewall_rule=${firewall_rule}"
            echo "vm_project=${vm_project}"
            echo "vm_zone=${vm_zone}"
            echo "vm_region=${vm_region}"
            echo "vm_machine_type=${vm_machine_type}"
            echo "vm_subnetwork=${vm_subnetwork}"
            echo "vm_network=${vm_network}"
            echo "admin_api_port=${admin_api_port}"
            echo "image_name=${image_name}"
            echo "image_project=${image_project}"
            echo "source_ranges=${source_ranges}"
            echo "merod_version=${merod_version}"
            echo "artifacts_dir=${artifacts_dir}"
          } >> "${GITHUB_OUTPUT}"

      - name: Create ephemeral firewall rule for admin API
        run: |
          set -euo pipefail
          gcloud compute firewall-rules create "${{ steps.params.outputs.firewall_rule }}" \
            --project "${{ steps.params.outputs.vm_project }}" \
            --network "${{ steps.params.outputs.vm_network }}" \
            --direction INGRESS \
            --priority 1000 \
            --action ALLOW \
            --rules "tcp:${{ steps.params.outputs.admin_api_port }},tcp:22" \
            --source-ranges "${{ steps.params.outputs.source_ranges }}" \
            --target-tags "${{ steps.params.outputs.firewall_tag }}" \
            --description "Temporary node e2e ingress for run ${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}"

      - name: Create ephemeral TDX VM
        run: |
          set -euo pipefail
          gcloud compute instances create "${{ steps.params.outputs.instance_name }}" \
            --project "${{ steps.params.outputs.vm_project }}" \
            --zone "${{ steps.params.outputs.vm_zone }}" \
            --machine-type "${{ steps.params.outputs.vm_machine_type }}" \
            --confidential-compute-type "TDX" \
            --maintenance-policy "TERMINATE" \
            --min-cpu-platform "Intel Sapphire Rapids" \
            --no-service-account \
            --no-scopes \
            --image "${{ steps.params.outputs.image_name }}" \
            --image-project "${{ steps.params.outputs.image_project }}" \
            --subnet "${{ steps.params.outputs.vm_subnetwork }}" \
            --metadata "merod-version=${{ steps.params.outputs.merod_version }}" \
            --tags "merotee,${{ steps.params.outputs.firewall_tag }}"

      - name: Wait for VM and admin API readiness
        id: endpoint
        env:
          WAIT_TIMEOUT_MINUTES: ${{ inputs.wait_timeout_minutes }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 30); do
            status="$(gcloud compute instances describe "${{ steps.params.outputs.instance_name }}" \
              --project "${{ steps.params.outputs.vm_project }}" \
              --zone "${{ steps.params.outputs.vm_zone }}" \
              --format='value(status)' || true)"
            if [[ "${status}" == "RUNNING" ]]; then
              break
            fi
            if [[ "${attempt}" -eq 30 ]]; then
              echo "::error::Instance did not reach RUNNING in time."
              exit 1
            fi
            sleep 10
          done

          nat_ip="$(gcloud compute instances describe "${{ steps.params.outputs.instance_name }}" \
            --project "${{ steps.params.outputs.vm_project }}" \
            --zone "${{ steps.params.outputs.vm_zone }}" \
            --format='value(networkInterfaces[0].accessConfigs[0].natIP)')"
          if [[ -z "${nat_ip}" ]]; then
            echo "::error::No external IP found on probe VM."
            exit 1
          fi

          base_url="http://${nat_ip}:${{ steps.params.outputs.admin_api_port }}"
          timeout_seconds=$((WAIT_TIMEOUT_MINUTES * 60))
          deadline=$(( $(date +%s) + timeout_seconds ))
          ready="false"
          while (( $(date +%s) < deadline )); do
            http_code="$(curl -sS --max-time 8 -o "${{ steps.params.outputs.artifacts_dir }}/health.json" -w "%{http_code}" "${base_url}/admin-api/health" || true)"
            if [[ "${http_code}" == "200" ]]; then
              ready="true"
              break
            fi
            sleep 5
          done
          if [[ "${ready}" != "true" ]]; then
            echo "::error::Timed out waiting for ${base_url}/admin-api/health"
            exit 1
          fi

          echo "base_url=${base_url}" >> "${GITHUB_OUTPUT}"

      - name: Collect attestation artifacts
        run: |
          set -euo pipefail
          artifacts_dir="${{ steps.params.outputs.artifacts_dir }}"
          base_url="${{ steps.endpoint.outputs.base_url }}"

          tee_info_code="$(curl -sS --max-time 15 -o "${artifacts_dir}/tee-info.json" -w "%{http_code}" "${base_url}/admin-api/tee/info" || true)"
          if [[ "${tee_info_code}" != "200" ]]; then
            echo "::error::Failed to fetch ${base_url}/admin-api/tee/info (HTTP ${tee_info_code:-error})"
            exit 1
          fi

          nonce="$(openssl rand -hex 32)"
          jq -n --arg nonce "${nonce}" '{nonce: $nonce}' > "${artifacts_dir}/tee-attest-request.json"
          attest_code="$(curl -sS --max-time 20 -o "${artifacts_dir}/tee-attest-response.json" -w "%{http_code}" \
            -X POST "${base_url}/admin-api/tee/attest" \
            -H "Content-Type: application/json" \
            -d @"${artifacts_dir}/tee-attest-request.json" || true)"
          if [[ "${attest_code}" != "200" ]]; then
            echo "::error::Failed to fetch ${base_url}/admin-api/tee/attest (HTTP ${attest_code:-error})"
            exit 1
          fi

          jq -n \
            --arg base_url "${base_url}" \
            --arg nonce "${nonce}" \
            --arg profile "${{ steps.params.outputs.profile }}" \
            --arg instance "${{ steps.params.outputs.instance_name }}" \
            --arg image "${{ steps.params.outputs.image_name }}" \
            --arg project "${{ steps.params.outputs.vm_project }}" \
            --arg zone "${{ steps.params.outputs.vm_zone }}" \
            '{base_url: $base_url, nonce: $nonce, profile: $profile, instance: $instance, image: $image, project: $project, zone: $zone}' \
            > "${artifacts_dir}/attestation-context.json"

      - name: Verify client-side node quote checks (anti-fake)
        run: |
          set -euo pipefail
          artifacts_dir="${{ steps.params.outputs.artifacts_dir }}"
          base_url="${{ steps.endpoint.outputs.base_url }}"
          verify_endpoint="${base_url}/admin-api/tee/verify-quote"

          quote_b64="$(jq -r '.data.quoteB64 // empty' "${artifacts_dir}/tee-attest-response.json")"
          nonce_hex="$(jq -r '.nonce // empty' "${artifacts_dir}/tee-attest-request.json")"
          if [[ -z "${quote_b64}" || -z "${nonce_hex}" ]]; then
            echo "::error::Missing quote or nonce in collected node attestation artifacts."
            exit 1
          fi

          jq -n \
            --arg quoteB64 "${quote_b64}" \
            --arg nonce "${nonce_hex}" \
            '{quoteB64: $quoteB64, nonce: $nonce}' \
            > "${artifacts_dir}/tee-verify-quote-positive-request.json"
          positive_status="$(curl -sS --max-time 20 \
            -o "${artifacts_dir}/tee-verify-quote-positive-response.json" \
            -w "%{http_code}" \
            -X POST "${verify_endpoint}" \
            -H "Content-Type: application/json" \
            -d @"${artifacts_dir}/tee-verify-quote-positive-request.json" || true)"
          if [[ "${positive_status}" != "200" ]]; then
            echo "::error::Positive /verify-quote check failed (HTTP ${positive_status})."
            exit 1
          fi
          if ! jq -e '.data.quoteVerified == true and .data.nonceVerified == true' \
            "${artifacts_dir}/tee-verify-quote-positive-response.json" >/dev/null 2>&1; then
            echo "::error::Positive /verify-quote check did not return quoteVerified=true and nonceVerified=true."
            jq . "${artifacts_dir}/tee-verify-quote-positive-response.json" || true
            exit 1
          fi
          positive_passed="true"

          wrong_nonce_hex="$(python3 -c 'import sys; n=sys.argv[1].strip().lower(); assert len(n)==64, "nonce must be 64 hex chars"; flip=("0" if n[0]!="0" else "1"); print(flip + n[1:])' "${nonce_hex}")"
          jq -n \
            --arg quoteB64 "${quote_b64}" \
            --arg nonce "${wrong_nonce_hex}" \
            '{quoteB64: $quoteB64, nonce: $nonce}' \
            > "${artifacts_dir}/tee-verify-quote-wrong-nonce-request.json"
          wrong_nonce_status="$(curl -sS --max-time 20 \
            -o "${artifacts_dir}/tee-verify-quote-wrong-nonce-response.json" \
            -w "%{http_code}" \
            -X POST "${verify_endpoint}" \
            -H "Content-Type: application/json" \
            -d @"${artifacts_dir}/tee-verify-quote-wrong-nonce-request.json" || true)"
          wrong_nonce_rejected="false"
          if [[ "${wrong_nonce_status}" != "200" ]]; then
            wrong_nonce_rejected="true"
          elif jq -e '.data.nonceVerified == false or .data.quoteVerified == false' \
            "${artifacts_dir}/tee-verify-quote-wrong-nonce-response.json" >/dev/null 2>&1; then
            wrong_nonce_rejected="true"
          fi
          if [[ "${wrong_nonce_rejected}" != "true" ]]; then
            echo "::error::Wrong nonce was not rejected by /verify-quote."
            jq . "${artifacts_dir}/tee-verify-quote-wrong-nonce-response.json" || true
            exit 1
          fi

          tampered_quote_b64="$(python3 -c 'import base64,sys; raw=base64.b64decode(sys.argv[1], validate=False); assert len(raw)>0, "empty quote bytes"; b=bytearray(raw); b[0]^=0x01; print(base64.b64encode(bytes(b)).decode("ascii"))' "${quote_b64}")"
          jq -n \
            --arg quoteB64 "${tampered_quote_b64}" \
            --arg nonce "${nonce_hex}" \
            '{quoteB64: $quoteB64, nonce: $nonce}' \
            > "${artifacts_dir}/tee-verify-quote-tampered-quote-request.json"
          tampered_quote_status="$(curl -sS --max-time 20 \
            -o "${artifacts_dir}/tee-verify-quote-tampered-quote-response.json" \
            -w "%{http_code}" \
            -X POST "${verify_endpoint}" \
            -H "Content-Type: application/json" \
            -d @"${artifacts_dir}/tee-verify-quote-tampered-quote-request.json" || true)"
          tampered_quote_rejected="false"
          if [[ "${tampered_quote_status}" != "200" ]]; then
            tampered_quote_rejected="true"
          elif jq -e '.data.quoteVerified == false' \
            "${artifacts_dir}/tee-verify-quote-tampered-quote-response.json" >/dev/null 2>&1; then
            tampered_quote_rejected="true"
          fi
          if [[ "${tampered_quote_rejected}" != "true" ]]; then
            echo "::error::Tampered quote was not rejected by /verify-quote."
            jq . "${artifacts_dir}/tee-verify-quote-tampered-quote-response.json" || true
            exit 1
          fi

          wrong_app_hash_hex="$(openssl rand -hex 32)"
          jq -n \
            --arg quoteB64 "${quote_b64}" \
            --arg nonce "${nonce_hex}" \
            --arg expectedApplicationHash "${wrong_app_hash_hex}" \
            '{quoteB64: $quoteB64, nonce: $nonce, expectedApplicationHash: $expectedApplicationHash}' \
            > "${artifacts_dir}/tee-verify-quote-wrong-app-hash-request.json"
          wrong_app_hash_status="$(curl -sS --max-time 20 \
            -o "${artifacts_dir}/tee-verify-quote-wrong-app-hash-response.json" \
            -w "%{http_code}" \
            -X POST "${verify_endpoint}" \
            -H "Content-Type: application/json" \
            -d @"${artifacts_dir}/tee-verify-quote-wrong-app-hash-request.json" || true)"
          wrong_app_hash_rejected="false"
          if [[ "${wrong_app_hash_status}" != "200" ]]; then
            wrong_app_hash_rejected="true"
          elif jq -e '.data.applicationHashVerified == false or .data.quoteVerified == false' \
            "${artifacts_dir}/tee-verify-quote-wrong-app-hash-response.json" >/dev/null 2>&1; then
            wrong_app_hash_rejected="true"
          fi
          if [[ "${wrong_app_hash_rejected}" != "true" ]]; then
            echo "::error::Wrong expected application hash was not rejected by /verify-quote."
            jq . "${artifacts_dir}/tee-verify-quote-wrong-app-hash-response.json" || true
            exit 1
          fi

          jq -n \
            --arg endpoint "${verify_endpoint}" \
            --arg positive_status "${positive_status}" \
            --arg wrong_nonce_status "${wrong_nonce_status}" \
            --arg tampered_quote_status "${tampered_quote_status}" \
            --arg wrong_app_hash_status "${wrong_app_hash_status}" \
            --argjson positive_passed "${positive_passed}" \
            --argjson wrong_nonce_rejected "${wrong_nonce_rejected}" \
            --argjson tampered_quote_rejected "${tampered_quote_rejected}" \
            --argjson wrong_app_hash_rejected "${wrong_app_hash_rejected}" \
            '{
              schema_version: 1,
              verify_quote_endpoint: $endpoint,
              checks: {
                positive: {http_status: $positive_status, passed: $positive_passed},
                wrong_nonce: {http_status: $wrong_nonce_status, rejected: $wrong_nonce_rejected},
                tampered_quote: {http_status: $tampered_quote_status, rejected: $tampered_quote_rejected},
                wrong_expected_application_hash: {http_status: $wrong_app_hash_status, rejected: $wrong_app_hash_rejected}
              }
            }' > "${artifacts_dir}/node-client-verification.json"

      - name: Probe node-to-KMS runtime flow (optional)
        if: ${{ inputs.kms_probe_expected_outcome != 'skip' }}
        env:
          KMS_PROBE_URL: ${{ inputs.kms_probe_url }}
          KMS_PROBE_EXPECTED_OUTCOME: ${{ inputs.kms_probe_expected_outcome }}
          KMS_PROBE_EXPECTED_CODES: ${{ inputs.kms_probe_expected_codes }}
        run: |
          set -euo pipefail
          artifacts_dir="${{ steps.params.outputs.artifacts_dir }}"
          if [[ -z "${KMS_PROBE_URL}" ]]; then
            echo "::error::kms_probe_url must be set when kms_probe_expected_outcome is not 'skip'."
            exit 1
          fi
          case "${KMS_PROBE_EXPECTED_OUTCOME}" in
            success|failure) ;;
            *)
              echo "::error::kms_probe_expected_outcome must be one of: skip, success, failure."
              exit 1
              ;;
          esac

          probe_stdout="${artifacts_dir}/node-kms-probe-ssh-stdout.log"
          probe_stderr="${artifacts_dir}/node-kms-probe-ssh-stderr.log"
          probe_json="${artifacts_dir}/node-kms-probe-raw.json"
          parsed_json="false"
          ssh_exit_code=255

          for attempt in $(seq 1 12); do
            set +e
            gcloud compute ssh "${{ steps.params.outputs.instance_name }}" \
              --project "${{ steps.params.outputs.vm_project }}" \
              --zone "${{ steps.params.outputs.vm_zone }}" \
              --quiet \
              --ssh-flag="-o ConnectTimeout=10" \
              --ssh-flag="-o ServerAliveInterval=30" \
              --command "set -euo pipefail; /usr/local/bin/merod --home /mnt/data/calimero --node default kms probe --kms-url '${KMS_PROBE_URL}' --json" \
              > "${probe_stdout}" \
              2> "${probe_stderr}"
            ssh_exit_code=$?
            set -e

            if python3 - "${probe_stdout}" "${probe_json}" <<'PY'
          import json
          import pathlib
          import sys

          text = pathlib.Path(sys.argv[1]).read_text(encoding="utf-8", errors="replace")
          end = text.rfind("}")
          if end == -1:
              raise SystemExit(1)

          depth = 0
          start = None
          for idx in range(end, -1, -1):
              ch = text[idx]
              if ch == "}":
                  depth += 1
              elif ch == "{":
                  depth -= 1
                  if depth == 0:
                      start = idx
                      break

          if start is None:
              raise SystemExit(1)

          payload = json.loads(text[start : end + 1])
          pathlib.Path(sys.argv[2]).write_text(
              json.dumps(payload, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY
            then
              parsed_json="true"
              break
            fi
            if [[ "${attempt}" -lt 12 ]]; then
              sleep 10
            fi
          done

          if [[ "${parsed_json}" != "true" ]]; then
            echo "::error::Unable to parse node KMS probe JSON output."
            echo "::group::node-kms-probe-ssh-stdout"
            cat "${probe_stdout}" || true
            echo "::endgroup::"
            echo "::group::node-kms-probe-ssh-stderr"
            cat "${probe_stderr}" || true
            echo "::endgroup::"
            exit 1
          fi

          probe_ok="$(jq -r '.ok' "${probe_json}")"
          probe_code="$(jq -r '.code // ""' "${probe_json}")"
          outcome_matches="false"
          if [[ "${KMS_PROBE_EXPECTED_OUTCOME}" == "success" ]]; then
            if [[ "${probe_ok}" == "true" && "${ssh_exit_code}" -eq 0 ]]; then
              outcome_matches="true"
            fi
          else
            if [[ "${probe_ok}" == "false" && "${ssh_exit_code}" -ne 0 ]]; then
              outcome_matches="true"
            fi
          fi

          expected_code_matches="true"
          if [[ -n "${KMS_PROBE_EXPECTED_CODES}" ]]; then
            expected_code_matches="false"
            IFS=',' read -r -a expected_codes <<< "${KMS_PROBE_EXPECTED_CODES}"
            for expected_code in "${expected_codes[@]}"; do
              normalized_expected_code="${expected_code//[[:space:]]/}"
              if [[ -n "${normalized_expected_code}" && "${probe_code}" == "${normalized_expected_code}" ]]; then
                expected_code_matches="true"
                break
              fi
            done
          fi

          jq -n \
            --arg kms_url "${KMS_PROBE_URL}" \
            --arg expected_outcome "${KMS_PROBE_EXPECTED_OUTCOME}" \
            --arg expected_codes "${KMS_PROBE_EXPECTED_CODES}" \
            --argjson ssh_exit_code "${ssh_exit_code}" \
            --argjson outcome_matches "${outcome_matches}" \
            --argjson expected_code_matches "${expected_code_matches}" \
            --slurpfile probe "${probe_json}" \
            '{
              schema_version: 1,
              kms_url: $kms_url,
              expected_outcome: $expected_outcome,
              expected_codes: (
                $expected_codes
                | split(",")
                | map(gsub("^\\s+|\\s+$"; ""))
                | map(select(length > 0))
              ),
              ssh_exit_code: $ssh_exit_code,
              probe: $probe[0],
              checks: {
                outcome_matches: $outcome_matches,
                expected_code_matches: $expected_code_matches
              }
            }' > "${artifacts_dir}/node-kms-probe-result.json"

          if [[ "${outcome_matches}" != "true" || "${expected_code_matches}" != "true" ]]; then
            echo "::error::Node->KMS probe expectation mismatch."
            jq . "${artifacts_dir}/node-kms-probe-result.json" || true
            echo "::group::node-kms-probe-ssh-stdout"
            cat "${probe_stdout}" || true
            echo "::endgroup::"
            echo "::group::node-kms-probe-ssh-stderr"
            cat "${probe_stderr}" || true
            echo "::endgroup::"
            exit 1
          fi

      - name: Verify quote externally and derive policy candidates
        run: |
          set -euo pipefail
          artifacts_dir="${{ steps.params.outputs.artifacts_dir }}"
          policy_flags=()
          if [[ -n "${{ inputs.ita_policy_ids }}" ]]; then
            policy_flags+=(--policy-ids "${{ inputs.ita_policy_ids }}")
          fi
          if [[ "${{ inputs.ita_policy_must_match }}" == "true" ]]; then
            policy_flags+=(--policy-must-match)
          fi

          python3 scripts/attestation/verify_tdx_quote_ita.py \
            --attest-response "${artifacts_dir}/tee-attest-response.json" \
            --tee-info "${artifacts_dir}/tee-info.json" \
            --output-dir "${artifacts_dir}" \
            --ita-url "${{ inputs.ita_appraisal_url }}" \
            --ita-api-key "${ITA_API_KEY}" \
            "${policy_flags[@]}"

          claims_file="${artifacts_dir}/external-attestation-token-claims.json"
          if [[ ! -f "${claims_file}" ]]; then
            echo "::error::Missing external attestation claims file: ${claims_file}"
            exit 1
          fi

          python3 scripts/attestation/extract_tdx_policy_candidates.py \
            --claims "${claims_file}" \
            --output-json "${artifacts_dir}/measurement-policy-candidates.json" \
            --allow-missing-tcb

          cp "${artifacts_dir}/measurement-policy-candidates.json" \
            "${artifacts_dir}/measurement-policy-candidates-${{ steps.params.outputs.profile }}.json"

      - name: Upload node probe artifacts
        uses: actions/upload-artifact@v7
        with:
          name: node-gcp-staging-probe-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.params.outputs.artifacts_dir }}/
          retention-days: 3

      - name: Cleanup probe resources
        if: ${{ always() }}
        run: |
          set -euo pipefail
          gcloud compute instances delete "${{ steps.params.outputs.instance_name }}" \
            --project "${{ steps.params.outputs.vm_project }}" \
            --zone "${{ steps.params.outputs.vm_zone }}" \
            --quiet || true
          gcloud compute firewall-rules delete "${{ steps.params.outputs.firewall_rule }}" \
            --project "${{ steps.params.outputs.vm_project }}" \
            --quiet || true
