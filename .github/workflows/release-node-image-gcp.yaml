name: Release mero-tee

on:
  push:
    branches:
      - master
    paths:
      - "mero-tee/versions.json"
  workflow_dispatch:

concurrency:
  group: mero-tee-release-${{ github.ref }}
  cancel-in-progress: false

env:
  PACKER_GITHUB_API_TOKEN: ${{ github.token }}
  PACKER_GCP_PROJECT_ID: ${{ vars.GCP_PACKER_PROJECT_ID }}
  PACKER_GCP_SOURCE_IMAGE: ${{ vars.PACKER_GCP_SOURCE_IMAGE }}
  PACKER_GCP_REGION: ${{ vars.GCP_PACKER_REGION }}
  PACKER_GCP_ZONE: ${{ vars.GCP_PACKER_ZONE }}
  PACKER_GCP_SUBNETWORK: ${{ vars.GCP_PACKER_SUBNETWORK }}
  GCP_ATTESTATION_PROJECT_ID: ${{ vars.GCP_ATTESTATION_PROJECT_ID }}
  GCP_ATTESTATION_ZONE: ${{ vars.GCP_ATTESTATION_ZONE }}
  GCP_ATTESTATION_SUBNETWORK: ${{ vars.GCP_ATTESTATION_SUBNETWORK }}
  GCP_ATTESTATION_MACHINE_TYPE: ${{ vars.GCP_ATTESTATION_MACHINE_TYPE }}
  GCP_ATTESTATION_ADMIN_API_PORT: ${{ vars.GCP_ATTESTATION_ADMIN_API_PORT }}
  GCP_ATTESTATION_ALLOWED_CIDRS: ${{ vars.GCP_ATTESTATION_ALLOWED_CIDRS }}
  GCP_ATTESTATION_CLEANUP_MAX_AGE_HOURS: ${{ vars.GCP_ATTESTATION_CLEANUP_MAX_AGE_HOURS }}
  GCP_ATTESTATION_MEROD_VERSION: ${{ vars.GCP_ATTESTATION_MEROD_VERSION }}
  ITA_APPRAISAL_URL: ${{ vars.ITA_APPRAISAL_URL }}
  ITA_POLICY_IDS: ${{ vars.ITA_POLICY_IDS }}
  ITA_POLICY_MUST_MATCH: ${{ vars.ITA_POLICY_MUST_MATCH }}

jobs:
  preflight:
    name: Workflow preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      run_pipeline: ${{ steps.release_gate.outputs.run_pipeline }}
      latest_merod_version: ${{ steps.release_gate.outputs.latest_merod_version }}
      image_version: ${{ steps.version_manifest.outputs.image_version }}
      gate_reason: ${{ steps.release_gate.outputs.reason }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate packer helper scripts
        run: |
          bash -n mero-tee/init.sh
          bash -n mero-tee/build-and-release.sh
          bash -n scripts/release/verify-node-image-gcp-release-assets.sh
          bash -n scripts/release/verify-kms-phala-release-assets.sh
          bash -n scripts/release/e2e-verify-kms-node-compatibility.sh
          bash -n scripts/release/node-image-gcp/resolve-release-gate.sh
          bash -n scripts/release/node-image-gcp/resolve-image-vm-parameters.sh
          bash -n scripts/release/node-image-gcp/sweep-attestation-resources.sh
          bash -n scripts/release/node-image-gcp/assemble-published-mrtd-payload.sh
          bash -n scripts/release/node-image-gcp/sign-release-assets.sh
          bash -n scripts/release/node-image-gcp/verify-generated-signatures.sh
          bash -n scripts/release/node-image-gcp/upsert-umbrella-release-links.sh
          bash -n scripts/policy/generate-merod-kms-phala-attestation-config.sh
          bash -n scripts/policy/apply-merod-kms-phala-attestation-config.sh
          python3 -m py_compile scripts/attestation/verify_tdx_quote_ita.py
          python3 -m py_compile scripts/attestation/extract_tdx_policy_candidates.py

      - name: Validate version manifest shape
        id: version_manifest
        run: |
          image_version="$(jq -er '.imageVersion' mero-tee/versions.json)"
          jq -e '
            has("imageVersion")
            and has("merodVersion")
            and has("traefikVersion")
            and has("nodeExporterVersion")
            and has("vmagentVersion")
            and has("vectorVersion")
          ' mero-tee/versions.json >/dev/null
          echo "image_version=${image_version}" >> "${GITHUB_OUTPUT}"

      - name: Resolve merod release gate (master only)
        id: release_gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/release/node-image-gcp/resolve-release-gate.sh

      - name: Report release gate decision
        run: |
          {
            echo "## Merod release gate"
            echo ""
            echo "- Latest merod release: ${{ steps.release_gate.outputs.latest_merod_version }}"
            echo "- Run pipeline: ${{ steps.release_gate.outputs.run_pipeline }}"
            echo "- Reason: ${{ steps.release_gate.outputs.reason }}"
          } >> "${GITHUB_STEP_SUMMARY}"

  profile_pipeline:
    name: Build and attest (${{ matrix.profile }})
    runs-on: ubuntu-latest
    needs: [preflight]
    if: ${{ needs.preflight.outputs.run_pipeline == 'true' }}
    env:
      GATED_MEROD_VERSION: ${{ needs.preflight.outputs.latest_merod_version }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    strategy:
      fail-fast: true
      matrix:
        profile: [debug, debug-read-only, locked-read-only]
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Determine GCP auth mode
        id: auth_mode
        env:
          WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          WIF_SERVICE_ACCOUNT: ${{ secrets.GCP_PACKER_SERVICE_ACCOUNT_EMAIL }}
          SA_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          mode="none"
          if [[ -n "${WIF_PROVIDER}" && -n "${WIF_SERVICE_ACCOUNT}" ]]; then
            mode="wif"
          elif [[ -n "${SA_KEY}" ]]; then
            mode="key"
          fi

          echo "mode=${mode}" >> "${GITHUB_OUTPUT}"
          echo "run_full_pipeline=true" >> "${GITHUB_OUTPUT}"

      - name: Require GCP auth
        if: ${{ steps.auth_mode.outputs.mode == 'none' }}
        run: |
          echo "Missing GCP auth configuration."
          echo "Set either:"
          echo "  - GCP_WORKLOAD_IDENTITY_PROVIDER + GCP_PACKER_SERVICE_ACCOUNT_EMAIL"
          echo "or:"
          echo "  - GCP_SERVICE_ACCOUNT_KEY"
          exit 1

      - name: Resolve base source image
        if: ${{ steps.auth_mode.outputs.run_full_pipeline == 'true' }}
        run: |
          if [[ -z "${PACKER_GCP_SOURCE_IMAGE:-}" ]]; then
            echo "::notice::PACKER_GCP_SOURCE_IMAGE unset; Packer will use source_image_family ubuntu-2510-amd64. Set repo variable to pin a specific image."
          fi

      - name: Setup packer
        if: ${{ steps.auth_mode.outputs.run_full_pipeline == 'true' }}
        uses: hashicorp/setup-packer@v3.1.0
        with:
          version: v1.11.2

      - name: Authenticate to GCP via workload identity
        if: ${{ steps.auth_mode.outputs.mode == 'wif' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_PACKER_SERVICE_ACCOUNT_EMAIL }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Authenticate to GCP via service account key
        if: ${{ steps.auth_mode.outputs.mode == 'key' }}
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Setup gcloud
        if: ${{ steps.auth_mode.outputs.run_full_pipeline == 'true' }}
        uses: google-github-actions/setup-gcloud@v3

      - name: Validate GCP compute access
        id: gcp_access
        if: ${{ steps.auth_mode.outputs.run_full_pipeline == 'true' }}
        run: |
          image_project="${PACKER_GCP_PROJECT_ID:-${GOOGLE_CLOUD_PROJECT:-${CLOUDSDK_CORE_PROJECT:-calimero-p2p-development}}}"
          zone="${PACKER_GCP_ZONE:-europe-west4-a}"
          region="${PACKER_GCP_REGION:-europe-west4}"
          subnetwork="${PACKER_GCP_SUBNETWORK:-}"

          can_run="true"
          reason=""

          if ! gcloud compute zones describe "${zone}" --project "${image_project}" >/dev/null 2>&1; then
            can_run="false"
            reason="Missing compute.zones.get (or zone access) for project=${image_project}, zone=${zone}."
          fi

          # If subnet is not explicitly configured, auto-pick one accessible subnet in-region.
          if [[ "${can_run}" == "true" ]] && [[ -z "${subnetwork}" ]]; then
            subnetwork="$(gcloud compute networks subnets list \
              --project "${image_project}" \
              --regions "${region}" \
              --format="value(name)" \
              --limit=1 2>/dev/null | head -n1 || true)"
          fi

          if [[ "${can_run}" == "true" ]] && [[ -z "${subnetwork}" ]]; then
            can_run="false"
            reason="No accessible subnet found in region '${region}' for project '${image_project}'. Set GCP_PACKER_SUBNETWORK explicitly."
          fi

          if [[ "${can_run}" == "true" ]] && ! gcloud compute networks subnets describe "${subnetwork}" --region "${region}" --project "${image_project}" >/dev/null 2>&1; then
            can_run="false"
            reason="Subnetwork '${subnetwork}' in region '${region}' is not accessible in project '${image_project}'."
          fi

          if [[ "${can_run}" == "true" ]]; then
            # Normalize resolved values for subsequent steps in this job.
            echo "PACKER_GCP_PROJECT_ID=${image_project}" >> "${GITHUB_ENV}"
            echo "PACKER_GCP_REGION=${region}" >> "${GITHUB_ENV}"
            echo "PACKER_GCP_ZONE=${zone}" >> "${GITHUB_ENV}"
            echo "PACKER_GCP_SUBNETWORK=${subnetwork}" >> "${GITHUB_ENV}"
            echo "resolved_subnetwork=${subnetwork}" >> "${GITHUB_OUTPUT}"
          fi

          echo "can_run=${can_run}" >> "${GITHUB_OUTPUT}"
          echo "reason=${reason}" >> "${GITHUB_OUTPUT}"

          if [[ "${can_run}" != "true" ]]; then
            echo "${reason}"
            exit 1
          fi

      - name: Show tool versions
        if: ${{ steps.auth_mode.outputs.run_full_pipeline == 'true' && steps.gcp_access.outputs.can_run == 'true' }}
        run: |
          packer --version
          ansible --version
          gcloud --version
          jq --version

      - name: Build profile image from node-image-gcp
        id: build_image
        if: ${{ steps.auth_mode.outputs.run_full_pipeline == 'true' && steps.gcp_access.outputs.can_run == 'true' }}
        working-directory: mero-tee
        env:
          PACKER_LOG: 1
        run: |
          set -euo pipefail
          export PACKER_FORCE_BUILD=true
          echo "Running init.sh..."
          ./init.sh
          echo "Running build-and-release.sh for profile=${{ matrix.profile }}..."
          ./build-and-release.sh "${{ matrix.profile }}" 2>&1 | tee /tmp/packer-build.log
          echo "Packer build completed successfully."

      - name: Show build log on failure
        if: ${{ failure() && steps.build_image.outcome == 'failure' }}
        run: |
          echo "::error::Packer build failed. Last 150 lines of output:"
          tail -150 /tmp/packer-build.log 2>/dev/null || echo "(no log captured)"
          echo ""
          echo "## Packer build failure (profile: ${{ matrix.profile }})" >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"
          tail -80 /tmp/packer-build.log 2>/dev/null >> "${GITHUB_STEP_SUMMARY}" || echo "(no log)" >> "${GITHUB_STEP_SUMMARY}"
          echo '```' >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload packer build log on failure
        if: ${{ failure() && steps.build_image.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: packer-build-log-${{ matrix.profile }}-${{ github.run_id }}
          path: /tmp/packer-build.log
          if-no-files-found: ignore

      - name: Resolve image and VM parameters
        id: params
        if: ${{ steps.auth_mode.outputs.run_full_pipeline == 'true' && steps.gcp_access.outputs.can_run == 'true' }}
        working-directory: mero-tee
        env:
          GH_TOKEN: ${{ github.token }}
          PROFILE: ${{ matrix.profile }}
        run: bash ../scripts/release/node-image-gcp/resolve-image-vm-parameters.sh

      - name: Verify resulting image exists
        if: ${{ success() && steps.auth_mode.outputs.run_full_pipeline == 'true' && steps.gcp_access.outputs.can_run == 'true' && steps.params.outcome == 'success' }}
        run: |
          image_name="${{ steps.params.outputs.image_name }}"
          image_project="${{ steps.params.outputs.image_project }}"
          if [[ -z "${image_name}" || -z "${image_project}" ]]; then
            echo "::error::Resolve image and VM parameters step did not output image_name/image_project. Check that step for errors."
            exit 1
          fi
          echo "Checking for image: ${image_name} in project: ${image_project}"
          for i in 1 2 3 4 5 6; do
            if gcloud compute images describe "${image_name}" \
              --project "${image_project}" \
              --format="table(name,family,status)"; then
              echo "Image is ready."
              exit 0
            fi
            echo "Attempt ${i}/6: image not ready yet, waiting 15s..."
            sleep 15
          done
          echo "Image still not available after 90s."
          exit 1

      - name: Capture built image metadata
        if: ${{ success() && steps.auth_mode.outputs.run_full_pipeline == 'true' && steps.gcp_access.outputs.can_run == 'true' }}
        run: |
          artifacts_dir="${{ steps.params.outputs.artifacts_dir }}"
          profile="${{ steps.params.outputs.profile }}"
          gcloud compute images describe "${{ steps.params.outputs.image_name }}" \
            --project "${{ steps.params.outputs.image_project }}" \
            --format=json > "${artifacts_dir}/image-${profile}.json"

      - name: Create ephemeral firewall rule for admin API
        if: ${{ success() && steps.auth_mode.outputs.run_full_pipeline == 'true' && steps.gcp_access.outputs.can_run == 'true' }}
        run: |
          gcloud compute firewall-rules create "${{ steps.params.outputs.firewall_rule }}" \
            --project "${{ steps.params.outputs.vm_project }}" \
            --network "${{ steps.params.outputs.vm_network }}" \
            --direction INGRESS \
            --priority 1000 \
            --action ALLOW \
            --rules "tcp:${{ steps.params.outputs.admin_api_port }}" \
            --source-ranges "${{ steps.params.outputs.attestation_source_ranges }}" \
            --target-tags "${{ steps.params.outputs.firewall_tag }}" \
            --description "Temporary attestation ingress for run ${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}"

      - name: Create ephemeral TDX VM
        if: ${{ success() && steps.auth_mode.outputs.run_full_pipeline == 'true' && steps.gcp_access.outputs.can_run == 'true' }}
        run: |
          gcloud compute instances create "${{ steps.params.outputs.instance_name }}" \
            --project "${{ steps.params.outputs.vm_project }}" \
            --zone "${{ steps.params.outputs.vm_zone }}" \
            --machine-type "${{ steps.params.outputs.vm_machine_type }}" \
            --confidential-compute-type "TDX" \
            --maintenance-policy "TERMINATE" \
            --min-cpu-platform "Intel Sapphire Rapids" \
            --no-service-account \
            --no-scopes \
            --image "${{ steps.params.outputs.image_name }}" \
            --image-project "${{ steps.params.outputs.image_project }}" \
            --subnet "${{ steps.params.outputs.vm_subnetwork }}" \
            --metadata "merod-version=${{ steps.params.outputs.merod_version }}" \
            --tags "merotee,${{ steps.params.outputs.firewall_tag }}"

      - name: Wait for VM to reach RUNNING
        if: ${{ success() && steps.auth_mode.outputs.run_full_pipeline == 'true' && steps.gcp_access.outputs.can_run == 'true' }}
        run: |
          last_status=""
          for attempt in $(seq 1 30); do
            status="$(gcloud compute instances describe "${{ steps.params.outputs.instance_name }}" \
              --project "${{ steps.params.outputs.vm_project }}" \
              --zone "${{ steps.params.outputs.vm_zone }}" \
              --format='value(status)' || true)"

            if [[ "${status}" == "RUNNING" ]]; then
              echo "Instance reached RUNNING at attempt ${attempt}/30."
              break
            fi

            if [[ "${attempt}" -eq 30 ]]; then
              echo "Instance did not reach RUNNING in time."
              gcloud compute instances describe "${{ steps.params.outputs.instance_name }}" \
                --project "${{ steps.params.outputs.vm_project }}" \
                --zone "${{ steps.params.outputs.vm_zone }}" \
                --format='yaml(name,status,lastStartTimestamp)'
              exit 1
            fi

            if [[ "${status}" != "${last_status}" || "${attempt}" -eq 1 || $(( attempt % 5 )) -eq 0 ]]; then
              echo "Instance status: ${status:-unknown} (attempt ${attempt}/30)"
            fi
            last_status="${status}"
            sleep 10
          done

      - name: Resolve attestation base URL
        id: endpoint
        if: ${{ success() && steps.auth_mode.outputs.run_full_pipeline == 'true' && steps.gcp_access.outputs.can_run == 'true' }}
        run: |
          nat_ip="$(gcloud compute instances describe "${{ steps.params.outputs.instance_name }}" \
            --project "${{ steps.params.outputs.vm_project }}" \
            --zone "${{ steps.params.outputs.vm_zone }}" \
            --format='value(networkInterfaces[0].accessConfigs[0].natIP)')"

          if [[ -z "${nat_ip}" ]]; then
            echo "No external IP found on attestation VM; cannot reach admin API from GitHub runner."
            exit 1
          fi

          echo "nat_ip=${nat_ip}" >> "${GITHUB_OUTPUT}"
          echo "base_url=http://${nat_ip}:${{ steps.params.outputs.admin_api_port }}" >> "${GITHUB_OUTPUT}"

      - name: Collect TEE info and quote artifacts
        id: collect_tee
        if: ${{ success() && steps.auth_mode.outputs.run_full_pipeline == 'true' && steps.gcp_access.outputs.can_run == 'true' }}
        run: |
          artifacts_dir="${{ steps.params.outputs.artifacts_dir }}"
          base_url="${{ steps.endpoint.outputs.base_url }}"

          gcloud compute instances describe "${{ steps.params.outputs.instance_name }}" \
            --project "${{ steps.params.outputs.vm_project }}" \
            --zone "${{ steps.params.outputs.vm_zone }}" \
            --format='json(name,status,networkInterfaces,tags,creationTimestamp,lastStartTimestamp)' \
            > "${artifacts_dir}/instance.json"

          ready="false"
          max_attempts=90
          last_http_code=""
          for attempt in $(seq 1 ${max_attempts}); do
            http_code="$(curl -sS --max-time 5 -o "${artifacts_dir}/health.json" -w "%{http_code}" "${base_url}/admin-api/health" || true)"
            if [[ "${http_code}" == "200" ]]; then
              ready="true"
              echo "Health endpoint ready (HTTP 200) at attempt ${attempt}/${max_attempts}"
              break
            fi

            if [[ "${http_code}" != "${last_http_code}" || "${attempt}" -eq 1 || $(( attempt % 12 )) -eq 0 ]]; then
              echo "Health endpoint status: HTTP ${http_code:-error} (attempt ${attempt}/${max_attempts})"
            fi
            last_http_code="${http_code}"
            sleep 5
          done

          if [[ "${ready}" != "true" ]]; then
            echo "Timed out waiting for ${base_url}/admin-api/health after ${max_attempts} attempts (~$((max_attempts * 5 / 60)) min)"
            echo "Capturing serial console logs for diagnostics..."
            for serial_port in 1 2 3 4; do
              gcloud compute instances get-serial-port-output "${{ steps.params.outputs.instance_name }}" \
                --project "${{ steps.params.outputs.vm_project }}" \
                --zone "${{ steps.params.outputs.vm_zone }}" \
                --port "${serial_port}" \
                > "${artifacts_dir}/serial-port-${serial_port}.log" || true
            done
            echo "=== Targeted serial-port-1 matches (last 120): calimero-init|merod|ERROR|failed|WARN ==="
            grep -E -i "calimero-init|merod|ERROR|failed|WARN" "${artifacts_dir}/serial-port-1.log" 2>/dev/null | tail -120 || true
            echo "=== Last 120 lines of serial-port-1 ==="
            tail -120 "${artifacts_dir}/serial-port-1.log" 2>/dev/null || true
            echo "Full serial logs are stored in workflow artifacts (serial-port-*.log)."
            exit 1
          fi

          tee_info_code="$(curl -sS --max-time 10 -o "${artifacts_dir}/tee-info.json" -w "%{http_code}" "${base_url}/admin-api/tee/info" || true)"
          if [[ "${tee_info_code}" != "200" ]]; then
            echo "Failed to fetch ${base_url}/admin-api/tee/info (HTTP ${tee_info_code:-error})"
            exit 1
          fi
          if ! jq -e . "${artifacts_dir}/tee-info.json" >/dev/null 2>&1; then
            echo "TEE info response was not valid JSON."
            exit 1
          fi
          echo "Fetched /admin-api/tee/info (HTTP 200). Keys: $(jq -r 'keys | join(",")' "${artifacts_dir}/tee-info.json")"

          nonce="$(openssl rand -hex 32)"
          jq -n --arg nonce "${nonce}" '{nonce: $nonce}' > "${artifacts_dir}/tee-attest-request.json"

          attest_code="$(curl -sS --max-time 20 -o "${artifacts_dir}/tee-attest-response.json" -w "%{http_code}" \
            -X POST "${base_url}/admin-api/tee/attest" \
            -H "Content-Type: application/json" \
            -d @"${artifacts_dir}/tee-attest-request.json" || true)"
          if [[ "${attest_code}" != "200" ]]; then
            echo "Failed to fetch ${base_url}/admin-api/tee/attest (HTTP ${attest_code:-error})"
            exit 1
          fi
          if ! jq -e . "${artifacts_dir}/tee-attest-response.json" >/dev/null 2>&1; then
            echo "TEE attest response was not valid JSON."
            exit 1
          fi
          echo "Fetched /admin-api/tee/attest (HTTP 200). Keys: $(jq -r 'keys | join(",")' "${artifacts_dir}/tee-attest-response.json")"

          jq -n \
            --arg base_url "${base_url}" \
            --arg nonce "${nonce}" \
            --arg instance "${{ steps.params.outputs.instance_name }}" \
            --arg image "${{ steps.params.outputs.image_name }}" \
            --arg project "${{ steps.params.outputs.vm_project }}" \
            --arg zone "${{ steps.params.outputs.vm_zone }}" \
            '{base_url: $base_url, nonce: $nonce, instance: $instance, image: $image, project: $project, zone: $zone}' \
            > "${artifacts_dir}/attestation-context.json"

      - name: Add profile-specific artifact names
        if: ${{ success() && steps.auth_mode.outputs.run_full_pipeline == 'true' && steps.gcp_access.outputs.can_run == 'true' }}
        run: |
          artifacts_dir="${{ steps.params.outputs.artifacts_dir }}"
          profile="${{ steps.params.outputs.profile }}"
          cp "${artifacts_dir}/instance.json" "${artifacts_dir}/instance-${profile}.json"
          cp "${artifacts_dir}/health.json" "${artifacts_dir}/health-${profile}.json"
          cp "${artifacts_dir}/tee-info.json" "${artifacts_dir}/tee-info-${profile}.json"
          cp "${artifacts_dir}/tee-attest-request.json" "${artifacts_dir}/tee-attest-request-${profile}.json"
          cp "${artifacts_dir}/tee-attest-response.json" "${artifacts_dir}/tee-attest-response-${profile}.json"
          cp "${artifacts_dir}/attestation-context.json" "${artifacts_dir}/attestation-context-${profile}.json"

      - name: Require Intel Trust Authority API key
        if: ${{ success() && steps.auth_mode.outputs.run_full_pipeline == 'true' && steps.gcp_access.outputs.can_run == 'true' }}
        env:
          ITA_API_KEY: ${{ secrets.ITA_API_KEY }}
        run: |
          if [[ -z "${ITA_API_KEY}" ]]; then
            echo "::error::ITA_API_KEY is required for release-grade quote verification. Refusing to publish unverifiable MRTDs."
            exit 1
          fi

      - name: Verify quote externally (Intel Trust Authority)
        id: verify_external
        if: ${{ success() && steps.auth_mode.outputs.run_full_pipeline == 'true' && steps.gcp_access.outputs.can_run == 'true' }}
        env:
          ITA_API_KEY: ${{ secrets.ITA_API_KEY }}
        run: |
          artifacts_dir="${{ steps.params.outputs.artifacts_dir }}"
          profile="${{ steps.params.outputs.profile }}"
          ita_url="${ITA_APPRAISAL_URL:-https://api.trustauthority.intel.com/appraisal/v2/attest}"

          policy_flags=()
          if [[ -n "${ITA_POLICY_IDS:-}" ]]; then
            policy_flags+=(--policy-ids "${ITA_POLICY_IDS}")
          fi
          if [[ "${ITA_POLICY_MUST_MATCH:-true}" == "true" ]]; then
            policy_flags+=(--policy-must-match)
          fi

          python3 scripts/attestation/verify_tdx_quote_ita.py \
            --attest-response "${artifacts_dir}/tee-attest-response.json" \
            --tee-info "${artifacts_dir}/tee-info.json" \
            --output-dir "${artifacts_dir}" \
            --ita-url "${ita_url}" \
            --ita-api-key "${ITA_API_KEY}" \
            "${policy_flags[@]}"

          claims_file="${artifacts_dir}/external-attestation-token-claims.json"
          if [[ ! -f "${claims_file}" ]]; then
            echo "::error::Missing external attestation claims file: ${claims_file}"
            exit 1
          fi
          python3 scripts/attestation/extract_tdx_policy_candidates.py \
            --claims "${claims_file}" \
            --output-json "${artifacts_dir}/measurement-policy-candidates.json" \
            --allow-missing-tcb

          mrtd="$(jq -r '.mrtd // empty' "${artifacts_dir}/mrtd.json" | tr '[:upper:]' '[:lower:]')"
          mrtd="${mrtd#0x}"
          if [[ ! "${mrtd}" =~ ^[a-f0-9]{96}$ ]]; then
            echo "::error::Invalid MRTD in ${artifacts_dir}/mrtd.json for profile '${profile}'. Expected 96 hex characters, got '${mrtd}'."
            exit 1
          fi

          tmp_mrtd_json="${artifacts_dir}/mrtd.normalized.json"
          jq --arg mrtd "${mrtd}" '.mrtd = $mrtd' "${artifacts_dir}/mrtd.json" > "${tmp_mrtd_json}"
          mv "${tmp_mrtd_json}" "${artifacts_dir}/mrtd.json"

          # Add RTMRs to mrtd file for complete measurement record (MRTD + RTMR0-3)
          jq -s '.[0] + {
            rtmr0: (.[1].policy.allowed_rtmr0[0] // ""),
            rtmr1: (.[1].policy.allowed_rtmr1[0] // ""),
            rtmr2: (.[1].policy.allowed_rtmr2[0] // ""),
            rtmr3: (.[1].policy.allowed_rtmr3[0] // "")
          }' "${artifacts_dir}/mrtd.json" "${artifacts_dir}/measurement-policy-candidates.json" > "${artifacts_dir}/mrtd-with-rtmrs.json"
          mv "${artifacts_dir}/mrtd-with-rtmrs.json" "${artifacts_dir}/mrtd-${profile}.json"
          cp "${artifacts_dir}/measurement-policy-candidates.json" "${artifacts_dir}/measurement-policy-candidates-${profile}.json"
          echo "mrtd=${mrtd}" >> "${GITHUB_OUTPUT}"
          echo "status=performed" >> "${GITHUB_OUTPUT}"
          echo "performed=true" >> "${GITHUB_OUTPUT}"

      - name: Build per-profile provenance record
        if: ${{ success() && steps.auth_mode.outputs.run_full_pipeline == 'true' && steps.gcp_access.outputs.can_run == 'true' }}
        run: |
          artifacts_dir="${{ steps.params.outputs.artifacts_dir }}"
          profile="${{ steps.params.outputs.profile }}"

          image_file="${artifacts_dir}/image-${profile}.json"
          context_file="${artifacts_dir}/attestation-context-${profile}.json"
          mrtd_file="${artifacts_dir}/mrtd-${profile}.json"

          image_family="$(jq -r '.family // ""' "${image_file}")"
          image_self_link="$(jq -r '.selfLink // ""' "${image_file}")"
          mrtd_value=""
          if [[ -f "${mrtd_file}" ]]; then
            mrtd_value="$(jq -r '.mrtd // ""' "${mrtd_file}")"
          fi

          jq -n \
            --arg profile "${profile}" \
            --arg tag "${GITHUB_REF_NAME}" \
            --arg commit "${GITHUB_SHA}" \
            --arg run_id "${GITHUB_RUN_ID}" \
            --arg run_attempt "${GITHUB_RUN_ATTEMPT}" \
            --arg image_name "${{ steps.params.outputs.image_name }}" \
            --arg image_project "${{ steps.params.outputs.image_project }}" \
            --arg image_family "${image_family}" \
            --arg image_self_link "${image_self_link}" \
            --arg verification_status "${{ steps.verify_external.outputs.status }}" \
            --arg mrtd "${mrtd_value}" \
            --slurpfile context "${context_file}" \
            '{
              profile: $profile,
              tag: $tag,
              commit_sha: $commit,
              workflow_run_id: $run_id,
              workflow_run_attempt: $run_attempt,
              image: {
                name: $image_name,
                project: $image_project,
                family: $image_family,
                self_link: $image_self_link
              },
              attestation_context: $context[0],
              external_verification: {
                status: $verification_status,
                mrtd: $mrtd
              }
            }' > "${artifacts_dir}/profile-provenance-${profile}.json"

      - name: Record ephemeral target details
        if: ${{ success() && steps.auth_mode.outputs.run_full_pipeline == 'true' && steps.gcp_access.outputs.can_run == 'true' }}
        run: |
          {
            echo "## Ephemeral TDX boot target (${{ steps.params.outputs.profile }})"
            echo ""
            echo "- Project: ${{ steps.params.outputs.vm_project }}"
            echo "- Zone: ${{ steps.params.outputs.vm_zone }}"
            echo "- Instance: ${{ steps.params.outputs.instance_name }}"
            echo "- CPU architecture: ${{ steps.params.outputs.cpu_architecture }}"
            echo "- Image: ${{ steps.params.outputs.image_name }}"
            echo "- Base URL: ${{ steps.endpoint.outputs.base_url }}"
            echo "- Firewall source ranges: ${{ steps.params.outputs.attestation_source_ranges }}"
            echo "- External verification: ${{ steps.verify_external.outputs.status }}"
            echo "- MRTD (external): ${{ steps.verify_external.outputs.mrtd }}"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload attestation artifacts
        if: ${{ steps.auth_mode.outputs.run_full_pipeline == 'true' && steps.gcp_access.outputs.can_run == 'true' && always() && steps.params.outcome == 'success' }}
        uses: actions/upload-artifact@v7
        with:
          name: gcp-tdx-attestation-${{ matrix.profile }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.params.outputs.artifacts_dir }}
          if-no-files-found: warn

      - name: Cleanup ephemeral TDX VM
        if: ${{ steps.auth_mode.outputs.run_full_pipeline == 'true' && steps.gcp_access.outputs.can_run == 'true' && always() }}
        run: |
          instance_name="${{ steps.params.outputs.instance_name }}"
          vm_project="${{ steps.params.outputs.vm_project }}"
          vm_zone="${{ steps.params.outputs.vm_zone }}"
          firewall_rule="${{ steps.params.outputs.firewall_rule }}"

          if [[ -n "${instance_name}" && -n "${vm_project}" && -n "${vm_zone}" ]]; then
            gcloud compute instances delete "${instance_name}" \
              --project "${vm_project}" \
              --zone "${vm_zone}" \
              --delete-disks=all \
              --quiet || true
          else
            echo "Direct instance cleanup skipped (instance parameters unavailable)."
          fi

          if [[ -n "${firewall_rule}" && -n "${vm_project}" ]]; then
            gcloud compute firewall-rules delete "${firewall_rule}" \
              --project "${vm_project}" \
              --quiet || true
          else
            echo "Direct firewall cleanup skipped (firewall parameters unavailable)."
          fi

  cleanup_attestation_resources:
    name: Cleanup attestation resources
    runs-on: ubuntu-latest
    needs: [preflight, profile_pipeline]
    if: ${{ always() && needs.preflight.outputs.run_pipeline == 'true' && github.ref == 'refs/heads/master' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Determine GCP auth mode
        id: auth_mode
        env:
          WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          WIF_SERVICE_ACCOUNT: ${{ secrets.GCP_PACKER_SERVICE_ACCOUNT_EMAIL }}
          SA_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          mode="none"
          if [[ -n "${WIF_PROVIDER}" && -n "${WIF_SERVICE_ACCOUNT}" ]]; then
            mode="wif"
          elif [[ -n "${SA_KEY}" ]]; then
            mode="key"
          fi
          echo "mode=${mode}" >> "${GITHUB_OUTPUT}"

      - name: Require GCP auth for cleanup
        if: ${{ steps.auth_mode.outputs.mode == 'none' }}
        run: |
          echo "Missing GCP auth configuration for cleanup job."
          exit 1

      - name: Authenticate to GCP via workload identity
        if: ${{ steps.auth_mode.outputs.mode == 'wif' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_PACKER_SERVICE_ACCOUNT_EMAIL }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Authenticate to GCP via service account key
        if: ${{ steps.auth_mode.outputs.mode == 'key' }}
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Sweep current-run and stale CI attestation resources
        run: bash scripts/release/node-image-gcp/sweep-attestation-resources.sh

  publish_mrtds:
    name: Publish profile MRTDs
    runs-on: ubuntu-latest
    needs: [preflight, profile_pipeline, cleanup_attestation_resources]
    if: ${{ needs.preflight.outputs.run_pipeline == 'true' && github.ref == 'refs/heads/master' }}
    permissions:
      actions: write
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download attestation artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: gcp-tdx-attestation-*
          path: artifacts
          merge-multiple: true

      - name: Install Syft for SBOM generation
        uses: anchore/sbom-action/download-syft@v0

      - name: Assemble published MRTD payload
        env:
          RELEASE_VERSION: ${{ needs.preflight.outputs.image_version }}
        run: bash scripts/release/node-image-gcp/assemble-published-mrtd-payload.sh

      - name: Install cosign for keyless signing
        uses: sigstore/cosign-installer@v3

      - name: Sign release assets with Sigstore keyless
        env:
          COSIGN_YES: "true"
        run: bash scripts/release/node-image-gcp/sign-release-assets.sh

      - name: Verify generated signatures
        run: bash scripts/release/node-image-gcp/verify-generated-signatures.sh

      # If 403: add RELEASE_TOKEN or GHCR_PUSH_TOKEN (PAT with repo scope). If 404 "discussion category mismatch":
      # disable "Create a discussion for each release" in repo Settings → General → Releases.
      - name: Upload MRTD release assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN || secrets.GHCR_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          tag_name: mero-tee-v${{ needs.preflight.outputs.image_version }}
          make_latest: false
          body_path: artifacts/release-notes.md
          fail_on_unmatched_files: true
          files: |
            artifacts/published-mrtds.json
            artifacts/published-mrtds.json.sig
            artifacts/published-mrtds.json.pem
            artifacts/release-provenance.json
            artifacts/release-provenance.json.sig
            artifacts/release-provenance.json.pem
            artifacts/node-image-gcp-release-sbom.spdx.json
            artifacts/node-image-gcp-release-sbom.spdx.json.sig
            artifacts/node-image-gcp-release-sbom.spdx.json.pem
            artifacts/node-image-gcp-checksums.txt
            artifacts/node-image-gcp-checksums.txt.sig
            artifacts/node-image-gcp-checksums.txt.pem

      - name: Smoke test published release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          scripts/release/verify-node-image-gcp-release-assets.sh "mero-tee-v${{ needs.preflight.outputs.image_version }}"

      - name: Upsert umbrella version release links
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.preflight.outputs.image_version }}
          TARGET_COMMIT: ${{ github.sha }}
        run: bash scripts/release/node-image-gcp/upsert-umbrella-release-links.sh

