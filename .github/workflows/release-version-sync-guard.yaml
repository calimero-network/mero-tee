name: Release version sync guard

on:
  pull_request:
    paths:
      - "Cargo.toml"
      - "mero-kms/Cargo.toml"
      - "Cargo.lock"
      - "node-image-gcp/versions.json"
      - "policies/index.json"
      - "policies/kms-phala/**"
      - "policies/node-image-gcp/**"
      - "scripts/policy/check_release_version_sync.sh"
      - ".github/workflows/release-version-sync-guard.yaml"
  push:
    branches:
      - master
    paths:
      - "Cargo.toml"
      - "mero-kms/Cargo.toml"
      - "Cargo.lock"
      - "node-image-gcp/versions.json"
      - "policies/index.json"
      - "policies/kms-phala/**"
      - "policies/node-image-gcp/**"
      - "scripts/policy/check_release_version_sync.sh"
      - ".github/workflows/release-version-sync-guard.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-sync:
    name: Ensure KMS and merod versions stay in sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate sync script syntax
        run: bash -n scripts/policy/check_release_version_sync.sh

      - name: Run release version sync guard
        run: scripts/policy/check_release_version_sync.sh
