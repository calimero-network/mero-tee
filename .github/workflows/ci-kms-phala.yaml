name: CI mero-kms-phala

on:
  push:
    branches:
      - master
    paths:
      - Cargo.toml
      - "mero-kms/Cargo.toml"
      - Cargo.lock
      - "mero-kms/src/**"
      - ".github/workflows/ci-kms-phala.yaml"
  pull_request:
    paths:
      - Cargo.toml
      - "mero-kms/Cargo.toml"
      - Cargo.lock
      - "mero-kms/src/**"
      - ".github/workflows/ci-kms-phala.yaml"

permissions:
  contents: read

concurrency:
  group: ci-kms-phala-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt-clippy-test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          components: rustfmt, clippy

      - name: Setup rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ci-mero-kms-phala

      - name: Format check
        id: fmt
        run: cargo fmt --all --check

      - name: Clippy
        id: clippy
        run: cargo clippy -p mero-kms-phala --all-targets -- -D warnings

      - name: Tests
        id: tests
        run: cargo test -p mero-kms-phala

      - name: Summarize CI result
        if: ${{ always() }}
        run: |
          {
            echo "## CI mero-kms-phala"
            echo ""
            echo "- Ref: ${GITHUB_REF}"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- fmt: ${{ steps.fmt.outcome }}"
            echo "- clippy: ${{ steps.clippy.outcome }}"
            echo "- tests: ${{ steps.tests.outcome }}"
          } >> "${GITHUB_STEP_SUMMARY}"
