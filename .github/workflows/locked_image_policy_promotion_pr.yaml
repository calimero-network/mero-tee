name: Promote locked-image policy (PR)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Target locked-image policy tag (for example 2.1.4)"
        required: true
      base_branch:
        description: "Base branch for the PR"
        required: true
        default: "master"
      draft_pr:
        description: "Open as draft pull request"
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    name: Promote locked-image policy into PR
    runs-on: ubuntu-latest
    env:
      PROMOTION_BRANCH: automation/locked-image-policy-${{ inputs.release_tag }}
    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_branch }}

      - name: Download release policy artifacts
        id: assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail

          if [[ -z "${RELEASE_TAG}" ]]; then
            echo "::error::release_tag is required"
            exit 1
          fi

          tmp_dir="${RUNNER_TEMP}/locked-image-policy-${RELEASE_TAG}"
          mkdir -p "${tmp_dir}"

          download_asset() {
            local pattern="$1"
            for attempt in $(seq 1 5); do
              if gh release download "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --pattern "${pattern}" --dir "${tmp_dir}" >/dev/null 2>&1; then
                return 0
              fi
              if [[ "${attempt}" -eq 5 ]]; then
                return 1
              fi
              sleep 2
            done
          }

          # Always required for fallback synthesis and provenance.
          if ! download_asset "published-mrtds.json"; then
            echo "::error::Missing published-mrtds.json in release ${RELEASE_TAG}"
            exit 1
          fi
          download_asset "release-provenance.json" || true

          has_direct_policy="false"
          if download_asset "merod-locked-image-policy.json"; then
            has_direct_policy="true"
          fi

          echo "tmp_dir=${tmp_dir}" >> "${GITHUB_OUTPUT}"
          echo "has_direct_policy=${has_direct_policy}" >> "${GITHUB_OUTPUT}"

      - name: Build policy registry files
        id: policy
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          TMP_DIR: ${{ steps.assets.outputs.tmp_dir }}
          HAS_DIRECT_POLICY: ${{ steps.assets.outputs.has_direct_policy }}
        run: |
          set -euo pipefail

          policy_dir="policies/merod-locked-image"
          policy_file="${policy_dir}/${RELEASE_TAG}.json"
          index_file="${policy_dir}/index.json"
          mkdir -p "${policy_dir}"

          if [[ ! -f "${index_file}" ]]; then
            echo '{"schema_version":1,"policies":[]}' > "${index_file}"
          fi

          direct_policy_file="${TMP_DIR}/merod-locked-image-policy.json"
          published_mrtds_file="${TMP_DIR}/published-mrtds.json"
          provenance_file="${TMP_DIR}/release-provenance.json"

          if [[ "${HAS_DIRECT_POLICY}" == "true" ]]; then
            if ! jq -e --arg tag "${RELEASE_TAG}" '
              .schema_version == 1 and
              .tag == $tag and
              (.profiles.debug.allowed_mrtd | type == "array" and length > 0) and
              (.profiles.debug.allowed_rtmr0 | type == "array") and
              (.profiles.debug.allowed_rtmr1 | type == "array") and
              (.profiles.debug.allowed_rtmr2 | type == "array") and
              (.profiles.debug.allowed_rtmr3 | type == "array") and
              (.profiles["debug-read-only"].allowed_mrtd | type == "array" and length > 0) and
              (.profiles["debug-read-only"].allowed_rtmr0 | type == "array") and
              (.profiles["debug-read-only"].allowed_rtmr1 | type == "array") and
              (.profiles["debug-read-only"].allowed_rtmr2 | type == "array") and
              (.profiles["debug-read-only"].allowed_rtmr3 | type == "array") and
              (.profiles["locked-read-only"].allowed_mrtd | type == "array" and length > 0) and
              (.profiles["locked-read-only"].allowed_rtmr0 | type == "array") and
              (.profiles["locked-read-only"].allowed_rtmr1 | type == "array") and
              (.profiles["locked-read-only"].allowed_rtmr2 | type == "array") and
              (.profiles["locked-read-only"].allowed_rtmr3 | type == "array")
            ' "${direct_policy_file}" >/dev/null; then
              echo "::error::merod-locked-image-policy.json failed schema validation"
              exit 1
            fi

            jq -n \
              --arg tag "${RELEASE_TAG}" \
              --arg repository "${GITHUB_REPOSITORY}" \
              --arg source_workflow "gcp_locked_image_build.yaml" \
              --arg source_kind "direct_release_policy" \
              --slurpfile policy "${direct_policy_file}" \
              '{
                schema_version: 1,
                policy_id: ("merod-locked-image/" + $tag),
                release_tag: $tag,
                status: "released",
                generated_at: (now | todate),
                source: {
                  repository: $repository,
                  workflow: $source_workflow,
                  import_kind: $source_kind
                },
                profiles: $policy[0].profiles
              }' > "${policy_file}"
          else
            if ! jq -e --arg tag "${RELEASE_TAG}" '
              .tag == $tag and
              (.profiles.debug.mrtd | type == "string" and test("^[A-Fa-f0-9]{96}$")) and
              (.profiles["debug-read-only"].mrtd | type == "string" and test("^[A-Fa-f0-9]{96}$")) and
              (.profiles["locked-read-only"].mrtd | type == "string" and test("^[A-Fa-f0-9]{96}$"))
            ' "${published_mrtds_file}" >/dev/null; then
              echo "::error::published-mrtds.json failed schema validation"
              exit 1
            fi

            source_run_id=""
            source_commit=""
            if [[ -f "${provenance_file}" ]]; then
              source_run_id="$(jq -r '.workflow_run_id // empty' "${provenance_file}")"
              source_commit="$(jq -r '.commit_sha // empty' "${provenance_file}")"
            fi

            jq -n \
              --arg tag "${RELEASE_TAG}" \
              --arg repository "${GITHUB_REPOSITORY}" \
              --arg source_workflow "gcp_locked_image_build.yaml" \
              --arg source_kind "published_mrtds_fallback" \
              --arg source_run_id "${source_run_id}" \
              --arg source_commit "${source_commit}" \
              --slurpfile mrtds "${published_mrtds_file}" \
              '{
                schema_version: 1,
                policy_id: ("merod-locked-image/" + $tag),
                release_tag: $tag,
                status: "released",
                generated_at: (now | todate),
                source: {
                  repository: $repository,
                  workflow: $source_workflow,
                  import_kind: $source_kind,
                  run_id: $source_run_id,
                  commit_sha: $source_commit
                },
                profiles: {
                  debug: {
                    allowed_mrtd: [$mrtds[0].profiles.debug.mrtd],
                    allowed_rtmr0: [],
                    allowed_rtmr1: [],
                    allowed_rtmr2: [],
                    allowed_rtmr3: [],
                    allowed_tcb_statuses: []
                  },
                  "debug-read-only": {
                    allowed_mrtd: [$mrtds[0].profiles["debug-read-only"].mrtd],
                    allowed_rtmr0: [],
                    allowed_rtmr1: [],
                    allowed_rtmr2: [],
                    allowed_rtmr3: [],
                    allowed_tcb_statuses: []
                  },
                  "locked-read-only": {
                    allowed_mrtd: [$mrtds[0].profiles["locked-read-only"].mrtd],
                    allowed_rtmr0: [],
                    allowed_rtmr1: [],
                    allowed_rtmr2: [],
                    allowed_rtmr3: [],
                    allowed_tcb_statuses: []
                  }
                }
              }' > "${policy_file}"
          fi

          policy_sha256="$(sha256sum "${policy_file}" | awk '{print $1}')"

          tmp_index="$(mktemp)"
          jq \
            --arg tag "${RELEASE_TAG}" \
            --arg path "${policy_file}" \
            --arg policy_sha256 "${policy_sha256}" \
            '
            .schema_version = 1 |
            .policies = (.policies // []) |
            .policies = (
              [ .policies[] | select(.release_tag != $tag) ] + [
                {
                  policy_id: ("merod-locked-image/" + $tag),
                  release_tag: $tag,
                  path: $path,
                  status: "released",
                  policy_sha256: $policy_sha256,
                  updated_at: (now | todate)
                }
              ] | sort_by(.release_tag)
            )
            ' "${index_file}" > "${tmp_index}"
          mv "${tmp_index}" "${index_file}"

          pr_body="${RUNNER_TEMP}/locked-image-policy-promotion-pr-body.md"
          {
            echo "## Promote locked-image policy"
            echo
            echo "- Release tag: \`${RELEASE_TAG}\`"
            echo "- Source: release assets"
            echo
            echo "### Updated files"
            echo
            echo "- \`${policy_file}\`"
            echo "- \`policies/merod-locked-image/index.json\`"
            echo "- Policy SHA-256: \`${policy_sha256}\`"
            echo
            echo "Review this policy carefully before merge."
          } > "${pr_body}"

          echo "policy_file=${policy_file}" >> "${GITHUB_OUTPUT}"
          echo "index_file=${index_file}" >> "${GITHUB_OUTPUT}"
          echo "pr_body=${pr_body}" >> "${GITHUB_OUTPUT}"

      - name: Create promotion pull request
        id: cpr
        continue-on-error: true
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GHCR_PUSH_TOKEN || github.token }}
          base: ${{ inputs.base_branch }}
          branch: ${{ env.PROMOTION_BRANCH }}
          delete-branch: true
          draft: ${{ inputs.draft_pr }}
          title: "chore(policy): promote locked-image policy for ${{ inputs.release_tag }}"
          commit-message: "chore(policy): promote locked-image policy for ${{ inputs.release_tag }}"
          body-path: ${{ steps.policy.outputs.pr_body }}
          add-paths: |
            ${{ steps.policy.outputs.policy_file }}
            ${{ steps.policy.outputs.index_file }}

      - name: Validate PR/branch promotion outcome
        id: pr_result
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          CPR_OUTCOME: ${{ steps.cpr.outcome }}
          CPR_PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
          CPR_PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          BASE_BRANCH: ${{ inputs.base_branch }}
        run: |
          set -euo pipefail

          manual_compare_url="https://github.com/${GITHUB_REPOSITORY}/compare/${BASE_BRANCH}...${PROMOTION_BRANCH}?expand=1"
          echo "manual_compare_url=${manual_compare_url}" >> "${GITHUB_OUTPUT}"

          if [[ "${CPR_OUTCOME}" == "success" && -n "${CPR_PR_NUMBER}" && -n "${CPR_PR_URL}" ]]; then
            echo "result=pr_created" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if gh api "repos/${GITHUB_REPOSITORY}/branches/${PROMOTION_BRANCH}" >/dev/null 2>&1; then
            echo "::warning::Automatic PR creation is not permitted for this repository token."
            echo "::warning::Promotion branch was pushed. Open PR manually: ${manual_compare_url}"
            echo "result=branch_pushed_manual_pr_required" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "::error::Promotion branch '${PROMOTION_BRANCH}' was not found after PR step failure."
          echo "result=failure" >> "${GITHUB_OUTPUT}"
          exit 1

      - name: Summarize result
        if: ${{ always() }}
        env:
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          PR_OPERATION: ${{ steps.cpr.outputs.pull-request-operation }}
          PROMOTION_BRANCH: ${{ env.PROMOTION_BRANCH }}
          PR_RESULT: ${{ steps.pr_result.outputs.result }}
          MANUAL_COMPARE_URL: ${{ steps.pr_result.outputs.manual_compare_url }}
        run: |
          {
            echo "## Locked-image policy promotion"
            echo
            if [[ -n "${PR_NUMBER}" ]]; then
              echo "- PR #${PR_NUMBER}: ${PR_URL}"
              echo "- Operation: ${PR_OPERATION}"
            elif [[ "${PR_RESULT}" == "branch_pushed_manual_pr_required" ]]; then
              echo "- PR creation is disabled for GitHub Actions in this repository."
              echo "- Promotion branch pushed: \`${PROMOTION_BRANCH}\`"
              echo "- Open PR manually: ${MANUAL_COMPARE_URL}"
            else
              echo "- No pull request created (no diff or action could not open PR)."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
