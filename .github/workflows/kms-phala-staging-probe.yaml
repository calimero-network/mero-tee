name: KMS staging probe (Phala)
run-name: KMS staging probe (${{ inputs.probe_label != '' && inputs.probe_label || (inputs.kms_tag != '' && inputs.kms_tag || 'custom') }})

on:
  workflow_dispatch:
    inputs:
      probe_label:
        description: "Optional unique label for correlating dispatch and run selection"
        required: false
        default: ""
      deployment_name:
        description: "Optional deterministic deployment name override for probe reproducibility"
        required: false
        default: ""
      kms_image:
        description: "Optional explicit pinned image override (for example ghcr.io/calimero-network/mero-kms-phala:pr-1). If empty, workflow derives image from kms_tag."
        required: false
        default: ""
      kms_tag:
        description: "Release tag to deploy when kms_image is empty. Use 'latest' to auto-pick the latest GitHub release tag."
        required: true
        default: "latest"
      instance_type:
        description: "Phala instance type (for example tdx.small)"
        required: true
        default: "tdx.small"
      region:
        description: "Optional Phala region (for example us-west)"
        required: false
        default: ""
      service_port:
        description: "Public service port exposed by KMS in compose"
        required: true
        default: "8080"
      phala_public_domain_suffix:
        description: "Default Phala endpoint suffix used to derive service URL (match MDMA prod: dstack-pha-prod5.phala.network)"
        required: true
        default: "dstack-pha-prod5.phala.network"
      kms_url_override:
        description: "Optional explicit KMS base URL override (for example https://app_x-8080.example)"
        required: false
        default: ""
      ita_appraisal_url:
        description: "Intel Trust Authority appraisal endpoint"
        required: true
        default: "https://api.trustauthority.intel.com/appraisal/v2/attest"
      ita_policy_ids:
        description: "Optional comma-separated ITA policy UUIDs"
        required: false
        default: ""
      ita_policy_must_match:
        description: "Require policy match when ITA policy IDs are supplied"
        required: true
        type: boolean
        default: true
      wait_timeout_minutes:
        description: "Timeout for /health readiness check"
        required: true
        default: "20"
      hold_after_upload_seconds:
        description: "Optional hold window after artifact upload and before cleanup"
        required: false
        default: "0"
      kms_policy_version:
        description: "Optional. When set, run KMS with MERO_KMS_VERSION and ENFORCE_MEASUREMENT_POLICY=true to test policy fetch from release (e.g. 2.1.55). Use previous release version when testing a new release."
        required: false
        default: ""

permissions:
  contents: read

jobs:
  probe:
    name: Deploy + attest + extract policy candidates
    runs-on: ubuntu-latest
    timeout-minutes: 90
    # Per-profile concurrency: release triggers 3 probes (debug, debug-read-only, locked-read-only)
    # in parallel. A single shared group allows only 1 running + 1 pending, so the 3rd dispatch
    # cancels the 2nd (pending) run. Use deployment_name so each profile has its own queue.
    concurrency:
      group: kms-phala-staging-probe-${{ github.repository }}-${{ inputs.deployment_name || format('run-{0}', github.run_id) }}
      cancel-in-progress: false
    env:
      PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
      ITA_API_KEY: ${{ secrets.ITA_API_KEY }}
      # Match MDMA prod deployment (same API, prefer_dev=false => dstack-0.5.7)
      PHALA_API_BASE_URL: "https://cloud-api.phala.com/api/v1"
      PHALA_API_VERSION: "2026-01-21"
      DSTACK_PREFER_DEV: "false"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Validate required secrets
        run: |
          set -euo pipefail
          if [[ -z "${PHALA_CLOUD_API_KEY}" ]]; then
            echo "::error::Missing required secret PHALA_CLOUD_API_KEY"
            exit 1
          fi
          if [[ -z "${ITA_API_KEY}" ]]; then
            echo "::error::Missing required secret ITA_API_KEY"
            exit 1
          fi

      - name: Install probe dependencies
        run: |
          set -euo pipefail
          pip install requests
          python3 -m py_compile scripts/attestation/verify_tdx_quote_ita.py scripts/attestation/extract_tdx_policy_candidates.py scripts/phala/provision_prod.py
          npm install -g phala@latest
          phala --version
          jq --version

      - name: Authenticate to Phala Cloud
        run: |
          set -euo pipefail
          phala login "${PHALA_CLOUD_API_KEY}" >/dev/null
          phala status

      - name: Prepare probe compose
        id: prepare
        env:
          GH_TOKEN: ${{ github.token }}
          KMS_IMAGE_INPUT: ${{ inputs.kms_image }}
          KMS_RELEASE_TAG_INPUT: ${{ inputs.kms_tag }}
          KMS_POLICY_VERSION: ${{ inputs.kms_policy_version }}
          SERVICE_PORT: ${{ inputs.service_port }}
        run: |
          set -euo pipefail

          resolved_kms_image=""
          resolved_release_tag=""

          if [[ -n "${KMS_IMAGE_INPUT}" ]]; then
            resolved_kms_image="${KMS_IMAGE_INPUT}"
          else
            if [[ "${KMS_RELEASE_TAG_INPUT}" == "latest" ]]; then
              resolved_release_tag="$(gh api "repos/${GITHUB_REPOSITORY}/releases/latest" --jq '.tag_name' 2>/dev/null || true)"
              if [[ -z "${resolved_release_tag}" ]]; then
                echo "::error::Could not resolve latest release tag for ${GITHUB_REPOSITORY}."
                echo "::error::Provide kms_image override or explicit kms_tag."
                exit 1
              fi
            else
              resolved_release_tag="${KMS_RELEASE_TAG_INPUT}"
              if ! gh release view "${resolved_release_tag}" --repo "${GITHUB_REPOSITORY}" --json tagName >/dev/null 2>&1; then
                echo "::error::Release tag '${resolved_release_tag}' not found in ${GITHUB_REPOSITORY}."
                exit 1
              fi
            fi

            resolved_kms_image="ghcr.io/${GITHUB_REPOSITORY_OWNER}/mero-kms-phala:${resolved_release_tag}"
          fi

          if [[ -z "${resolved_kms_image}" ]]; then
            echo "::error::Failed to resolve KMS image."
            exit 1
          fi

          if [[ "${resolved_kms_image}" =~ :latest$ ]]; then
            echo "::error::Refusing mutable image tag ':latest'. Provide a pinned image tag/digest that includes /attest."
            echo "Example: ghcr.io/calimero-network/mero-kms-phala:pr-1"
            exit 1
          fi

          if [[ -n "${resolved_release_tag}" ]]; then
            manifest_tmp_dir="$(mktemp -d)"
            cleanup_manifest_tmp() { rm -rf "${manifest_tmp_dir}"; }
            trap cleanup_manifest_tmp EXIT

            if ! gh release download "${resolved_release_tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern "kms-phala-release-manifest.json" \
              --dir "${manifest_tmp_dir}" >/dev/null 2>&1; then
              echo "::error::Could not download kms-phala-release-manifest.json from release ${resolved_release_tag}."
              echo "::error::Cannot confirm /attest support for resolved image."
              exit 1
            fi

            if ! jq -e '.verification.kms_attest_endpoint == "/attest"' \
              "${manifest_tmp_dir}/kms-phala-release-manifest.json" >/dev/null 2>&1; then
              echo "::error::Release ${resolved_release_tag} manifest does not declare /attest support."
              echo "::error::Use a newer release tag or explicit kms_image override that includes /attest."
              exit 1
            fi
          fi

          echo "Using KMS image: ${resolved_kms_image}"
          if [[ -n "${resolved_release_tag}" ]]; then
            echo "Resolved from release tag: ${resolved_release_tag}"
          fi

          artifacts_dir="${RUNNER_TEMP}/kms-staging-probe-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          compose_file="${artifacts_dir}/docker-compose.kms-probe.yaml"
          mkdir -p "${artifacts_dir}"

          if [[ -n "${KMS_POLICY_VERSION}" ]]; then
            cat > "${compose_file}" <<EOF
          services:
            mero-kms:
              image: ${resolved_kms_image}
              restart: unless-stopped
              ports:
                - "${SERVICE_PORT}:8080"
              environment:
                LISTEN_ADDR: "0.0.0.0:8080"
                DSTACK_SOCKET_PATH: "/var/run/dstack.sock"
                CHALLENGE_TTL_SECS: "60"
                ACCEPT_MOCK_ATTESTATION: "false"
                ENFORCE_MEASUREMENT_POLICY: "true"
                MERO_KMS_VERSION: "${KMS_POLICY_VERSION}"
              volumes:
                - /var/run/dstack.sock:/var/run/dstack.sock
          EOF
          else
            cat > "${compose_file}" <<EOF
          services:
            mero-kms:
              image: ${resolved_kms_image}
              restart: unless-stopped
              ports:
                - "${SERVICE_PORT}:8080"
              environment:
                LISTEN_ADDR: "0.0.0.0:8080"
                DSTACK_SOCKET_PATH: "/var/run/dstack.sock"
                CHALLENGE_TTL_SECS: "60"
                ACCEPT_MOCK_ATTESTATION: "false"
                ENFORCE_MEASUREMENT_POLICY: "false"
              volumes:
                - /var/run/dstack.sock:/var/run/dstack.sock
          EOF
          fi

          compose_sha256="$(sha256sum "${compose_file}" | awk '{print $1}')"
          enforce_measurement_policy="false"
          if [[ -n "${KMS_POLICY_VERSION}" ]]; then
            enforce_measurement_policy="true"
          fi
          echo "[compose] sha256=${compose_sha256} image=${resolved_kms_image} service_port=${SERVICE_PORT} enforce_measurement_policy=${enforce_measurement_policy} kms_policy_version=${KMS_POLICY_VERSION:-<unset>}"

          echo "artifacts_dir=${artifacts_dir}" >> "${GITHUB_OUTPUT}"
          echo "compose_file=${compose_file}" >> "${GITHUB_OUTPUT}"
          echo "kms_image=${resolved_kms_image}" >> "${GITHUB_OUTPUT}"
          echo "kms_tag=${resolved_release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Deploy ephemeral CVM (prod cluster, dstack 0.5.7 pinned)
        id: deploy
        env:
          DEPLOY_NAME_INPUT: ${{ inputs.deployment_name }}
          INSTANCE_TYPE: ${{ inputs.instance_type }}
          REGION: ${{ inputs.region }}
          COMPOSE_FILE: ${{ steps.prepare.outputs.compose_file }}
          ARTIFACTS_DIR: ${{ steps.prepare.outputs.artifacts_dir }}
        run: |
          set -euo pipefail
          deploy_name="${DEPLOY_NAME_INPUT:-kms-staging-probe-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}}"
          if [[ ! "${deploy_name}" =~ ^[a-zA-Z0-9._-]{3,100}$ ]]; then
            echo "::error::deployment_name must match ^[a-zA-Z0-9._-]{3,100}$"
            exit 1
          fi
          deploy_json="${ARTIFACTS_DIR}/phala-deploy.json"

          # Emit deploy_name early so cleanup can still run on partial failures.
          echo "deploy_name=${deploy_name}" >> "${GITHUB_OUTPUT}"

          # Use Phala REST API with prefer_dev=false (dstack-0.5.7 prod) to match MDMA.
          # phala deploy CLI defaults to dstack-dev-0.5.7, causing RTMR2/RTMR3 mismatch.
          wait_for_name_release() {
            local name="$1"
            for _ in $(seq 1 24); do
              if phala cvms get "${name}" --json >/dev/null 2>&1; then
                sleep 5
              else
                return 0
              fi
            done
            return 1
          }

          if phala cvms get "${deploy_name}" --json >/dev/null 2>&1; then
            echo "::warning::Existing CVM named '${deploy_name}' found before deploy; deleting stale instance first."
            phala cvms delete "${deploy_name}" --force --yes >/dev/null 2>&1 || true
            if ! wait_for_name_release "${deploy_name}"; then
              echo "::error::Timed out waiting for stale CVM '${deploy_name}' to be removed before deploy."
              exit 1
            fi
          fi

          echo "[deploy] Running provision_prod.py (same API flow as MDMA: provision+commit+poll+start, prefer_dev=false => dstack-0.5.7 prod)"
          python3 scripts/phala/provision_prod.py \
            --name "${deploy_name}" \
            --compose "${COMPOSE_FILE}" \
            --instance-type "${INSTANCE_TYPE}" \
            --region "${REGION}" \
            --output "${deploy_json}" 2>&1 | tee "${ARTIFACTS_DIR}/provision_prod.log"

          echo "[deploy] Provision result summary:"
          jq -c '{app_id, vm_uuid, status}' "${deploy_json}" || true
          echo "[deploy] Full provision payload saved to ${deploy_json}"
          vm_uuid="$(jq -r '.vm_uuid // empty' "${deploy_json}")"
          app_id="$(jq -r '.app_id // empty' "${deploy_json}")"
          if [[ -z "${vm_uuid}" || -z "${app_id}" ]]; then
            echo "::error::Missing vm_uuid/app_id in provision result"
            echo "[deploy] provision_prod.log tail:"
            tail -80 "${ARTIFACTS_DIR}/provision_prod.log" 2>/dev/null || true
            exit 1
          fi

          echo "vm_uuid=${vm_uuid}" >> "${GITHUB_OUTPUT}"
          echo "app_id=${app_id}" >> "${GITHUB_OUTPUT}"
          echo "[deploy] vm_uuid=${vm_uuid} app_id=${app_id}"

      - name: Wait for CVM to boot (provision_prod polls+start like MDMA)
        if: ${{ success() }}
        run: |
          sleep 90

      - name: Collect CVM metadata
        if: ${{ success() }}
        env:
          VM_UUID: ${{ steps.deploy.outputs.vm_uuid }}
          ARTIFACTS_DIR: ${{ steps.prepare.outputs.artifacts_dir }}
        run: |
          set -euo pipefail
          echo "[collect] Fetching CVM metadata for ${VM_UUID} ..."
          phala cvms get "${VM_UUID}" --json > "${ARTIFACTS_DIR}/phala-cvm.json" 2>&1 || echo "[collect] phala cvms get failed"
          phala cvms attestation "${VM_UUID}" --json > "${ARTIFACTS_DIR}/phala-cvm-attestation.json" 2>&1 || true
          cvm_status="$(jq -r '.status // .hosted.status // "n/a"' "${ARTIFACTS_DIR}/phala-cvm.json" 2>/dev/null || echo "parse failed")"
          echo "[collect] CVM status from metadata: ${cvm_status}"

      - name: Probe /health and /attest
        id: probe
        if: ${{ success() }}
        env:
          VM_UUID: ${{ steps.deploy.outputs.vm_uuid }}
          APP_ID: ${{ steps.deploy.outputs.app_id }}
          SERVICE_PORT: ${{ inputs.service_port }}
          DOMAIN_SUFFIX: ${{ inputs.phala_public_domain_suffix }}
          KMS_URL_OVERRIDE: ${{ inputs.kms_url_override }}
          WAIT_TIMEOUT_MINUTES: ${{ inputs.wait_timeout_minutes }}
          ARTIFACTS_DIR: ${{ steps.prepare.outputs.artifacts_dir }}
        run: |
          set -euo pipefail

          # Query live CVM metadata right before probing so endpoint discovery
          # follows the actual gateway domain assigned by Phala.
          echo "[probe] Fetching live CVM metadata for URL discovery ..."
          phala cvms get "${VM_UUID}" --json > "${ARTIFACTS_DIR}/phala-cvm-live.json" 2>&1 || true
          gateway_domain="$(jq -r '.gateway.base_domain // "n/a"' "${ARTIFACTS_DIR}/phala-cvm-live.json" 2>/dev/null || echo "n/a")"
          echo "[probe] gateway.base_domain=${gateway_domain}"

          python3 - <<'PY' > "${ARTIFACTS_DIR}/candidate-urls.json"
          import json
          import os
          from pathlib import Path

          def normalize_url(value: str) -> str:
              return value.strip().rstrip("/")

          seen = set()
          urls = []

          def add(url: str | None) -> None:
              if not url:
                  return
              normalized = normalize_url(url)
              if not normalized:
                  return
              if normalized in seen:
                  return
              seen.add(normalized)
              urls.append(normalized)

          def load_json_if_exists(path: Path):
              if not path.exists():
                  return None
              try:
                  return json.loads(path.read_text(encoding="utf-8"))
              except Exception:
                  return None

          override = os.environ.get("KMS_URL_OVERRIDE", "").strip().rstrip("/")
          if override:
              add(override)
          else:
              app_id_raw = os.environ["APP_ID"].strip()
              port = os.environ["SERVICE_PORT"].strip()
              suffix = os.environ["DOMAIN_SUFFIX"].strip()
              artifacts_dir = Path(os.environ["ARTIFACTS_DIR"])

              for metadata_name in ("phala-cvm-live.json", "phala-cvm.json"):
                  metadata = load_json_if_exists(artifacts_dir / metadata_name)
                  if not isinstance(metadata, dict):
                      continue

                  for endpoint in metadata.get("endpoints", []):
                      if isinstance(endpoint, dict):
                          add(endpoint.get("app"))
                          add(endpoint.get("instance"))

                  gateway = metadata.get("gateway")
                  if isinstance(gateway, dict):
                      base_domain = str(gateway.get("base_domain") or "").strip()
                      if base_domain:
                          add(f"https://{app_id_raw}-{port}.{base_domain}")
                          add(f"http://{app_id_raw}-{port}.{base_domain}")

              with_prefix = app_id_raw if app_id_raw.startswith("app_") else f"app_{app_id_raw}"
              without_prefix = with_prefix.removeprefix("app_")
              hosts = [f"{with_prefix}-{port}.{suffix}", f"{without_prefix}-{port}.{suffix}"]
              for scheme in ("https", "http"):
                  for host in hosts:
                      add(f"{scheme}://{host}")

          print(json.dumps({"urls": urls}, indent=2))
          PY

          mapfile -t candidate_urls < <(jq -r '.urls[]' "${ARTIFACTS_DIR}/candidate-urls.json")
          if [[ "${#candidate_urls[@]}" -eq 0 ]]; then
            echo "::error::No candidate KMS URLs available"
            echo "[probe] Candidate URL preview: $(jq -c '.urls[:10]' "${ARTIFACTS_DIR}/candidate-urls.json" 2>/dev/null || echo "[]")"
            exit 1
          fi
          echo "[probe] Candidate URLs (${#candidate_urls[@]}):"
          printf "  - %s\n" "${candidate_urls[@]}"

          timeout_seconds=$((WAIT_TIMEOUT_MINUTES * 60))
          deadline=$(( $(date +%s) + timeout_seconds ))
          base_url=""
          attempt=0
          last_health_code=""

          while [[ "$(date +%s)" -lt "${deadline}" ]]; do
            for candidate in "${candidate_urls[@]}"; do
              attempt=$((attempt + 1))
              health_code="$(curl -k -sS --max-time 8 -o "${ARTIFACTS_DIR}/health.json" -w "%{http_code}" "${candidate}/health" || true)"
              if [[ "${health_code}" != "${last_health_code}" || "${attempt}" -eq 1 || $(( attempt % 10 )) -eq 0 ]]; then
                echo "[probe] attempt ${attempt}: ${candidate}/health -> HTTP ${health_code:-error}"
              fi
              last_health_code="${health_code}"
              if [[ "${health_code}" == "200" ]]; then
                if jq -e '.status == "alive"' "${ARTIFACTS_DIR}/health.json" >/dev/null 2>&1; then
                  base_url="${candidate}"
                  break
                fi
              fi
            done
            if [[ -n "${base_url}" ]]; then
              break
            fi
            sleep 5
          done

          if [[ -z "${base_url}" ]]; then
            echo "::error::Timed out waiting for KMS /health on candidate URLs after ${attempt} attempts"
            if [[ -s "${ARTIFACTS_DIR}/health.json" ]]; then
              health_preview="$(python3 - "${ARTIFACTS_DIR}/health.json" <<'PY'
          import pathlib
          import sys

          text = pathlib.Path(sys.argv[1]).read_text(encoding="utf-8", errors="replace")
          text = text.replace("\n", " ")
          print(text[:500])
          PY
              )"
              echo "[probe] Last health.json preview (first 500 chars): ${health_preview}"
            else
              echo "[probe] Last health.json preview: empty"
            fi
            phala cvms get "${VM_UUID}" --json > "${ARTIFACTS_DIR}/phala-cvm-late.json" 2>&1 || true
            phala logs --cvm-id "${VM_UUID}" --serial --tail 400 > "${ARTIFACTS_DIR}/cvm-serial.log" || true
            phala logs --cvm-id "${VM_UUID}" --tail 400 > "${ARTIFACTS_DIR}/cvm-container.log" || true
            exit 1
          fi

          nonce_b64="$(python3 - <<'PY'
          import base64
          import os
          print(base64.b64encode(os.urandom(32)).decode("ascii"))
          PY
          )"
          jq -n --arg nonceB64 "${nonce_b64}" '{nonceB64: $nonceB64}' > "${ARTIFACTS_DIR}/attest-request.json"

          attest_code="$(curl -k -sS --max-time 20 -o "${ARTIFACTS_DIR}/attest-response.json" -w "%{http_code}" \
            -X POST "${base_url}/attest" \
            -H "Content-Type: application/json" \
            -d @"${ARTIFACTS_DIR}/attest-request.json" || true)"

          if [[ "${attest_code}" != "200" ]]; then
            if [[ "${attest_code}" == "404" ]]; then
              echo "::error::KMS /attest returned HTTP 404."
              echo "::error::The selected image likely does not expose /attest (older build)."
              echo "::error::Use a pinned image tag/digest that includes /attest (for example ghcr.io/calimero-network/mero-kms-phala:pr-1)."
            fi
            echo "::error::KMS /attest failed with HTTP ${attest_code}"
            if [[ -s "${ARTIFACTS_DIR}/attest-response.json" ]]; then
              echo "attest-response body preview:"
              sed -n '1,40p' "${ARTIFACTS_DIR}/attest-response.json"
            fi
            exit 1
          fi
          if ! jq -e . "${ARTIFACTS_DIR}/attest-response.json" >/dev/null 2>&1; then
            echo "::error::KMS /attest response was not JSON"
            exit 1
          fi

          jq -n \
            --arg base_url "${base_url}" \
            --arg nonce_b64 "${nonce_b64}" \
            --arg vm_uuid "${VM_UUID}" \
            --arg app_id "${APP_ID}" \
            '{base_url: $base_url, nonce_b64: $nonce_b64, vm_uuid: $vm_uuid, app_id: $app_id}' \
            > "${ARTIFACTS_DIR}/attestation-context.json"

          echo "base_url=${base_url}" >> "${GITHUB_OUTPUT}"

      - name: Verify quote externally (Intel Trust Authority)
        id: verify_external
        if: ${{ success() }}
        env:
          ITA_APPRAISAL_URL: ${{ inputs.ita_appraisal_url }}
          ITA_POLICY_IDS: ${{ inputs.ita_policy_ids }}
          ITA_POLICY_MUST_MATCH: ${{ inputs.ita_policy_must_match }}
          ARTIFACTS_DIR: ${{ steps.prepare.outputs.artifacts_dir }}
        run: |
          set -euo pipefail
          policy_flags=()
          if [[ -n "${ITA_POLICY_IDS}" ]]; then
            policy_flags+=(--policy-ids "${ITA_POLICY_IDS}")
          fi
          if [[ "${ITA_POLICY_MUST_MATCH}" == "true" ]]; then
            policy_flags+=(--policy-must-match)
          fi

          python3 scripts/attestation/verify_tdx_quote_ita.py \
            --attest-response "${ARTIFACTS_DIR}/attest-response.json" \
            --output-dir "${ARTIFACTS_DIR}" \
            --ita-url "${ITA_APPRAISAL_URL}" \
            --ita-api-key "${ITA_API_KEY}" \
            "${policy_flags[@]}"

      # Same verification as attestation verifier frontend: ITA + RTMR replay + compose_hash.
      # Fail hard when verification fails (no placeholder) so release only gets verified attestation.
      - name: Verify dstack event log and extract compose hash
        id: verify_compose_hash
        if: ${{ success() }}
        env:
          ARTIFACTS_DIR: ${{ steps.prepare.outputs.artifacts_dir }}
        run: |
          set -euo pipefail
          python3 -m py_compile scripts/attestation/verify_dstack_compose_hash.py
          python3 scripts/attestation/verify_dstack_compose_hash.py \
            --attest-response "${ARTIFACTS_DIR}/attest-response.json" \
            --claims "${ARTIFACTS_DIR}/external-attestation-token-claims.json" \
            --output-json "${ARTIFACTS_DIR}/kms-app-identity.json" 2>&1 | tee "${ARTIFACTS_DIR}/verify-compose-hash.log"
          if ! jq -e '.compose_hash | type == "string" and (length == 64) and test("^[a-f0-9]+$")' \
            "${ARTIFACTS_DIR}/kms-app-identity.json" >/dev/null 2>&1; then
            echo "::error::compose_hash missing or invalid in output (required for attestation verifier parity)"
            jq -c '{compose_hash, app_id, deployment_name}' "${ARTIFACTS_DIR}/kms-app-identity.json" 2>/dev/null || true
            exit 1
          fi
          echo "[verify_compose_hash] Extracted compose_hash from verified attestation path (RTMR replay + ITA parity)"

      - name: Derive candidate policy values
        id: derive_candidates
        if: ${{ success() }}
        env:
          ARTIFACTS_DIR: ${{ steps.prepare.outputs.artifacts_dir }}
        run: |
          set -euo pipefail
          python3 scripts/attestation/extract_tdx_policy_candidates.py \
            --claims "${ARTIFACTS_DIR}/external-attestation-token-claims.json" \
            --output-json "${ARTIFACTS_DIR}/kms-policy-candidates.json" \
            --output-env "${ARTIFACTS_DIR}/kms-policy-candidates.env"

          python3 - <<'PY'
          import json
          import os

          candidates_path = os.path.join(os.environ["ARTIFACTS_DIR"], "kms-policy-candidates.json")
          payload = json.load(open(candidates_path, "r", encoding="utf-8"))
          repo_vars = payload["github_repository_variables"]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              for key, value in repo_vars.items():
                  output_name = key.lower()
                  output.write(f"{output_name}={value}\n")
          PY

      - name: Summarize probe outputs
        if: ${{ always() }}
        env:
          ARTIFACTS_DIR: ${{ steps.prepare.outputs.artifacts_dir }}
          BASE_URL: ${{ steps.probe.outputs.base_url }}
          VM_UUID: ${{ steps.deploy.outputs.vm_uuid }}
          APP_ID: ${{ steps.deploy.outputs.app_id }}
          RESOLVED_KMS_IMAGE: ${{ steps.prepare.outputs.kms_image }}
          RESOLVED_KMS_RELEASE_TAG: ${{ steps.prepare.outputs.kms_tag }}
        run: |
          set -euo pipefail
          {
            echo "## Phala KMS staging probe"
            echo ""
            echo "- VM UUID: ${VM_UUID:-n/a}"
            echo "- App ID: ${APP_ID:-n/a}"
            echo "- KMS image: ${RESOLVED_KMS_IMAGE:-n/a}"
            echo "- KMS release tag: ${RESOLVED_KMS_RELEASE_TAG:-n/a}"
            echo "- KMS URL: ${BASE_URL:-n/a}"
            echo ""
          } >> "${GITHUB_STEP_SUMMARY}"

          python3 - <<'PY'
          import json
          import os
          import pathlib

          summary_path = pathlib.Path(os.environ["GITHUB_STEP_SUMMARY"])
          candidates_path = pathlib.Path(os.environ["ARTIFACTS_DIR"]) / "kms-policy-candidates.json"

          with summary_path.open("a", encoding="utf-8") as summary:
              if not candidates_path.exists():
                  summary.write(
                      "Candidate policy output not available (probe likely failed before extraction).\n"
                  )
              else:
                  payload = json.loads(candidates_path.read_text(encoding="utf-8"))
                  vars_map = payload["github_repository_variables"]
                  summary.write("### Candidate policy values (compatibility env form)\n\n")
                  summary.write("```bash\n")
                  for key in sorted(vars_map.keys()):
                      summary.write(f"{key}='{vars_map[key]}'\n")
                  summary.write("```\n\n")
                  summary.write(
                      "Use these for policy review context and promote via PR updates to `policies/kms-phala/<tag>.json` and `policies/index.json`.\n"
                  )
          PY

      - name: Upload probe artifacts
        if: ${{ always() && steps.prepare.outcome == 'success' }}
        uses: actions/upload-artifact@v7
        with:
          name: kms-staging-probe-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.prepare.outputs.artifacts_dir }}/
          retention-days: 14

      - name: Optional hold window before cleanup
        if: ${{ always() && steps.prepare.outcome == 'success' && steps.probe.outcome == 'success' }}
        env:
          HOLD_AFTER_UPLOAD_SECONDS: ${{ inputs.hold_after_upload_seconds }}
        run: |
          set -euo pipefail
          hold_seconds="${HOLD_AFTER_UPLOAD_SECONDS:-0}"
          if [[ ! "${hold_seconds}" =~ ^[0-9]+$ ]]; then
            echo "::error::hold_after_upload_seconds must be a non-negative integer."
            exit 1
          fi
          if [[ "${hold_seconds}" == "0" ]]; then
            exit 0
          fi
          echo "Holding for ${hold_seconds}s before cleanup to keep CVM reachable for downstream probes."
          sleep "${hold_seconds}"

      - name: Cleanup ephemeral CVM
        if: ${{ always() && steps.prepare.outcome == 'success' }}
        env:
          VM_UUID: ${{ steps.deploy.outputs.vm_uuid }}
          APP_ID: ${{ steps.deploy.outputs.app_id }}
          DEPLOY_NAME: ${{ steps.deploy.outputs.deploy_name }}
        run: |
          set -euo pipefail

          deleted="false"
          if [[ -n "${VM_UUID}" ]]; then
            if phala cvms delete "${VM_UUID}" --force --yes; then
              deleted="true"
            else
              echo "Delete by VM UUID failed; retrying with app ID."
            fi
          fi

          if [[ "${deleted}" != "true" && -n "${APP_ID}" ]]; then
            if phala cvms delete "${APP_ID}" --force --yes; then
              deleted="true"
            else
              echo "Delete by app ID failed; retrying with deploy name."
            fi
          fi

          if [[ "${deleted}" != "true" ]]; then
            fallback_name="${DEPLOY_NAME:-kms-staging-probe-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}}"
            if phala cvms delete "${fallback_name}" --force --yes; then
              deleted="true"
            fi
          fi

          if [[ "${deleted}" == "true" ]]; then
            echo "Ephemeral CVM cleanup completed."
          else
            echo "::warning::Could not confirm cleanup of staging CVM. Please verify manually."
          fi
