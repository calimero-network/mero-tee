name: Release mero-kms

on:
  push:
    branches:
      - master
    paths:
      - Cargo.toml
      - "mero-kms/Cargo.toml"
      - Cargo.lock
      - "mero-kms/src/**"
      - ".github/workflows/release-kms-phala.yaml"
      - ".github/workflows/deps/**"
  pull_request:
    paths:
      - Cargo.toml
      - "mero-kms/Cargo.toml"
      - Cargo.lock
      - "mero-kms/src/**"
      - ".github/workflows/release-kms-phala.yaml"
      - ".github/workflows/deps/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  BINARY: mero-kms-phala
  DOCKER_PLATFORMS: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
  INCLUDE_AARCH64: ${{ github.event_name == 'pull_request' && 'false' || 'true' }}

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version_info.outputs.version }}
      kms_release_tag: ${{ steps.version_info.outputs.kms_release_tag }}
      binary_release: ${{ steps.version_info.outputs.binary_release }}
      docker_release: ${{ steps.version_info.outputs.docker_release }}
      docker_push: ${{ github.event_name != 'pull_request' || (github.actor != 'dependabot[bot]' && !github.event.pull_request.head.repo.fork) }}
      prerelease: ${{ steps.version_info.outputs.prerelease }}
      target_commit: ${{ steps.version_info.outputs.target_commit }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Validate release helper scripts
        run: |
          bash -n scripts/release/verify-node-image-gcp-release-assets.sh
          bash -n scripts/release/verify-kms-phala-release-assets.sh
          bash -n scripts/policy/generate-merod-kms-phala-attestation-config.sh
          bash -n scripts/policy/apply-merod-kms-phala-attestation-config.sh

      - name: Get version info
        id: version_info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "target_commit=${{ github.sha }}" >> $GITHUB_OUTPUT
          version=$(cargo metadata --format-version 1 --no-deps 2>/dev/null | jq -r '.packages[] | select(.name=="mero-kms-phala") | .version' || echo "0.1.0")
          if [[ -z "$version" || "$version" == "null" ]]; then
            version="0.1.0"
          fi
          kms_release_tag="mero-kms-v${version}"

          prerelease=false
          binary_release=false
          docker_release=false

          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            if [[ "$version" =~ -[a-z]+(\.[0-9]+)?$ ]]; then
              prerelease=true
            fi
            if ! gh release view "$kms_release_tag" --repo ${{ github.repository }} >/dev/null 2>&1; then
              binary_release=true
              docker_release=true
            fi
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            docker_release=true
          fi

          echo "version=$version" >> $GITHUB_OUTPUT
          echo "kms_release_tag=$kms_release_tag" >> $GITHUB_OUTPUT
          echo "prerelease=$prerelease" >> $GITHUB_OUTPUT
          echo "binary_release=$binary_release" >> $GITHUB_OUTPUT
          echo "docker_release=$docker_release" >> $GITHUB_OUTPUT

  build-binaries:
    name: Build Binaries (${{ matrix.name }})
    needs: prepare
    strategy:
      matrix:
        include: ${{ fromJSON(github.event_name == 'pull_request' && '[{"name":"x86_64-linux","runner":"ubuntu-latest","target":"x86_64-unknown-linux-gnu"}]' || '[{"name":"x86_64-linux","runner":"ubuntu-latest","target":"x86_64-unknown-linux-gnu"},{"name":"aarch64-linux","runner":"ubuntu-24.04-arm","target":"aarch64-unknown-linux-gnu"}]') }}
      fail-fast: false
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-mero-kms-phala

      - name: Build binary
        run: |
          cargo build -p mero-kms-phala --release --target ${{ matrix.target }}

      - name: Compress artifact
        run: |
          mkdir -p artifacts
          tar -czf artifacts/${BINARY}_${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release mero-kms-phala

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-${{ matrix.target }}
          path: artifacts/*
          retention-days: 2

  release-container:
    name: Release mero-kms-phala container
    needs: [prepare, build-binaries]
    outputs:
      locked_image_digest: ${{ steps.build_locked.outputs.digest }}
      debug_image_digest: ${{ steps.build_debug.outputs.digest }}
      debug_ro_image_digest: ${{ steps.build_debug_ro.outputs.digest }}
      image_tags: ${{ steps.all_tags.outputs.tags }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.job }}-${{ github.ref }}-kms-phala-${{ needs.prepare.outputs.version }}
      cancel-in-progress: true
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Download x86_64 binaries
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-x86_64-unknown-linux-gnu
          path: binaries/
          merge-multiple: true

      - name: Download aarch64 binaries
        uses: actions/download-artifact@v8
        if: ${{ env.INCLUDE_AARCH64 == 'true' }}
        with:
          pattern: artifacts-aarch64-unknown-linux-gnu
          path: binaries/
          merge-multiple: true

      - name: Extract binaries
        run: |
          mkdir -p ./bin/amd64
          if [ "${{ env.INCLUDE_AARCH64 }}" = "true" ]; then
            mkdir -p ./bin/arm64
          fi
          tar -xzf binaries/mero-kms-phala_x86_64-unknown-linux-gnu.tar.gz -C ./bin/amd64 --no-same-owner
          if [ "${{ env.INCLUDE_AARCH64 }}" = "true" ]; then
            tar -xzf binaries/mero-kms-phala_aarch64-unknown-linux-gnu.tar.gz -C ./bin/arm64 --no-same-owner
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # GITHUB_TOKEN often lacks packages write in orgs. Add GHCR_PUSH_TOKEN (PAT with write:packages) if push fails.
      - name: Log in to GitHub Container Registry
        if: ${{ needs.prepare.outputs.docker_push == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/mero-kms-phala
          tags: |
            type=edge
            type=ref,prefix=pr-,event=pr
            type=sha,prefix=,format=short
            type=raw,value=${{ needs.prepare.outputs.version }},enable=${{ github.ref == 'refs/heads/master' && needs.prepare.outputs.docker_release == 'true' }}
            type=raw,value=${{ needs.prepare.outputs.version }}-locked-read-only,enable=${{ github.ref == 'refs/heads/master' && needs.prepare.outputs.docker_release == 'true' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' && needs.prepare.outputs.docker_release == 'true' && needs.prepare.outputs.prerelease == 'false' }}
            type=raw,value=latest-locked-read-only,enable=${{ github.ref == 'refs/heads/master' && needs.prepare.outputs.docker_release == 'true' && needs.prepare.outputs.prerelease == 'false' }}
            type=raw,value=prerelease,enable=${{ github.ref == 'refs/heads/master' && needs.prepare.outputs.docker_release == 'true' && needs.prepare.outputs.prerelease == 'true' }}

      - name: Prepare profile image tag lists
        id: profile_tags
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/mero-kms-phala
          VERSION: ${{ needs.prepare.outputs.version }}
          IS_MASTER: ${{ github.ref == 'refs/heads/master' }}
          DOCKER_RELEASE: ${{ needs.prepare.outputs.docker_release }}
          IS_PRERELEASE: ${{ needs.prepare.outputs.prerelease }}
        run: |
          set -euo pipefail
          debug_tags=""
          debug_ro_tags=""
          extra_tags=""
          if [[ "${IS_MASTER}" == "true" && "${DOCKER_RELEASE}" == "true" ]]; then
            debug_tags="${IMAGE_NAME}:${VERSION}-debug"
            debug_ro_tags="${IMAGE_NAME}:${VERSION}-debug-read-only"
            extra_tags="${debug_tags}"$'\n'"${debug_ro_tags}"
            if [[ "${IS_PRERELEASE}" == "false" ]]; then
              debug_tags="${debug_tags}"$'\n'"${IMAGE_NAME}:latest-debug"
              debug_ro_tags="${debug_ro_tags}"$'\n'"${IMAGE_NAME}:latest-debug-read-only"
              extra_tags="${extra_tags}"$'\n'"${IMAGE_NAME}:latest-debug"$'\n'"${IMAGE_NAME}:latest-debug-read-only"
            fi
          fi

          {
            echo "debug_tags<<EOF"
            echo "${debug_tags}"
            echo "EOF"
            echo "debug_ro_tags<<EOF"
            echo "${debug_ro_tags}"
            echo "EOF"
            echo "extra_tags<<EOF"
            echo "${extra_tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push locked-read-only image
        id: build_locked
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/workflows/deps/prebuilt.mero-kms-phala.Dockerfile
          push: ${{ needs.prepare.outputs.docker_push }}
          platforms: ${{ env.DOCKER_PLATFORMS }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            KMS_IMAGE_PROFILE=locked-read-only
          provenance: false
          sbom: false

      - name: Build and push debug image
        id: build_debug
        if: ${{ steps.profile_tags.outputs.debug_tags != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/workflows/deps/prebuilt.mero-kms-phala.Dockerfile
          push: ${{ needs.prepare.outputs.docker_push }}
          platforms: ${{ env.DOCKER_PLATFORMS }}
          tags: ${{ steps.profile_tags.outputs.debug_tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            KMS_IMAGE_PROFILE=debug
          provenance: false
          sbom: false

      - name: Build and push debug-read-only image
        id: build_debug_ro
        if: ${{ steps.profile_tags.outputs.debug_ro_tags != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/workflows/deps/prebuilt.mero-kms-phala.Dockerfile
          push: ${{ needs.prepare.outputs.docker_push }}
          platforms: ${{ env.DOCKER_PLATFORMS }}
          tags: ${{ steps.profile_tags.outputs.debug_ro_tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          build-args: |
            KMS_IMAGE_PROFILE=debug-read-only
          provenance: false
          sbom: false

      - name: Compose aggregated image tags
        id: all_tags
        env:
          LOCKED_TAGS: ${{ steps.metadata.outputs.tags }}
          EXTRA_TAGS: ${{ steps.profile_tags.outputs.extra_tags }}
        run: |
          set -euo pipefail
          combined="$(printf '%s\n%s\n' "${LOCKED_TAGS}" "${EXTRA_TAGS}" | sed '/^[[:space:]]*$/d' | awk '!seen[$0]++')"
          {
            echo "tags<<EOF"
            echo "${combined}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Attest container image build provenance
        if: ${{ needs.prepare.outputs.docker_push == 'true' && steps.build_locked.outputs.digest != '' }}
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/mero-kms-phala
          subject-digest: ${{ steps.build_locked.outputs.digest }}
          push-to-registry: true

      - name: Attest debug image build provenance
        if: ${{ needs.prepare.outputs.docker_push == 'true' && steps.build_debug.outputs.digest != '' }}
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/mero-kms-phala
          subject-digest: ${{ steps.build_debug.outputs.digest }}
          push-to-registry: true

      - name: Attest debug-read-only image build provenance
        if: ${{ needs.prepare.outputs.docker_push == 'true' && steps.build_debug_ro.outputs.digest != '' }}
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/mero-kms-phala
          subject-digest: ${{ steps.build_debug_ro.outputs.digest }}
          push-to-registry: true

  probe:
    name: Run staging probe (${{ matrix.profile }})
    if: needs.prepare.outputs.binary_release == 'true'
    runs-on: ubuntu-latest
    needs: [prepare, release-container]
    strategy:
      fail-fast: false
      matrix:
        profile: [debug, debug-read-only, locked-read-only]
    permissions:
      actions: write
      contents: read
    steps:
      - name: Resolve profile image ref
        id: profile_image
        env:
          PROFILE: ${{ matrix.profile }}
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/mero-kms-phala
          DEBUG_DIGEST: ${{ needs.release-container.outputs.debug_image_digest }}
          DEBUG_RO_DIGEST: ${{ needs.release-container.outputs.debug_ro_image_digest }}
          LOCKED_DIGEST: ${{ needs.release-container.outputs.locked_image_digest }}
        run: |
          set -euo pipefail
          case "${PROFILE}" in
            debug)
              digest="${DEBUG_DIGEST}"
              ;;
            debug-read-only)
              digest="${DEBUG_RO_DIGEST}"
              ;;
            locked-read-only)
              digest="${LOCKED_DIGEST}"
              ;;
            *)
              echo "::error::Unsupported profile '${PROFILE}'"
              exit 1
              ;;
          esac
          if [[ -z "${digest}" ]]; then
            echo "::error::Missing container digest for profile ${PROFILE}"
            exit 1
          fi
          echo "image_ref=${IMAGE_NAME}@${digest}" >> "${GITHUB_OUTPUT}"

      - name: Trigger staging probe and wait
        id: trigger
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_REF: ${{ steps.profile_image.outputs.image_ref }}
        run: |
          set -euo pipefail
          dispatch_started_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          gh workflow run "kms-phala-staging-probe.yaml" \
            --repo "${GITHUB_REPOSITORY}" \
            --ref master \
            -f kms_image="${IMAGE_REF}" \
            -f kms_tag="pinned"
          for _ in $(seq 1 90); do
            run_id="$(gh run list \
              --repo "${GITHUB_REPOSITORY}" \
              --workflow "kms-phala-staging-probe.yaml" \
              --event workflow_dispatch \
              --branch master \
              --limit 5 \
              --json databaseId,createdAt \
              --jq '[.[] | select(.createdAt >= "'"${dispatch_started_at}"'")] | sort_by(.createdAt) | reverse | .[0].databaseId // empty' 2>/dev/null || true)"
            if [[ -n "${run_id}" ]]; then
              echo "run_id=${run_id}" >> "${GITHUB_OUTPUT}"
              break
            fi
            sleep 10
          done
          if [[ -z "${run_id}" ]]; then
            echo "::error::Could not find dispatched probe run"
            exit 1
          fi
          echo "Waiting for probe run ${run_id}..."
          gh run watch "${run_id}" --repo "${GITHUB_REPOSITORY}" --interval 20 --exit-status

      - name: Download probe artifact
        id: download
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          run_id="${{ steps.trigger.outputs.run_id }}"
          artifact_name="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts" \
            --jq '.artifacts | map(select(.expired == false and (.name | startswith("kms-staging-probe-")))) | sort_by(.created_at) | reverse | .[0].name // ""')"
          if [[ -z "${artifact_name}" ]]; then
            echo "::error::No probe artifact found for run ${run_id}"
            exit 1
          fi
          echo "artifact_name=${artifact_name}" >> "${GITHUB_OUTPUT}"
          mkdir -p probe-artifacts
          gh run download "${run_id}" --repo "${GITHUB_REPOSITORY}" --name "${artifact_name}" --dir probe-artifacts

      - name: Upload probe artifacts
        uses: actions/upload-artifact@v7
        with:
          name: kms-probe-${{ needs.prepare.outputs.version }}-${{ matrix.profile }}
          path: probe-artifacts/
          retention-days: 2

  release-metadata:
    name: Release Metadata
    if: needs.prepare.outputs.binary_release == 'true'
    runs-on: ubuntu-latest
    needs: [prepare, build-binaries, release-container, probe]
    concurrency:
      group: ${{ github.workflow }}-${{ github.job }}-${{ github.ref }}-${{ needs.prepare.outputs.version }}
      cancel-in-progress: true
    permissions:
      contents: write
      id-token: write
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-*
          path: artifacts/
          merge-multiple: true

      - name: Download probe artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: kms-probe-${{ needs.prepare.outputs.version }}-*
          path: probe-artifacts/

      - name: Wait for node release and fetch node policy
        id: node_policy
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.prepare.outputs.version }}
          NODE_TAG: mero-tee-v${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p node-policy
          for attempt in $(seq 1 60); do
            if gh release view "${NODE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
              if gh release download "${NODE_TAG}" --repo "${GITHUB_REPOSITORY}" \
                --pattern "published-mrtds.json" --dir node-policy 2>/dev/null; then
                echo "Fetched node policy from ${NODE_TAG}"
                break
              fi
            fi
            if [[ "${attempt}" -eq 60 ]]; then
              echo "::error::Timed out waiting for node release ${NODE_TAG} with published-mrtds.json"
              exit 1
            fi
            echo "Waiting for node release ${NODE_TAG} (attempt ${attempt}/60)..."
            sleep 30
          done

      - name: Install Syft for SBOM generation
        uses: anchore/sbom-action/download-syft@v0

      - name: Log in to GitHub Container Registry for Syft
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Generate release checksums, manifest, and attestation policy
        env:
          GH_REPOSITORY: ${{ github.repository }}
          GH_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_RUN_ATTEMPT: ${{ github.run_attempt }}
          GH_WORKFLOW_NAME: ${{ github.workflow }}
          GH_REF_NAME: ${{ github.ref }}
          PREP_VERSION: ${{ needs.prepare.outputs.version }}
          PREP_KMS_RELEASE_TAG: ${{ needs.prepare.outputs.kms_release_tag }}
          PREP_TARGET_COMMIT: ${{ needs.prepare.outputs.target_commit }}
          RELEASE_LOCKED_IMAGE_DIGEST: ${{ needs.release-container.outputs.locked_image_digest }}
          RELEASE_DEBUG_IMAGE_DIGEST: ${{ needs.release-container.outputs.debug_image_digest }}
          RELEASE_DEBUG_RO_IMAGE_DIGEST: ${{ needs.release-container.outputs.debug_ro_image_digest }}
          RELEASE_IMAGE_TAGS: ${{ needs.release-container.outputs.image_tags }}
        run: |
          set -euo pipefail
          mkdir -p release-assets

          sha256sum artifacts/*.tar.gz | sort | sed 's#  artifacts/#  #' > release-assets/kms-phala-checksums.txt

          image_name="ghcr.io/${GH_REPOSITORY_OWNER}/mero-kms-phala"
          image_digest="${RELEASE_LOCKED_IMAGE_DIGEST}"
          if [[ -z "${image_digest}" ]]; then
            echo "::error::Container image digest is empty"
            exit 1
          fi
          for profile_digest_var in RELEASE_DEBUG_IMAGE_DIGEST RELEASE_DEBUG_RO_IMAGE_DIGEST RELEASE_LOCKED_IMAGE_DIGEST; do
            if [[ -z "${!profile_digest_var}" ]]; then
              echo "::error::${profile_digest_var} is empty; expected per-profile KMS image digest."
              exit 1
            fi
          done
          if [[ "${RELEASE_DEBUG_IMAGE_DIGEST}" == "${RELEASE_DEBUG_RO_IMAGE_DIGEST}" \
             || "${RELEASE_DEBUG_IMAGE_DIGEST}" == "${RELEASE_LOCKED_IMAGE_DIGEST}" \
             || "${RELEASE_DEBUG_RO_IMAGE_DIGEST}" == "${RELEASE_LOCKED_IMAGE_DIGEST}" ]]; then
            echo "::error::KMS profile images must have unique digests (debug/debug-read-only/locked-read-only)."
            echo "::error::debug=${RELEASE_DEBUG_IMAGE_DIGEST} debug-read-only=${RELEASE_DEBUG_RO_IMAGE_DIGEST} locked-read-only=${RELEASE_LOCKED_IMAGE_DIGEST}"
            exit 1
          fi
          image_ref="${image_name}@${image_digest}"

          syft "${image_ref}" -o "spdx-json=release-assets/kms-phala-container-sbom.spdx.json"
          syft dir:artifacts -o "spdx-json=release-assets/kms-phala-binaries-sbom.spdx.json"

          cat > /tmp/mero-kms-tags.txt <<EOF
          ${RELEASE_IMAGE_TAGS}
          EOF
          tags_json="$(sed '/^[[:space:]]*$/d' /tmp/mero-kms-tags.txt | jq -R . | jq -s .)"

          binaries_json="$(
            while read -r checksum filepath; do
              file="${filepath#artifacts/}"
              jq -nc --arg file "$file" --arg checksum "$checksum" '{file: $file, sha256: $checksum}'
            done < release-assets/kms-phala-checksums.txt | jq -s '.'
          )"

          version="${PREP_VERSION}"
          kms_tag="mero-kms-v${version}"
          node_image_tag="mero-tee-v${version}"
          kms_policy_url="https://github.com/${GH_REPOSITORY}/releases/download/${kms_tag}/kms-phala-attestation-policy.json"
          node_policy_url="https://github.com/${GH_REPOSITORY}/releases/download/${node_image_tag}/published-mrtds.json"

          candidates_file_debug="probe-artifacts/kms-probe-${version}-debug/kms-policy-candidates.json"
          candidates_file_debug_ro="probe-artifacts/kms-probe-${version}-debug-read-only/kms-policy-candidates.json"
          candidates_file_locked="probe-artifacts/kms-probe-${version}-locked-read-only/kms-policy-candidates.json"
          node_policy_file="node-policy/published-mrtds.json"
          for candidates_file in "${candidates_file_debug}" "${candidates_file_debug_ro}" "${candidates_file_locked}"; do
            if [[ ! -f "${candidates_file}" ]]; then
              echo "::error::Probe candidates not found at ${candidates_file}"
              exit 1
            fi
          done
          if [[ ! -f "${node_policy_file}" ]]; then
            echo "::error::Node policy not found at ${node_policy_file}"
            exit 1
          fi

          kms_allowed_tcb_debug_json="$(jq -c '.policy.allowed_tcb_statuses' "${candidates_file_debug}")"
          kms_allowed_mrtd_debug_json="$(jq -c '.policy.allowed_mrtd' "${candidates_file_debug}")"
          kms_allowed_rtmr0_debug_json="$(jq -c '.policy.allowed_rtmr0' "${candidates_file_debug}")"
          kms_allowed_rtmr1_debug_json="$(jq -c '.policy.allowed_rtmr1' "${candidates_file_debug}")"
          kms_allowed_rtmr2_debug_json="$(jq -c '.policy.allowed_rtmr2' "${candidates_file_debug}")"
          kms_allowed_rtmr3_debug_json="$(jq -c '.policy.allowed_rtmr3' "${candidates_file_debug}")"

          kms_allowed_tcb_debug_ro_json="$(jq -c '.policy.allowed_tcb_statuses' "${candidates_file_debug_ro}")"
          kms_allowed_mrtd_debug_ro_json="$(jq -c '.policy.allowed_mrtd' "${candidates_file_debug_ro}")"
          kms_allowed_rtmr0_debug_ro_json="$(jq -c '.policy.allowed_rtmr0' "${candidates_file_debug_ro}")"
          kms_allowed_rtmr1_debug_ro_json="$(jq -c '.policy.allowed_rtmr1' "${candidates_file_debug_ro}")"
          kms_allowed_rtmr2_debug_ro_json="$(jq -c '.policy.allowed_rtmr2' "${candidates_file_debug_ro}")"
          kms_allowed_rtmr3_debug_ro_json="$(jq -c '.policy.allowed_rtmr3' "${candidates_file_debug_ro}")"

          kms_allowed_tcb_locked_json="$(jq -c '.policy.allowed_tcb_statuses' "${candidates_file_locked}")"
          kms_allowed_mrtd_locked_json="$(jq -c '.policy.allowed_mrtd' "${candidates_file_locked}")"
          kms_allowed_rtmr0_locked_json="$(jq -c '.policy.allowed_rtmr0' "${candidates_file_locked}")"
          kms_allowed_rtmr1_locked_json="$(jq -c '.policy.allowed_rtmr1' "${candidates_file_locked}")"
          kms_allowed_rtmr2_locked_json="$(jq -c '.policy.allowed_rtmr2' "${candidates_file_locked}")"
          kms_allowed_rtmr3_locked_json="$(jq -c '.policy.allowed_rtmr3' "${candidates_file_locked}")"

          np_debug="$(jq '.profiles.debug' "${node_policy_file}")"
          np_debug_ro="$(jq '.profiles["debug-read-only"]' "${node_policy_file}")"
          np_locked="$(jq '.profiles["locked-read-only"]' "${node_policy_file}")"

          node_allowed_tcb_debug_json="$(jq -c '.allowed_tcb_statuses' <<< "${np_debug}")"
          node_allowed_mrtd_debug_json="$(jq -c '.allowed_mrtd' <<< "${np_debug}")"
          node_allowed_rtmr0_debug_json="$(jq -c '.allowed_rtmr0' <<< "${np_debug}")"
          node_allowed_rtmr1_debug_json="$(jq -c '.allowed_rtmr1' <<< "${np_debug}")"
          node_allowed_rtmr2_debug_json="$(jq -c '.allowed_rtmr2' <<< "${np_debug}")"
          node_allowed_rtmr3_debug_json="$(jq -c '.allowed_rtmr3' <<< "${np_debug}")"

          node_allowed_tcb_debug_ro_json="$(jq -c '.allowed_tcb_statuses' <<< "${np_debug_ro}")"
          node_allowed_mrtd_debug_ro_json="$(jq -c '.allowed_mrtd' <<< "${np_debug_ro}")"
          node_allowed_rtmr0_debug_ro_json="$(jq -c '.allowed_rtmr0' <<< "${np_debug_ro}")"
          node_allowed_rtmr1_debug_ro_json="$(jq -c '.allowed_rtmr1' <<< "${np_debug_ro}")"
          node_allowed_rtmr2_debug_ro_json="$(jq -c '.allowed_rtmr2' <<< "${np_debug_ro}")"
          node_allowed_rtmr3_debug_ro_json="$(jq -c '.allowed_rtmr3' <<< "${np_debug_ro}")"

          node_allowed_tcb_locked_json="$(jq -c '.allowed_tcb_statuses' <<< "${np_locked}")"
          node_allowed_mrtd_locked_json="$(jq -c '.allowed_mrtd' <<< "${np_locked}")"
          node_allowed_rtmr0_locked_json="$(jq -c '.allowed_rtmr0' <<< "${np_locked}")"
          node_allowed_rtmr1_locked_json="$(jq -c '.allowed_rtmr1' <<< "${np_locked}")"
          node_allowed_rtmr2_locked_json="$(jq -c '.allowed_rtmr2' <<< "${np_locked}")"
          node_allowed_rtmr3_locked_json="$(jq -c '.allowed_rtmr3' <<< "${np_locked}")"

          jq -n \
            --arg tag "${PREP_VERSION}" \
            --arg run_id "${GH_RUN_ID}" \
            --arg run_attempt "${GH_RUN_ATTEMPT}" \
            --arg version "${version}" \
            --arg kms_tag "${kms_tag}" \
            --arg node_image_tag "${node_image_tag}" \
            --arg kms_policy_url "${kms_policy_url}" \
            --arg node_policy_url "${node_policy_url}" \
            --arg kms_debug_digest "${RELEASE_DEBUG_IMAGE_DIGEST}" \
            --arg kms_debug_ro_digest "${RELEASE_DEBUG_RO_IMAGE_DIGEST}" \
            --arg kms_locked_digest "${RELEASE_LOCKED_IMAGE_DIGEST}" \
            --arg kms_policy_debug_url "https://github.com/${GH_REPOSITORY}/releases/download/${kms_tag}/kms-phala-attestation-policy.debug.json" \
            --arg kms_policy_debug_ro_url "https://github.com/${GH_REPOSITORY}/releases/download/${kms_tag}/kms-phala-attestation-policy.debug-read-only.json" \
            --arg kms_policy_locked_url "https://github.com/${GH_REPOSITORY}/releases/download/${kms_tag}/kms-phala-attestation-policy.locked-read-only.json" \
            '{
              schema_version: 1,
              tag: $tag,
              workflow_run_id: $run_id,
              workflow_run_attempt: $run_attempt,
              generated_at: (now | todate),
              compatibility: {
                version: $version,
                roles: {
                  kms: "kms",
                  node: "node"
                },
                kms_tag: $kms_tag,
                node_image_tag: $node_image_tag,
                kms_policy_url: $kms_policy_url,
                node_policy_url: $node_policy_url,
                profiles: {
                  debug: {
                    kms_image_tag: ($version + "-debug"),
                    kms_image_digest: $kms_debug_digest,
                    kms_role: "kms",
                    kms_policy_asset: "kms-phala-attestation-policy.debug.json",
                    kms_policy_url: $kms_policy_debug_url,
                    node_role: "node",
                    node_profile: "debug",
                    node_policy_url: $node_policy_url
                  },
                  "debug-read-only": {
                    kms_image_tag: ($version + "-debug-read-only"),
                    kms_image_digest: $kms_debug_ro_digest,
                    kms_role: "kms",
                    kms_policy_asset: "kms-phala-attestation-policy.debug-read-only.json",
                    kms_policy_url: $kms_policy_debug_ro_url,
                    node_role: "node",
                    node_profile: "debug-read-only",
                    node_policy_url: $node_policy_url
                  },
                  "locked-read-only": {
                    kms_image_tag: ($version + "-locked-read-only"),
                    kms_image_digest: $kms_locked_digest,
                    kms_role: "kms",
                    kms_policy_asset: "kms-phala-attestation-policy.locked-read-only.json",
                    kms_policy_url: $kms_policy_locked_url,
                    node_role: "node",
                    node_profile: "locked-read-only",
                    node_policy_url: $node_policy_url
                  }
                }
              }
            }' > release-assets/kms-phala-compatibility-map.json

          jq -n \
            --arg tag "${PREP_VERSION}" \
            --arg commit "${PREP_TARGET_COMMIT}" \
            --arg run_id "${GH_RUN_ID}" \
            --arg run_attempt "${GH_RUN_ATTEMPT}" \
            --arg image "${image_name}" \
            --arg digest "${image_digest}" \
            --arg debug_digest "${RELEASE_DEBUG_IMAGE_DIGEST}" \
            --arg debug_ro_digest "${RELEASE_DEBUG_RO_IMAGE_DIGEST}" \
            --arg locked_digest "${RELEASE_LOCKED_IMAGE_DIGEST}" \
            --argjson tags "${tags_json}" \
            --arg compat_asset "kms-phala-compatibility-map.json" \
            '{
              schema_version: 1,
              tag: $tag,
              commit_sha: $commit,
              workflow_run_id: $run_id,
              workflow_run_attempt: $run_attempt,
              generated_at: (now | todate),
              container: {
                image: $image,
                digest: $digest,
                tags: $tags
              },
              container_profile_digests: {
                debug: $debug_digest,
                "debug-read-only": $debug_ro_digest,
                "locked-read-only": $locked_digest
              },
              compatibility_map_asset: $compat_asset
            }' > release-assets/kms-phala-container-metadata.json

          policy_registry_source_path="release-probe+node"

          for json_var in \
            kms_allowed_tcb_debug_json kms_allowed_mrtd_debug_json kms_allowed_rtmr0_debug_json kms_allowed_rtmr1_debug_json kms_allowed_rtmr2_debug_json kms_allowed_rtmr3_debug_json \
            kms_allowed_tcb_debug_ro_json kms_allowed_mrtd_debug_ro_json kms_allowed_rtmr0_debug_ro_json kms_allowed_rtmr1_debug_ro_json kms_allowed_rtmr2_debug_ro_json kms_allowed_rtmr3_debug_ro_json \
            kms_allowed_tcb_locked_json kms_allowed_mrtd_locked_json kms_allowed_rtmr0_locked_json kms_allowed_rtmr1_locked_json kms_allowed_rtmr2_locked_json kms_allowed_rtmr3_locked_json \
            node_allowed_tcb_debug_json node_allowed_mrtd_debug_json node_allowed_rtmr0_debug_json node_allowed_rtmr1_debug_json node_allowed_rtmr2_debug_json node_allowed_rtmr3_debug_json \
            node_allowed_tcb_debug_ro_json node_allowed_mrtd_debug_ro_json node_allowed_rtmr0_debug_ro_json node_allowed_rtmr1_debug_ro_json node_allowed_rtmr2_debug_ro_json node_allowed_rtmr3_debug_ro_json \
            node_allowed_tcb_locked_json node_allowed_mrtd_locked_json node_allowed_rtmr0_locked_json node_allowed_rtmr1_locked_json node_allowed_rtmr2_locked_json node_allowed_rtmr3_locked_json; do
            if ! jq -e 'type == "array" and length > 0' <<< "${!json_var}" >/dev/null 2>&1; then
              echo "::error::${json_var} must be a non-empty JSON array. Got: ${!json_var}"
              exit 1
            fi
          done

          for metric in mrtd rtmr0 rtmr1 rtmr2 rtmr3; do
            locked_var="node_allowed_${metric}_locked_json"
            debug_var="node_allowed_${metric}_debug_json"
            debug_ro_var="node_allowed_${metric}_debug_ro_json"
            if jq -e --argjson locked "${!locked_var}" --argjson other "${!debug_var}" '
              [($locked[] | ascii_downcase)] as $locked_norm
              | [($other[] | ascii_downcase)] as $other_norm
              | any($other_norm[] as $v; ($locked_norm | index($v)) != null)
            ' >/dev/null; then
              echo "::error::Locked profile ${metric} allowlist overlaps debug profile values."
              exit 1
            fi
            if jq -e --argjson locked "${!locked_var}" --argjson other "${!debug_ro_var}" '
              [($locked[] | ascii_downcase)] as $locked_norm
              | [($other[] | ascii_downcase)] as $other_norm
              | any($other_norm[] as $v; ($locked_norm | index($v)) != null)
            ' >/dev/null; then
              echo "::error::Locked profile ${metric} allowlist overlaps debug-read-only profile values."
              exit 1
            fi
          done

          # Role separation guardrail: KMS and node must not share RTMR3 values
          # within the same profile cohort, otherwise image spoofing boundaries blur.
          ensure_no_overlap() {
            local label="$1"
            local left_json="$2"
            local right_json="$3"
            if jq -e --argjson left "${left_json}" --argjson right "${right_json}" '
              [($left[] | ascii_downcase)] as $l
              | [($right[] | ascii_downcase)] as $r
              | any($r[] as $v; ($l | index($v)) != null)
            ' >/dev/null; then
              echo "::error::${label} has overlapping allowlist values between KMS and node roles."
              exit 1
            fi
          }

          ensure_no_overlap "debug RTMR3" "${kms_allowed_rtmr3_debug_json}" "${node_allowed_rtmr3_debug_json}"
          ensure_no_overlap "debug-read-only RTMR3" "${kms_allowed_rtmr3_debug_ro_json}" "${node_allowed_rtmr3_debug_ro_json}"
          ensure_no_overlap "locked-read-only RTMR3" "${kms_allowed_rtmr3_locked_json}" "${node_allowed_rtmr3_locked_json}"

          read -r default_binding_hex default_binding_b64 < <(
            python3 - <<'PY'
          import base64
          import hashlib

          digest = hashlib.sha256(b"mero-kms-phala-attest-v1").digest()
          print(digest.hex(), base64.b64encode(digest).decode())
          PY
          )

          jq -n \
            --arg tag "${PREP_VERSION}" \
            --arg commit "${PREP_TARGET_COMMIT}" \
            --arg run_id "${GH_RUN_ID}" \
            --arg run_attempt "${GH_RUN_ATTEMPT}" \
            --arg image "${image_name}" \
            --arg digest "${image_digest}" \
            --arg debug_digest "${RELEASE_DEBUG_IMAGE_DIGEST}" \
            --arg debug_ro_digest "${RELEASE_DEBUG_RO_IMAGE_DIGEST}" \
            --arg locked_digest "${RELEASE_LOCKED_IMAGE_DIGEST}" \
            --arg policy_registry_source_path "${policy_registry_source_path}" \
            --argjson tags "${tags_json}" \
            --argjson binaries "${binaries_json}" \
            '{
              tag: $tag,
              commit_sha: $commit,
              workflow_run_id: $run_id,
              workflow_run_attempt: $run_attempt,
              generated_at: (now | todate),
              binaries: $binaries,
              container: {
                image: $image,
                digest: $digest,
                tags: $tags
              },
              container_profile_digests: {
                debug: $debug_digest,
                "debug-read-only": $debug_ro_digest,
                "locked-read-only": $locked_digest
              },
              verification: {
                kms_attest_endpoint: "/attest",
                report_data_layout: {
                  bytes_0_31: "nonce",
                  bytes_32_63: "binding_or_default_domain_separator"
                },
                policy_registry_entry_path: $policy_registry_source_path,
                attestation_policy_asset: "kms-phala-attestation-policy.json",
                policy_profile_assets: {
                  debug: "kms-phala-attestation-policy.debug.json",
                  "debug-read-only": "kms-phala-attestation-policy.debug-read-only.json",
                  "locked-read-only": "kms-phala-attestation-policy.locked-read-only.json"
                },
                container_metadata_asset: "kms-phala-container-metadata.json",
                rekor: {
                  index_asset: "kms-phala-rekor-index.json"
                }
              },
              asset_purposes: {
                "kms-phala-checksums.txt": ["operator-required", "auditor-required"],
                "kms-phala-release-manifest.json": ["operator-required", "auditor-required"],
                "kms-phala-attestation-policy.json": ["operator-required", "auditor-required"],
                "kms-phala-attestation-policy.debug.json": ["operator-required", "auditor-required"],
                "kms-phala-attestation-policy.debug-read-only.json": ["operator-required", "auditor-required"],
                "kms-phala-attestation-policy.locked-read-only.json": ["operator-required", "auditor-required"],
                "kms-phala-container-metadata.json": ["operator-required", "auditor-required"],
                "kms-phala-rekor-index.json": ["auditor-required"],
                "kms-phala-trust-bundle.tar.gz": ["operator-convenience", "auditor-convenience"],
                "kms-phala-container-sbom.spdx.json": ["auditor-required"],
                "kms-phala-binaries-sbom.spdx.json": ["auditor-required"],
                "kms-phala-compatibility-map.json": ["operator-required", "auditor-required"]
              }
            }' > release-assets/kms-phala-release-manifest.json

          write_policy_file() {
            local profile="$1"
            local kms_tcb="$2"
            local kms_mrtd="$3"
            local kms_rtmr0="$4"
            local kms_rtmr1="$5"
            local kms_rtmr2="$6"
            local kms_rtmr3="$7"
            local node_tcb="$8"
            local node_mrtd="$9"
            local node_rtmr0="${10}"
            local node_rtmr1="${11}"
            local node_rtmr2="${12}"
            local node_rtmr3="${13}"
            local output_file="${14}"

            jq -n \
              --arg profile "${profile}" \
              --arg tag "${PREP_VERSION}" \
              --arg commit "${PREP_TARGET_COMMIT}" \
              --arg run_id "${GH_RUN_ID}" \
              --arg run_attempt "${GH_RUN_ATTEMPT}" \
              --arg repository "${GH_REPOSITORY}" \
              --arg workflow "${GH_WORKFLOW_NAME}" \
              --arg ref "${GH_REF_NAME}" \
              --arg policy_registry_source_path "${policy_registry_source_path}" \
              --arg default_binding_hex "${default_binding_hex}" \
              --arg default_binding_b64 "${default_binding_b64}" \
              --argjson kms_allowed_tcb "${kms_tcb}" \
              --argjson kms_allowed_mrtd "${kms_mrtd}" \
              --argjson kms_allowed_rtmr0 "${kms_rtmr0}" \
              --argjson kms_allowed_rtmr1 "${kms_rtmr1}" \
              --argjson kms_allowed_rtmr2 "${kms_rtmr2}" \
              --argjson kms_allowed_rtmr3 "${kms_rtmr3}" \
              --argjson node_allowed_tcb "${node_tcb}" \
              --argjson node_allowed_mrtd "${node_mrtd}" \
              --argjson node_allowed_rtmr0 "${node_rtmr0}" \
              --argjson node_allowed_rtmr1 "${node_rtmr1}" \
              --argjson node_allowed_rtmr2 "${node_rtmr2}" \
              --argjson node_allowed_rtmr3 "${node_rtmr3}" \
              '{
                schema_version: 1,
                role: "kms",
                profile: $profile,
                tag: $tag,
                commit_sha: $commit,
                workflow_run_id: $run_id,
                workflow_run_attempt: $run_attempt,
                generated_at: (now | todate),
                source: {
                  repository: $repository,
                  workflow: $workflow,
                  ref: $ref
                },
                policy_registry_entry_path: $policy_registry_source_path,
                measurement_markers: {
                  kms_role: "calimero.role=kms",
                  node_role: "calimero.role=node",
                  node_profile_key: "calimero.profile",
                  node_root_hash_key: "calimero.root_hash"
                },
                kms: {
                  provider: "mero-kms-phala",
                  attest_endpoint: "/attest",
                  report_data_layout: {
                    bytes_0_31: "nonce",
                    bytes_32_63: "binding_or_default_domain_separator"
                  },
                  default_binding_hex: $default_binding_hex,
                  default_binding_b64: $default_binding_b64
                },
                policy: {
                  kms_allowed_tcb_statuses: $kms_allowed_tcb,
                  kms_allowed_mrtd: $kms_allowed_mrtd,
                  kms_allowed_rtmr0: $kms_allowed_rtmr0,
                  kms_allowed_rtmr1: $kms_allowed_rtmr1,
                  kms_allowed_rtmr2: $kms_allowed_rtmr2,
                  kms_allowed_rtmr3: $kms_allowed_rtmr3,
                  node_allowed_tcb_statuses: $node_allowed_tcb,
                  node_allowed_mrtd: $node_allowed_mrtd,
                  node_allowed_rtmr0: $node_allowed_rtmr0,
                  node_allowed_rtmr1: $node_allowed_rtmr1,
                  node_allowed_rtmr2: $node_allowed_rtmr2,
                  node_allowed_rtmr3: $node_allowed_rtmr3
                },
                merod_config_path: "tee.kms.phala.attestation"
              }' > "${output_file}"
          }

          write_policy_file "debug" \
            "${kms_allowed_tcb_debug_json}" \
            "${kms_allowed_mrtd_debug_json}" \
            "${kms_allowed_rtmr0_debug_json}" \
            "${kms_allowed_rtmr1_debug_json}" \
            "${kms_allowed_rtmr2_debug_json}" \
            "${kms_allowed_rtmr3_debug_json}" \
            "${node_allowed_tcb_debug_json}" \
            "${node_allowed_mrtd_debug_json}" \
            "${node_allowed_rtmr0_debug_json}" \
            "${node_allowed_rtmr1_debug_json}" \
            "${node_allowed_rtmr2_debug_json}" \
            "${node_allowed_rtmr3_debug_json}" \
            "release-assets/kms-phala-attestation-policy.debug.json"

          write_policy_file "debug-read-only" \
            "${kms_allowed_tcb_debug_ro_json}" \
            "${kms_allowed_mrtd_debug_ro_json}" \
            "${kms_allowed_rtmr0_debug_ro_json}" \
            "${kms_allowed_rtmr1_debug_ro_json}" \
            "${kms_allowed_rtmr2_debug_ro_json}" \
            "${kms_allowed_rtmr3_debug_ro_json}" \
            "${node_allowed_tcb_debug_ro_json}" \
            "${node_allowed_mrtd_debug_ro_json}" \
            "${node_allowed_rtmr0_debug_ro_json}" \
            "${node_allowed_rtmr1_debug_ro_json}" \
            "${node_allowed_rtmr2_debug_ro_json}" \
            "${node_allowed_rtmr3_debug_ro_json}" \
            "release-assets/kms-phala-attestation-policy.debug-read-only.json"

          write_policy_file "locked-read-only" \
            "${kms_allowed_tcb_locked_json}" \
            "${kms_allowed_mrtd_locked_json}" \
            "${kms_allowed_rtmr0_locked_json}" \
            "${kms_allowed_rtmr1_locked_json}" \
            "${kms_allowed_rtmr2_locked_json}" \
            "${kms_allowed_rtmr3_locked_json}" \
            "${node_allowed_tcb_locked_json}" \
            "${node_allowed_mrtd_locked_json}" \
            "${node_allowed_rtmr0_locked_json}" \
            "${node_allowed_rtmr1_locked_json}" \
            "${node_allowed_rtmr2_locked_json}" \
            "${node_allowed_rtmr3_locked_json}" \
            "release-assets/kms-phala-attestation-policy.locked-read-only.json"

          cp release-assets/kms-phala-attestation-policy.locked-read-only.json \
            release-assets/kms-phala-attestation-policy.json

          policy_sha_debug="$(sha256sum release-assets/kms-phala-attestation-policy.debug.json | awk '{print $1}')"
          policy_sha_debug_ro="$(sha256sum release-assets/kms-phala-attestation-policy.debug-read-only.json | awk '{print $1}')"
          policy_sha_locked="$(sha256sum release-assets/kms-phala-attestation-policy.locked-read-only.json | awk '{print $1}')"
          jq \
            --arg sha_debug "${policy_sha_debug}" \
            --arg sha_debug_ro "${policy_sha_debug_ro}" \
            --arg sha_locked "${policy_sha_locked}" \
            '
            .compatibility.profiles.debug.kms_policy_sha256 = $sha_debug
            | .compatibility.profiles["debug-read-only"].kms_policy_sha256 = $sha_debug_ro
            | .compatibility.profiles["locked-read-only"].kms_policy_sha256 = $sha_locked
            | .compatibility.kms_policy_sha256 = $sha_locked
            ' \
            release-assets/kms-phala-compatibility-map.json > release-assets/kms-phala-compatibility-map.json.tmp
          mv release-assets/kms-phala-compatibility-map.json.tmp release-assets/kms-phala-compatibility-map.json

          sha256sum \
            release-assets/kms-phala-checksums.txt \
            release-assets/kms-phala-release-manifest.json \
            release-assets/kms-phala-attestation-policy.json \
            release-assets/kms-phala-attestation-policy.debug.json \
            release-assets/kms-phala-attestation-policy.debug-read-only.json \
            release-assets/kms-phala-attestation-policy.locked-read-only.json \
            | sed 's#  release-assets/#  #' \
            > release-assets/MANIFEST.txt

          tar -czf release-assets/kms-phala-trust-bundle.tar.gz \
            -C release-assets \
            MANIFEST.txt \
            kms-phala-checksums.txt \
            kms-phala-release-manifest.json \
            kms-phala-attestation-policy.json \
            kms-phala-attestation-policy.debug.json \
            kms-phala-attestation-policy.debug-read-only.json \
            kms-phala-attestation-policy.locked-read-only.json

          compatibility_kms_tag="$(jq -r '.compatibility.kms_tag' release-assets/kms-phala-compatibility-map.json)"
          compatibility_merod_tag="$(jq -r '.compatibility.node_image_tag' release-assets/kms-phala-compatibility-map.json)"
          compatibility_kms_policy_url="$(jq -r '.compatibility.kms_policy_url' release-assets/kms-phala-compatibility-map.json)"
          compatibility_node_policy_url="$(jq -r '.compatibility.node_policy_url' release-assets/kms-phala-compatibility-map.json)"
          compatibility_kms_policy_debug_url="$(jq -r '.compatibility.profiles.debug.kms_policy_url' release-assets/kms-phala-compatibility-map.json)"
          compatibility_kms_policy_debug_ro_url="$(jq -r '.compatibility.profiles["debug-read-only"].kms_policy_url' release-assets/kms-phala-compatibility-map.json)"
          compatibility_kms_policy_locked_url="$(jq -r '.compatibility.profiles["locked-read-only"].kms_policy_url' release-assets/kms-phala-compatibility-map.json)"
          run_url="https://github.com/${GH_REPOSITORY}/actions/runs/${GH_RUN_ID}"

          profile_policy_debug_file="release-assets/kms-phala-attestation-policy.debug.json"
          profile_policy_debug_ro_file="release-assets/kms-phala-attestation-policy.debug-read-only.json"
          profile_policy_locked_file="release-assets/kms-phala-attestation-policy.locked-read-only.json"

          format_allowlist_md() {
            local file="$1"
            local key="$2"
            jq -r --arg key "${key}" '
              (.policy[$key] // [])
              | if (type == "array" and length > 0) then
                  map("`" + tostring + "`") | join("<br>")
                else
                  "n/a"
                end
            ' "${file}"
          }

          debug_mrtd="$(format_allowlist_md "${profile_policy_debug_file}" "node_allowed_mrtd")"
          debug_ro_mrtd="$(format_allowlist_md "${profile_policy_debug_ro_file}" "node_allowed_mrtd")"
          locked_ro_mrtd="$(format_allowlist_md "${profile_policy_locked_file}" "node_allowed_mrtd")"
          debug_rtmr0="$(format_allowlist_md "${profile_policy_debug_file}" "node_allowed_rtmr0")"
          debug_rtmr1="$(format_allowlist_md "${profile_policy_debug_file}" "node_allowed_rtmr1")"
          debug_rtmr2="$(format_allowlist_md "${profile_policy_debug_file}" "node_allowed_rtmr2")"
          debug_rtmr3="$(format_allowlist_md "${profile_policy_debug_file}" "node_allowed_rtmr3")"
          debug_ro_rtmr0="$(format_allowlist_md "${profile_policy_debug_ro_file}" "node_allowed_rtmr0")"
          debug_ro_rtmr1="$(format_allowlist_md "${profile_policy_debug_ro_file}" "node_allowed_rtmr1")"
          debug_ro_rtmr2="$(format_allowlist_md "${profile_policy_debug_ro_file}" "node_allowed_rtmr2")"
          debug_ro_rtmr3="$(format_allowlist_md "${profile_policy_debug_ro_file}" "node_allowed_rtmr3")"
          locked_ro_rtmr0="$(format_allowlist_md "${profile_policy_locked_file}" "node_allowed_rtmr0")"
          locked_ro_rtmr1="$(format_allowlist_md "${profile_policy_locked_file}" "node_allowed_rtmr1")"
          locked_ro_rtmr2="$(format_allowlist_md "${profile_policy_locked_file}" "node_allowed_rtmr2")"
          locked_ro_rtmr3="$(format_allowlist_md "${profile_policy_locked_file}" "node_allowed_rtmr3")"

          debug_mrtd_preview="$(jq -r '.profiles.debug.allowed_mrtd[0] // "n/a"' "${node_policy_file}")"
          debug_ro_mrtd_preview="$(jq -r '.profiles["debug-read-only"].allowed_mrtd[0] // "n/a"' "${node_policy_file}")"
          locked_ro_mrtd_preview="$(jq -r '.profiles["locked-read-only"].allowed_mrtd[0] // "n/a"' "${node_policy_file}")"
          debug_rtmr0_preview="$(jq -r '.profiles.debug.allowed_rtmr0[0] // "n/a"' "${node_policy_file}")"
          debug_rtmr2_preview="$(jq -r '.profiles.debug.allowed_rtmr2[0] // "n/a"' "${node_policy_file}")"
          debug_ro_rtmr0_preview="$(jq -r '.profiles["debug-read-only"].allowed_rtmr0[0] // "n/a"' "${node_policy_file}")"
          debug_ro_rtmr2_preview="$(jq -r '.profiles["debug-read-only"].allowed_rtmr2[0] // "n/a"' "${node_policy_file}")"
          locked_ro_rtmr0_preview="$(jq -r '.profiles["locked-read-only"].allowed_rtmr0[0] // "n/a"' "${node_policy_file}")"
          locked_ro_rtmr2_preview="$(jq -r '.profiles["locked-read-only"].allowed_rtmr2[0] // "n/a"' "${node_policy_file}")"

          kms_mrtd="$(format_allowlist_md "${profile_policy_locked_file}" "kms_allowed_mrtd")"
          kms_rtmr0="$(format_allowlist_md "${profile_policy_locked_file}" "kms_allowed_rtmr0")"
          kms_rtmr1="$(format_allowlist_md "${profile_policy_locked_file}" "kms_allowed_rtmr1")"
          kms_rtmr2="$(format_allowlist_md "${profile_policy_locked_file}" "kms_allowed_rtmr2")"
          kms_rtmr3="$(format_allowlist_md "${profile_policy_locked_file}" "kms_allowed_rtmr3")"

          {
            echo "## mero-kms release ${PREP_VERSION}"
            echo ""
            echo "### Release metadata"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Tag | \`${PREP_KMS_RELEASE_TAG}\` |"
            echo "| Commit | \`${PREP_TARGET_COMMIT}\` |"
            echo "| Workflow run | [${GH_RUN_ID}](${run_url}) |"
            echo "| Container image | \`${image_ref}\` |"
            echo "| Policy registry source | \`${policy_registry_source_path}\` |"
            echo ""
            echo "### Compatibility map"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| KMS release tag | \`${compatibility_kms_tag}\` |"
            echo "| merod release tag | \`${compatibility_merod_tag}\` |"
            echo "| KMS policy URL | \`${compatibility_kms_policy_url}\` |"
            echo "| Node policy URL | \`${compatibility_node_policy_url}\` |"
            echo "| Debug profile policy URL | \`${compatibility_kms_policy_debug_url}\` |"
            echo "| Debug-read-only profile policy URL | \`${compatibility_kms_policy_debug_ro_url}\` |"
            echo "| Locked-read-only profile policy URL | \`${compatibility_kms_policy_locked_url}\` |"
            echo ""
            echo "### KMS measurement allowlists (enforced by merod against /attest)"
            echo ""
            echo "| Measurement | Allowed values |"
            echo "|---|---|"
            echo "| MRTD | ${kms_mrtd} |"
            echo "| RTMR0 | ${kms_rtmr0} |"
            echo "| RTMR1 | ${kms_rtmr1} |"
            echo "| RTMR2 | ${kms_rtmr2} |"
            echo "| RTMR3 | ${kms_rtmr3} |"
            echo ""
            echo "### Node profile measurements (enforced by KMS for /get-key)"
            echo ""
            echo "| Profile | MRTD |"
            echo "|---|---|"
            echo "| debug | ${debug_mrtd} |"
            echo "| debug-read-only | ${debug_ro_mrtd} |"
            echo "| locked-read-only | ${locked_ro_mrtd} |"
            echo ""
            echo "| Profile | RTMR0 | RTMR1 | RTMR2 | RTMR3 |"
            echo "|---|---|---|---|---|"
            echo "| debug | ${debug_rtmr0} | ${debug_rtmr1} | ${debug_rtmr2} | ${debug_rtmr3} |"
            echo "| debug-read-only | ${debug_ro_rtmr0} | ${debug_ro_rtmr1} | ${debug_ro_rtmr2} | ${debug_ro_rtmr3} |"
            echo "| locked-read-only | ${locked_ro_rtmr0} | ${locked_ro_rtmr1} | ${locked_ro_rtmr2} | ${locked_ro_rtmr3} |"
            echo ""
            echo "### Full attestation policies (all MRTD/RTMR arrays)"
            echo ""
            echo "#### Profile: debug"
            echo "\`\`\`json"
            jq '.policy | {
              kms_allowed_tcb_statuses,
              kms_allowed_mrtd,
              kms_allowed_rtmr0,
              kms_allowed_rtmr1,
              kms_allowed_rtmr2,
              kms_allowed_rtmr3,
              node_allowed_tcb_statuses,
              node_allowed_mrtd,
              node_allowed_rtmr0,
              node_allowed_rtmr1,
              node_allowed_rtmr2,
              node_allowed_rtmr3
            }' "${profile_policy_debug_file}"
            echo "\`\`\`"
            echo ""
            echo "#### Profile: debug-read-only"
            echo "\`\`\`json"
            jq '.policy | {
              kms_allowed_tcb_statuses,
              kms_allowed_mrtd,
              kms_allowed_rtmr0,
              kms_allowed_rtmr1,
              kms_allowed_rtmr2,
              kms_allowed_rtmr3,
              node_allowed_tcb_statuses,
              node_allowed_mrtd,
              node_allowed_rtmr0,
              node_allowed_rtmr1,
              node_allowed_rtmr2,
              node_allowed_rtmr3
            }' "${profile_policy_debug_ro_file}"
            echo "\`\`\`"
            echo ""
            echo "#### Profile: locked-read-only"
            echo "\`\`\`json"
            jq '.policy | {
              kms_allowed_tcb_statuses,
              kms_allowed_mrtd,
              kms_allowed_rtmr0,
              kms_allowed_rtmr1,
              kms_allowed_rtmr2,
              kms_allowed_rtmr3,
              node_allowed_tcb_statuses,
              node_allowed_mrtd,
              node_allowed_rtmr0,
              node_allowed_rtmr1,
              node_allowed_rtmr2,
              node_allowed_rtmr3
            }' "${profile_policy_locked_file}"
            echo "\`\`\`"
            echo ""
            echo "### Binary archives (SHA-256)"
            echo ""
            echo "| Archive | SHA-256 |"
            echo "|---|---|"
            while read -r checksum archive; do
              echo "| \`${archive}\` | \`${checksum}\` |"
            done < release-assets/kms-phala-checksums.txt
            echo ""
            echo "### Verification commands"
            echo ""
            echo "**Quick verify (operator):**"
            echo "\`\`\`bash"
            echo "scripts/release/verify-kms-phala-release-assets.sh ${PREP_KMS_RELEASE_TAG}"
            echo "\`\`\`"
            echo ""
            echo "**Full audit (all release classes):**"
            echo "\`\`\`bash"
            echo "scripts/release/verify-release-assets.sh ${PREP_VERSION}"
            echo "\`\`\`"
            echo ""
            echo "### Trust assets (detailed)"
            echo ""
            echo "| Asset | What it contains | Why operators need it |"
            echo "|---|---|---|"
            echo "| \`kms-phala-trust-bundle.tar.gz\` | Canonical trust bundle (\`MANIFEST.txt\`, checksums, manifest, policies) | Offline transfer and audit-friendly verification seed |"
            echo "| \`kms-phala-checksums.txt\` | SHA-256 of published binary archives | Integrity verification before extraction/deploy |"
            echo "| \`kms-phala-release-manifest.json\` | Release metadata, container digest/tags, verification contract | Primary machine-readable release contract |"
            echo "| \`kms-phala-attestation-policy.json\` | Legacy/default policy alias (locked-read-only) | Backward compatibility for existing tooling |"
            echo "| \`kms-phala-attestation-policy.debug.json\` | Full debug profile policy (KMS+node allowlists) | Debug cohort deployments only |"
            echo "| \`kms-phala-attestation-policy.debug-read-only.json\` | Full debug-read-only profile policy | Pre-production hardening cohort |"
            echo "| \`kms-phala-attestation-policy.locked-read-only.json\` | Full production profile policy | Production deployment baseline |"
            echo "| \`kms-phala-compatibility-map.json\` | KMS↔mero-tee mapping + per-profile policy URLs/hashes | Prevents profile/version mismatch rollout |"
            echo "| \`kms-phala-container-metadata.json\` | Container image digest/tags and linkage to release | Digest-pinned deployment verification |"
            echo "| \`kms-phala-rekor-index.json\` | Transparency log lookup data for signed assets | Independent signature transparency audit |"
            echo "| \`kms-phala-container-sbom.spdx.json\` | SBOM for released container image | Supply-chain review/compliance |"
            echo "| \`kms-phala-binaries-sbom.spdx.json\` | SBOM for released binary artifacts | Binary supply-chain review/compliance |"
            echo ""
            echo "Every listed trust asset has Sigstore keyless sidecars (\`.sig\`, \`.pem\`, and where applicable \`.bundle.json\`)."
            echo ""
            echo "### Generate merod attestation config (release-pinned)"
            echo ""
            echo "\`\`\`bash"
            echo "scripts/policy/generate-merod-kms-phala-attestation-config.sh --profile locked-read-only ${PREP_KMS_RELEASE_TAG} https://<kms-url>/"
            echo "\`\`\`"
          } > release-assets/release-notes.md

          {
            echo "## mero-kms release ${PREP_VERSION}"
            echo ""
            echo "- Tag: ${PREP_KMS_RELEASE_TAG}"
            echo "- Compatible node: ${compatibility_merod_tag}"
            echo ""
            echo "### KMS measurement allowlists (locked-read-only policy)"
            echo "| Measurement | Allowed values |"
            echo "|---|---|"
            echo "| MRTD | ${kms_mrtd} |"
            echo "| RTMR0 | ${kms_rtmr0} |"
            echo "| RTMR1 | ${kms_rtmr1} |"
            echo "| RTMR2 | ${kms_rtmr2} |"
            echo "| RTMR3 | ${kms_rtmr3} |"
            echo ""
            echo "### Node profile measurements (node policy reference)"
            echo "| Profile | MRTD | RTMR0 | RTMR2 |"
            echo "|---|---|---|---|"
            echo "| debug | ${debug_mrtd_preview:0:24}... | ${debug_rtmr0_preview:0:24}... | ${debug_rtmr2_preview:0:24}... |"
            echo "| debug-read-only | ${debug_ro_mrtd_preview:0:24}... | ${debug_ro_rtmr0_preview:0:24}... | ${debug_ro_rtmr2_preview:0:24}... |"
            echo "| locked-read-only | ${locked_ro_mrtd_preview:0:24}... | ${locked_ro_rtmr0_preview:0:24}... | ${locked_ro_rtmr2_preview:0:24}... |"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Install cosign for keyless signing
        uses: sigstore/cosign-installer@v3

      - name: Sign release metadata and binary archives with Sigstore keyless
        env:
          COSIGN_YES: "true"
          PREP_VERSION: ${{ needs.prepare.outputs.version }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set -euo pipefail

          assets_for_rekor=(
            artifacts/*.tar.gz
            release-assets/kms-phala-checksums.txt
            release-assets/kms-phala-attestation-policy.json
            release-assets/kms-phala-attestation-policy.debug.json
            release-assets/kms-phala-attestation-policy.debug-read-only.json
            release-assets/kms-phala-attestation-policy.locked-read-only.json
            release-assets/kms-phala-container-metadata.json
            release-assets/kms-phala-container-sbom.spdx.json
            release-assets/kms-phala-binaries-sbom.spdx.json
            release-assets/kms-phala-trust-bundle.tar.gz
            release-assets/kms-phala-compatibility-map.json
          )

          for asset in "${assets_for_rekor[@]}"; do
            base_name="$(basename "${asset}")"
            cosign sign-blob \
              --yes \
              --output-signature "release-assets/${base_name}.sig" \
              --output-certificate "release-assets/${base_name}.pem" \
              --bundle "release-assets/${base_name}.bundle.json" \
              "${asset}"
          done

          rekor_entries_json="$(
            for asset in "${assets_for_rekor[@]}"; do
              base_name="$(basename "${asset}")"
              bundle_file="release-assets/${base_name}.bundle.json"
              asset_sha256="$(sha256sum "${asset}" | awk '{print $1}')"
              sigstore_search_url="https://search.sigstore.dev/?hash=sha256:${asset_sha256}"
              log_index="$(jq -r '.verificationMaterial.tlogEntries[0].logIndex // .VerificationMaterial.tlogEntries[0].logIndex // .tlogEntries[0].logIndex // empty' "${bundle_file}")"
              integrated_time="$(jq -r '.verificationMaterial.tlogEntries[0].integratedTime // .VerificationMaterial.tlogEntries[0].integratedTime // .tlogEntries[0].integratedTime // empty' "${bundle_file}")"
              log_id="$(jq -r '.verificationMaterial.tlogEntries[0].logId.keyId // .VerificationMaterial.tlogEntries[0].logId.keyId // .tlogEntries[0].logId.keyId // empty' "${bundle_file}")"
              jq -nc \
                --arg asset "${base_name}" \
                --arg bundle_asset "${base_name}.bundle.json" \
                --arg hash "sha256:${asset_sha256}" \
                --arg sigstore_search_url "${sigstore_search_url}" \
                --arg log_index "${log_index}" \
                --arg integrated_time "${integrated_time}" \
                --arg log_id "${log_id}" \
                '{
                  asset: $asset,
                  bundle_asset: $bundle_asset,
                  hash: $hash,
                  sigstore_search_url: $sigstore_search_url,
                  log_index: $log_index,
                  integrated_time: $integrated_time,
                  log_id: $log_id
                }'
            done | jq -s '.'
          )"

          jq -n \
            --arg tag "${PREP_VERSION}" \
            --arg run_id "${GH_RUN_ID}" \
            --arg run_attempt "${GH_RUN_ATTEMPT}" \
            --argjson entries "${rekor_entries_json}" \
            '{
              schema_version: 1,
              tag: $tag,
              workflow_run_id: $run_id,
              workflow_run_attempt: $run_attempt,
              generated_at: (now | todate),
              entries: $entries
            }' > release-assets/kms-phala-rekor-index.json

          post_assets=(
            release-assets/kms-phala-rekor-index.json
            release-assets/kms-phala-release-manifest.json
          )
          for asset in "${post_assets[@]}"; do
            base_name="$(basename "${asset}")"
            cosign sign-blob \
              --yes \
              --output-signature "release-assets/${base_name}.sig" \
              --output-certificate "release-assets/${base_name}.pem" \
              --bundle "release-assets/${base_name}.bundle.json" \
              "${asset}"
          done

      - name: Verify generated signatures (sanity check)
        env:
          COSIGN_CERTIFICATE_OIDC_ISSUER: https://token.actions.githubusercontent.com
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          cert_identity_regex="^https://github.com/${GH_REPOSITORY}/.github/workflows/release-kms-phala.yaml@refs/heads/master$"
          signed_assets=(
            artifacts/*.tar.gz
            release-assets/kms-phala-checksums.txt
            release-assets/kms-phala-release-manifest.json
            release-assets/kms-phala-attestation-policy.json
            release-assets/kms-phala-attestation-policy.debug.json
            release-assets/kms-phala-attestation-policy.debug-read-only.json
            release-assets/kms-phala-attestation-policy.locked-read-only.json
            release-assets/kms-phala-container-metadata.json
            release-assets/kms-phala-container-sbom.spdx.json
            release-assets/kms-phala-binaries-sbom.spdx.json
            release-assets/kms-phala-trust-bundle.tar.gz
            release-assets/kms-phala-compatibility-map.json
            release-assets/kms-phala-rekor-index.json
          )

          for asset in "${signed_assets[@]}"; do
            base_name="$(basename "${asset}")"
            cosign verify-blob \
              --certificate "release-assets/${base_name}.pem" \
              --signature "release-assets/${base_name}.sig" \
              --certificate-identity-regexp "${cert_identity_regex}" \
              --certificate-oidc-issuer "${COSIGN_CERTIFICATE_OIDC_ISSUER}" \
              "${asset}" >/dev/null
          done

      - name: Upload release metadata assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN || secrets.GHCR_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          tag_name: ${{ needs.prepare.outputs.kms_release_tag }}
          make_latest: false
          draft: false
          body_path: release-assets/release-notes.md
          fail_on_unmatched_files: true
          files: |
            artifacts/*.tar.gz
            release-assets/*.tar.gz.sig
            release-assets/*.tar.gz.pem
            release-assets/kms-phala-checksums.txt
            release-assets/kms-phala-checksums.txt.sig
            release-assets/kms-phala-checksums.txt.pem
            release-assets/kms-phala-release-manifest.json
            release-assets/kms-phala-release-manifest.json.sig
            release-assets/kms-phala-release-manifest.json.pem
            release-assets/kms-phala-release-manifest.json.bundle.json
            release-assets/kms-phala-attestation-policy.json
            release-assets/kms-phala-attestation-policy.json.sig
            release-assets/kms-phala-attestation-policy.json.pem
            release-assets/kms-phala-attestation-policy.debug.json
            release-assets/kms-phala-attestation-policy.debug.json.sig
            release-assets/kms-phala-attestation-policy.debug.json.pem
            release-assets/kms-phala-attestation-policy.debug-read-only.json
            release-assets/kms-phala-attestation-policy.debug-read-only.json.sig
            release-assets/kms-phala-attestation-policy.debug-read-only.json.pem
            release-assets/kms-phala-attestation-policy.locked-read-only.json
            release-assets/kms-phala-attestation-policy.locked-read-only.json.sig
            release-assets/kms-phala-attestation-policy.locked-read-only.json.pem
            release-assets/kms-phala-container-metadata.json
            release-assets/kms-phala-container-metadata.json.sig
            release-assets/kms-phala-container-metadata.json.pem
            release-assets/kms-phala-container-metadata.json.bundle.json
            release-assets/kms-phala-container-sbom.spdx.json
            release-assets/kms-phala-container-sbom.spdx.json.sig
            release-assets/kms-phala-container-sbom.spdx.json.pem
            release-assets/kms-phala-container-sbom.spdx.json.bundle.json
            release-assets/kms-phala-binaries-sbom.spdx.json
            release-assets/kms-phala-binaries-sbom.spdx.json.sig
            release-assets/kms-phala-binaries-sbom.spdx.json.pem
            release-assets/kms-phala-binaries-sbom.spdx.json.bundle.json
            release-assets/kms-phala-trust-bundle.tar.gz
            release-assets/kms-phala-compatibility-map.json
            release-assets/kms-phala-compatibility-map.json.sig
            release-assets/kms-phala-compatibility-map.json.pem
            release-assets/kms-phala-compatibility-map.json.bundle.json
            release-assets/kms-phala-attestation-policy.json.bundle.json
            release-assets/kms-phala-attestation-policy.debug.json.bundle.json
            release-assets/kms-phala-attestation-policy.debug-read-only.json.bundle.json
            release-assets/kms-phala-attestation-policy.locked-read-only.json.bundle.json
            release-assets/kms-phala-rekor-index.json
            release-assets/kms-phala-rekor-index.json.sig
            release-assets/kms-phala-rekor-index.json.pem
            release-assets/kms-phala-rekor-index.json.bundle.json
            release-assets/kms-phala-checksums.txt.bundle.json
            release-assets/*.tar.gz.bundle.json

      - name: Smoke test published mero-kms release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          scripts/release/verify-kms-phala-release-assets.sh "${{ needs.prepare.outputs.kms_release_tag }}"

      - name: Upsert umbrella version release links
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${{ needs.prepare.outputs.version }}"
          kms_tag="${{ needs.prepare.outputs.kms_release_tag }}"
          tee_tag="mero-tee-v${version}"
          notes_file="$(mktemp)"
          {
            echo "## Consolidated release ${version}"
            echo
            echo "This is an index release that links to component releases:"
            echo
            echo "- mero-kms: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${kms_tag}"
            echo "- mero-tee: https://github.com/${GITHUB_REPOSITORY}/releases/tag/${tee_tag}"
          } > "${notes_file}"

          if gh release view "${version}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${version}" --repo "${GITHUB_REPOSITORY}" --notes-file "${notes_file}" --title "${version}" --draft
          else
            gh release create "${version}" --repo "${GITHUB_REPOSITORY}" --title "${version}" --notes-file "${notes_file}" --target "${{ needs.prepare.outputs.target_commit }}" --draft
          fi
