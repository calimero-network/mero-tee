name: CI mero-kms-phala

on:
  push:
    branches:
      - master
    paths:
      - Cargo.toml
      - Cargo.lock
      - "src/**"
      - ".github/workflows/ci-kms-phala.yaml"
  pull_request:
    paths:
      - Cargo.toml
      - Cargo.lock
      - "src/**"
      - ".github/workflows/ci-kms-phala.yaml"

permissions:
  contents: read

concurrency:
  group: ci-kms-phala-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt-clippy-test:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0
          components: rustfmt, clippy

      - name: Setup rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ci-mero-kms-phala

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Tests
        run: cargo test
