---
# Merod TEE image (R1–R9). Profile (locked-read-only | debug-read-only | debug) controls which roles run.
# Attestation: calimero.role + calimero.profile + calimero.root_hash in kernel cmdline (RTMR[2]).
# calimero-init extends RTMR[3] with role+profile+root_hash at boot (kernel 6.16+).
# Root hash covers /etc/calimero, /usr/local/lib/calimero, /etc/default/grub — cannot be forged.
- hosts: all
  become: true
  pre_tasks:
    - name: Refresh apt metadata cache only (avoid non-deterministic full upgrades)
      apt:
        update_cache: yes
        cache_valid_time: 3600
  roles:
    - role: ansible/roles/mero-traefik
      vars:
        # Third-party binaries use amd64 in release URLs; x86/x86_64 -> amd64
        cpu_architecture: "{{ 'amd64' if cpu_architecture in ['x86', 'x86_64'] else cpu_architecture }}"
        traefik_version: "{{ traefik_version }}"

    # Bake merod/meroctl/mero-auth at build time (core tag). calimero-init skips download if present.
    - role: ansible/roles/calimero-core
      vars:
        merod_version: "{{ merod_version }}"
        cpu_platform: "{{ 'x86_64' if cpu_architecture in ['amd64', 'x86', 'x86_64'] else cpu_architecture }}"

    - role: ansible/roles/merotee
      vars:
        image_profile: "{{ lockdown_profile | default('locked-read-only') }}"

    - role: ansible/roles/node-exporter
      vars:
        version: "{{ node_exporter_version }}"
        cpu_architecture: "{{ 'amd64' if cpu_architecture in ['x86', 'x86_64'] else cpu_architecture }}"

    - role: ansible/roles/vmagent
      vars:
        vmagent_version: "{{ vmagent_version }}"
        cpu_architecture: "{{ 'amd64' if cpu_architecture in ['x86', 'x86_64'] else cpu_architecture }}"

    - role: ansible/roles/vector
      vars:
        version: "{{ vector_version }}"

    - role: ansible/roles/cleanup

    # Lockdown (no SSH, no getty, etc.) only for production profile so MRTD differs per profile
    - role: ansible/roles/merod-lockdown
      when: (lockdown_profile | default('locked-read-only')) == 'locked-read-only'

    - role: ansible/roles/merotee-conformance
      when: (lockdown_profile | default('locked-read-only')) == 'locked-read-only'
  post_tasks:
    # Ensure each profile has distinct content so MRTD differs (merotee role has created /etc/calimero)
    - name: Record image profile for attestation
      copy:
        content: "{{ lockdown_profile | default('locked-read-only') }}\n"
        dest: /etc/calimero/image-profile
        mode: "0644"

    # Hash profile-specific root content and inject into kernel cmdline (measured into RTMR[2]).
    # An attacker cannot forge: different root content = different hash = different measurement.
    - name: Compute root content hash for attestation
      shell: |
        # Hash calimero config + init (profile-specific) and grub (lockdown strips console)
        { find /etc/calimero /usr/local/lib/calimero -type f 2>/dev/null
          [ -f /etc/default/grub ] && echo /etc/default/grub
        } | sort -u | xargs -r sha256sum 2>/dev/null | sha256sum | awk '{print $1}'
      register: root_hash_result
      changed_when: false

    - name: Add calimero.root_hash to kernel cmdline (measured, unfakeable)
      copy:
        content: |
          # Root content hash for attestation (RTMR[2]); cannot be forged without identical image
          GRUB_CMDLINE_LINUX_DEFAULT="${GRUB_CMDLINE_LINUX_DEFAULT} calimero.root_hash={{ root_hash_result.stdout }}"
        dest: /etc/default/grub.d/60-calimero-root-hash.cfg
        mode: "0644"

    - name: Update GRUB with root hash
      command: update-grub
      changed_when: true

    # Remove ubuntu user last (R4); must run after all other tasks since Packer SSHs as ubuntu
    - name: Remove ubuntu user after conformance checks (R4)
      include_role:
        name: ansible/roles/merod-lockdown
        tasks_from: remove_ubuntu
      when: (lockdown_profile | default('locked-read-only')) == 'locked-read-only'
