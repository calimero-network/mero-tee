name: Security audit

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - Cargo.toml
      - "mero-kms/Cargo.toml"
      - Cargo.lock
      - ".github/workflows/security-audit.yaml"

permissions:
  contents: read

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Setup rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: security-audit

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        id: cargo_audit
        run: cargo audit

      - name: Summarize security audit outcome
        if: ${{ always() }}
        run: |
          {
            echo "## Security audit"
            echo ""
            echo "- cargo-audit: ${{ steps.cargo_audit.outcome }}"
          } >> "${GITHUB_STEP_SUMMARY}"
