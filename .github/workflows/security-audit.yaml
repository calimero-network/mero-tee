name: Security audit

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:
  pull_request:
    paths:
      - Cargo.toml
      - "mero-kms/Cargo.toml"
      - Cargo.lock
      - ".github/workflows/security-audit.yaml"

permissions:
  contents: read

jobs:
  cargo-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.91.0

      - name: Setup rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: security-audit

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked --version 0.22.0

      - name: Run cargo audit
        id: cargo_audit
        run: cargo audit

      - name: Summarize security audit outcome
        if: ${{ always() }}
        run: |
          set -euo pipefail
          source scripts/ci/logging.sh
          result_line="$(ci_result "security-audit" "${{ job.status }}" "CARGO_AUDIT" "ref=${GITHUB_REF_NAME}" "run_id=${GITHUB_RUN_ID}")"
          ci_info "${result_line}"
          python3 scripts/ci/summary/write_workflow_summary.py \
            --output "${GITHUB_STEP_SUMMARY}" \
            --inputs-line "- Ref: ${GITHUB_REF_NAME}" \
            --checks-line "- cargo-audit: ${{ steps.cargo_audit.outcome }}" \
            --result-line "- Job status: ${{ job.status }}" \
            --result-line "- ${result_line}" \
            --artifacts-line "- n/a" \
            --next-line "- Review advisories and update dependencies."
