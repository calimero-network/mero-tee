name: CI workflow and shell lint

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "scripts-release/**"
      - "scripts-policy/**"
      - "scripts-attestation/**"
      - "node-image-gcp/**"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/**"
      - "scripts-release/**"
      - "scripts-policy/**"
      - "scripts-attestation/**"
      - "node-image-gcp/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-workflow-lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: actionlint + shellcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run actionlint
        uses: docker://rhysd/actionlint:latest
        with:
          args: -shellcheck=

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          shell_files=(scripts-release/**/*.sh scripts-policy/**/*.sh node-image-gcp/**/*.sh .github/workflows/deps/**/*.sh)
          if [[ "${#shell_files[@]}" -eq 0 ]]; then
            echo "No shell files matched lint paths."
            exit 0
          fi

          shellcheck "${shell_files[@]}"
