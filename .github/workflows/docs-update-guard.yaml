name: Docs update guard

on:
  pull_request:
    paths:
      - ".github/workflows/**"
      - "scripts/**"
      - "packer/**"
      - "docs/**"
      - "README.md"

permissions:
  contents: read

jobs:
  require-doc-updates:
    name: Require docs updates for workflow/script changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate docs changes are included
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          changed_files_output="$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")"
          if [[ -z "${changed_files_output}" ]]; then
            echo "No changed files detected between ${BASE_SHA} and ${HEAD_SHA}; this is unexpected for this workflow trigger."
            exit 1
          fi
          mapfile -t changed_files <<< "${changed_files_output}"

          requires_docs_update="false"
          has_docs_update="false"

          for file in "${changed_files[@]}"; do
            if [[ "${file}" == .github/workflows/* || "${file}" == scripts/* || "${file}" == packer/* ]]; then
              requires_docs_update="true"
            fi

            if [[ "${file}" == docs/* || "${file}" == README.md ]]; then
              has_docs_update="true"
            fi
          done

          if [[ "${requires_docs_update}" == "true" && "${has_docs_update}" != "true" ]]; then
            echo "This PR changes workflows/scripts/packer but does not update docs."
            echo "Please update at least one of: docs/** or README.md."
            exit 1
          fi

          echo "Docs update guard passed."
